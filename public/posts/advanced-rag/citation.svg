<svg width="100%" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>출처 인용 — 답에 근거 청크 번호를 달게</title>
  <desc>각 청크에 번호를 붙여 프롬프트에 넣고, 모델이 답하는 각 문장 끝에 근거 청크 번호를 표시하게 한다. 사용자는 근거를 직접 확인할 수 있고, 모델도 번호를 달아야 하는 제약 때문에 청크에 더 충실하게 답한다.</desc>

  <defs>
    <marker id="ci-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">출처 인용 — 답에 근거 청크 번호를 달게</text>

  <!-- 청크들 -->
  <text x="138" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000" opacity="0.7">검색된 청크</text>
  <rect x="40" y="76" width="196" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <circle cx="62" cy="96" r="11" fill="#000"/>
  <text x="62" y="96" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="82" y="96" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">신청 기한은 30일…</text>

  <rect x="40" y="124" width="196" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <circle cx="62" cy="144" r="11" fill="#000"/>
  <text x="62" y="144" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="82" y="144" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">연차는 15일 부여…</text>

  <rect x="40" y="172" width="196" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <circle cx="62" cy="192" r="11" fill="#000"/>
  <text x="62" y="192" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="82" y="192" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">수습 기간은 3개월…</text>

  <!-- 답변 -->
  <rect x="372" y="72" width="280" height="146" rx="8" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="392" y="96" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">답변</text>
  <text x="392" y="126" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">신청 기한은 30일이다 <tspan font-weight="700">[1]</tspan>.</text>
  <text x="392" y="152" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">연차는 15일 부여된다 <tspan font-weight="700">[2]</tspan>.</text>
  <text x="392" y="186" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">문서에 없는 건 모른다고 답함.</text>

  <!-- 인용 화살표 (답변 -> 청크) -->
  <path d="M 384 121 Q 300 110 240 96" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3 3" marker-end="url(#ci-arr)"/>
  <path d="M 384 147 Q 300 146 240 144" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3 3" marker-end="url(#ci-arr)"/>

  <text x="340" y="252" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">사용자는 근거를 확인하고, 모델은 청크에 더 충실해진다</text>
</svg>
