<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>모델이 바뀌어도 괜찮은지 — 평가셋으로 회귀 확인</title>
  <desc>임베딩 모델과 생성 LLM은 자주, 빠르게 새 버전이 나온다. 모델을 교체한 뒤 같은 평가셋으로 점수를 측정하고 이전 점수와 비교해, 좋아졌으면 채택하고 나빠졌으면 되돌린다. 교체가 손쉬운 업그레이드라도 회귀가 없는지 확인이 필요하다.</desc>

  <defs>
    <marker id="eg-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">모델이 바뀌어도 괜찮은지 — 평가셋으로 회귀 확인</text>

  <!-- 새 모델 -->
  <rect x="22" y="92" width="132" height="60" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="88" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">새 모델로 교체</text>
  <text x="88" y="133" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">임베딩 · 생성 LLM</text>

  <path d="M 154 122 L 186 122" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#eg-arr)"/>

  <!-- 평가셋 실행 -->
  <rect x="188" y="92" width="132" height="60" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="254" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">평가셋으로</text>
  <text x="254" y="133" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">자동 측정</text>

  <path d="M 320 122 L 352 122" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#eg-arr)"/>

  <!-- 점수 비교 -->
  <rect x="354" y="92" width="132" height="60" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="420" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">이전 점수와</text>
  <text x="420" y="133" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">비교</text>

  <!-- 분기 -->
  <path d="M 486 110 Q 512 96 528 88" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#eg-arr)"/>
  <path d="M 486 134 Q 512 148 528 156" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#eg-arr)"/>

  <rect x="530" y="64" width="128" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="594" y="86" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">좋아짐 → 채택</text>

  <rect x="530" y="136" width="128" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="594" y="158" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">나빠짐 → 롤백</text>

  <text x="340" y="212" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">모델은 자주·빠르게 바뀐다. 교체는 손쉬운 업그레이드지만, 회귀가 없는지 확인이 필요하다.</text>
  <text x="340" y="234" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">평가셋이 있으면 교체를 "느낌"이 아니라 숫자로 결정할 수 있다</text>
</svg>
