<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>청킹 전략 — 어디서 자르나</title>
  <desc>같은 텍스트를 세 가지 방식으로 자른 모습. 글자 수 기준은 고정 길이로 잘라 문장이 중간에 끊긴다. 재귀 분할은 문단·문장 경계를 우선해 자른다. 의미 분할은 주제가 바뀌는 지점에서 잘라 한 청크에 한 주제가 담긴다.</desc>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">청킹 전략 — 어디서 자르나</text>

  <!-- Row 1: 글자 수 -->
  <text x="24" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">글자 수</text>
  <text x="24" y="102" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">기본 실습</text>
  <rect x="150" y="70" width="156" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="310" y="70" width="156" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="470" y="70" width="160" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="120" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">고정 길이로 잘라 한 문장이 두 청크로 끊기기도</text>

  <!-- Row 2: 재귀 분할 -->
  <text x="24" y="161" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">재귀 분할</text>
  <text x="24" y="177" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">recursive</text>
  <rect x="150" y="145" width="120" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="274" y="145" width="184" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="462" y="145" width="168" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="195" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">문단·문장 경계를 우선해 문장이 끊기지 않게</text>

  <!-- Row 3: 의미 분할 -->
  <text x="24" y="236" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">의미 분할</text>
  <text x="24" y="252" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">semantic</text>
  <rect x="150" y="220" width="230" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="384" y="220" width="246" height="30" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="270" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">주제가 바뀌는 지점에서 잘라 한 청크에 한 주제</text>

  <text x="340" y="298" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">어떻게 자르느냐에 따라 검색되는 조각의 품질이 달라진다</text>
</svg>
