<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Agentic RAG — 판단하며 검색을 반복</title>
  <desc>한 방향으로 한 번 검색하고 끝내지 않고, 에이전트가 검색 결과를 보고 충분한지 판단한다. 부족하면 질문을 바꾸거나 다른 소스로 다시 검색하고, 충분하면 답변한다. 검색에 판단과 반복이 들어간다.</desc>

  <defs>
    <marker id="ag-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Agentic RAG — 판단하며 검색을 반복</text>

  <!-- 질문 -->
  <rect x="28" y="98" width="96" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="76" y="123" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">질문</text>

  <path d="M 124 123 L 156 123" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ag-arr)"/>

  <!-- 검색 -->
  <rect x="158" y="98" width="110" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="213" y="123" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">검색</text>

  <path d="M 268 123 L 300 123" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ag-arr)"/>

  <!-- 판단 -->
  <rect x="302" y="92" width="148" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="376" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">충분한가?</text>
  <text x="376" y="133" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">에이전트가 판단</text>

  <!-- 충분 -> 답변 -->
  <path d="M 450 123 L 486 123" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ag-arr)"/>
  <text x="468" y="113" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#000">충분</text>
  <rect x="488" y="98" width="120" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="548" y="123" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">답변</text>

  <!-- 부족 -> loop back -->
  <path d="M 376 154 L 376 210 L 213 210 L 213 150" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="5 3" marker-end="url(#ag-arr)"/>
  <text x="294" y="228" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.8">부족하면 질문 변경·다른 소스로 재검색</text>

  <text x="340" y="262" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">복잡한 질문을 여러 번의 검색으로 나눠 푼다</text>
</svg>
