<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Contextual Retrieval — 청크에 맥락을 덧붙여 임베딩</title>
  <desc>왼쪽은 청크만 떼어 임베딩한 경우로, 무엇을 신청하는지 맥락이 없어 검색에 잘 걸리지 않는다. 오른쪽은 청크 앞에 문서 맥락 한두 문장을 붙여 임베딩해, 맥락이 보존되어 정확히 검색된다.</desc>

  <defs>
    <marker id="cr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Contextual Retrieval — 청크에 맥락을 덧붙여 임베딩</text>

  <line x1="340" y1="56" x2="340" y2="270" stroke="#000" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- Left: bare chunk -->
  <text x="170" y="68" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000" opacity="0.7">청크만 임베딩</text>
  <rect x="44" y="80" width="252" height="54" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="170" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">「…이 경우 30일 이내에</text>
  <text x="170" y="120" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">신청해야 한다」</text>
  <path d="M 170 134 L 170 170" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#cr-arr)"/>
  <text x="186" y="156" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">임베딩</text>
  <rect x="60" y="172" width="220" height="46" rx="6" fill="#fff" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="170" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">무엇의 기한인지 모름</text>
  <text x="170" y="207" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">→ 검색에 잘 안 걸림</text>

  <!-- Right: context-prepended chunk -->
  <text x="510" y="68" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000" opacity="0.7">맥락을 붙여 임베딩</text>
  <rect x="384" y="78" width="252" height="26" rx="5" fill="#000" stroke="#000" stroke-width="1.5"/>
  <text x="510" y="95" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#fff">맥락: 취업규칙 연차 · 신청 기한</text>
  <rect x="384" y="104" width="252" height="34" rx="5" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="510" y="125" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">이 경우 30일 이내에 신청…</text>
  <path d="M 510 138 L 510 170" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#cr-arr)"/>
  <text x="526" y="158" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">임베딩</text>
  <rect x="400" y="172" width="220" height="46" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="510" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">맥락이 보존되어</text>
  <text x="510" y="207" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">→ 정확히 검색됨</text>

  <text x="340" y="286" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">맥락 설명은 보통 LLM에게 "이 청크가 문서 어디에 해당하는지" 시켜 자동으로 만든다</text>
</svg>
