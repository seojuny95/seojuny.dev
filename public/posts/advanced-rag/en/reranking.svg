<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Reranking — Cast Wide, Filter Precisely</title>
  <desc>First-pass vector search retrieves 30 candidates broadly and quickly. A second-pass cross-encoder reads each question-chunk pair together and rescores them, keeping only the top 3. A two-stage structure: cast wide, then filter precisely.</desc>

  <defs>
    <marker id="rr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Reranking — Cast Wide, Filter Precisely</text>

  <!-- Query -->
  <rect x="22" y="98" width="92" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="68" y="127" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Query</text>

  <path d="M 114 123 L 144 123" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#rr-arr)"/>

  <!-- 1st pass: vector search -->
  <rect x="146" y="94" width="156" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="224" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">1st pass · Vector search</text>
  <text x="224" y="134" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">30 candidates · fast</text>

  <path d="M 302 123 L 332 123" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#rr-arr)"/>

  <!-- cross-encoder -->
  <rect x="334" y="90" width="170" height="66" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="419" y="112" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">2nd pass · cross-encoder</text>
  <text x="419" y="131" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">reads query+chunk, rescores</text>
  <text x="419" y="146" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Accurate · slow</text>

  <path d="M 504 123 L 534 123" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#rr-arr)"/>

  <!-- Top 3 -->
  <rect x="536" y="98" width="124" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="598" y="127" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Top 3</text>

  <!-- funnel ticks -->
  <g opacity="0.55">
    <rect x="150" y="170" width="148" height="8" rx="2" fill="#000"/>
    <rect x="338" y="174" width="100" height="8" rx="2" fill="#000"/>
    <rect x="540" y="178" width="40" height="8" rx="2" fill="#000"/>
  </g>
  <text x="224" y="198" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">Wide (recall)</text>
  <text x="419" y="202" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">↓ filter</text>
  <text x="598" y="206" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">Precise (precision)</text>

  <text x="340" y="260" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">The highest answer-quality boost for the least effort</text>
</svg>
