<svg width="100%" viewBox="0 0 680 170" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Query Rewriting — Making Vague Questions Searchable</title>
  <desc>A vague or incomplete question is rewritten by an LLM into a clear, search-friendly query, which is then used for retrieval. For example, "How do I do that?" becomes "annual leave application process."</desc>

  <defs>
    <marker id="qr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Query Rewriting — Making Vague Questions Searchable</text>

  <!-- 1. Original question -->
  <rect x="20" y="62" width="150" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="95" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">"How do I do that?"</text>
  <text x="95" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">Vague question</text>
  <path d="M 170 87 L 205 87" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <!-- 2. LLM rewrite -->
  <rect x="205" y="62" width="130" height="50" rx="6" fill="#000" stroke="#000" stroke-width="1.5"/>
  <text x="270" y="91" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#fff">LLM Rewrite</text>
  <path d="M 335 87 L 370 87" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <!-- 3. Rewritten question -->
  <rect x="370" y="62" width="160" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="450" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">"Annual leave application"</text>
  <text x="450" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">Search-friendly query</text>
  <path d="M 530 87 L 565 87" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <!-- 4. Retrieval -->
  <rect x="565" y="62" width="95" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="612.5" y="91" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Retrieval</text>

  <text x="340" y="146" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">The LLM rewrites the vague question as a clear, search-friendly query before retrieval</text>
</svg>
