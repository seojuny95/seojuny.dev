<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Evaluation — What Each Metric Measures</title>
  <desc>RAG evaluation metrics target different points in the pipeline. Context precision and recall measure whether retrieval returned the right chunks. Faithfulness measures whether the answer is grounded in the chunks (hallucination check). Answer relevancy measures whether the answer actually answers the question.</desc>

  <defs>
    <marker id="ev-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Evaluation — What Each Metric Measures</text>

  <!-- pipeline -->
  <rect x="30" y="64" width="92" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="76" y="86" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Query</text>
  <path d="M 122 86 L 152 86" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#ev-arr)"/>
  <rect x="154" y="64" width="92" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="200" y="86" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Retrieve</text>
  <path d="M 246 86 L 276 86" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#ev-arr)"/>
  <rect x="278" y="64" width="92" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="324" y="86" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Chunks</text>
  <path d="M 370 86 L 400 86" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#ev-arr)"/>
  <rect x="402" y="64" width="92" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="448" y="86" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Generate</text>
  <path d="M 494 86 L 524 86" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#ev-arr)"/>
  <rect x="526" y="64" width="124" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="588" y="86" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Answer</text>

  <!-- Context Precision / Recall : Retrieve ~ Chunks -->
  <path d="M 154 118 L 154 138 L 370 138 L 370 118" fill="none" stroke="#000" stroke-width="1.3"/>
  <text x="262" y="156" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Precision · Recall</text>
  <text x="262" y="172" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">Right chunks retrieved?</text>

  <!-- Faithfulness : Chunks <-> Answer -->
  <path d="M 324 108 Q 324 210 460 210 Q 588 210 588 110" fill="none" stroke="#000" stroke-width="1.3" stroke-dasharray="4 3"/>
  <rect x="392" y="198" width="128" height="24" rx="4" fill="#fff"/>
  <text x="456" y="210" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Faithfulness</text>
  <text x="456" y="236" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">Grounded in the chunks?</text>

  <!-- Answer Relevancy : Query <-> Answer -->
  <path d="M 76 108 Q 76 274 340 274 Q 588 274 588 112" fill="none" stroke="#000" stroke-width="1.3" stroke-dasharray="4 3"/>
  <rect x="252" y="262" width="176" height="24" rx="4" fill="#fff"/>
  <text x="340" y="274" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Answer Relevancy</text>
  <text x="340" y="300" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">Does the answer actually answer the question?</text>
</svg>
