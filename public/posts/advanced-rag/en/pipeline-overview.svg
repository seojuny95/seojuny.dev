<svg width="100%" viewBox="0 0 740 330" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RAG Pipeline — Where to Improve</title>
  <desc>The base RAG pipeline (Indexing: Docs→Text Extraction→Chunking→Chunk Embedding→Vector DB; Answer Generation: Query→Query Embedding→Retrieval→Prompt Assembly→LLM→Answer) with improvements applied at each stage. Query transformation (before retrieval) and reranking (after retrieval) are newly inserted into the answer-generation flow. Each existing stage also receives improvements such as chunking strategy, embedding model selection, hybrid search, and source citation. Evaluation measures every stage from retrieval to generation.</desc>

  <defs>
    <marker id="ov-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="370" y="22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RAG Pipeline — Where to Improve</text>

  <!-- ① Indexing -->
  <text x="8" y="64" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">① Indexing — Prepared before any question</text>

  <rect x="8" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="47" y="96" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Docs</text>
  <path d="M 86 96 L 100 96" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="100" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="139" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Extract</text>
  <text x="139" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="7.5" fill="#000" opacity="0.6">table·image</text>
  <path d="M 178 96 L 192 96" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="192" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="231" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Chunking</text>
  <text x="231" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="7.5" fill="#000" opacity="0.6">recursive·sem.</text>
  <path d="M 270 96 L 284 96" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="284" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="323" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Embedding</text>
  <text x="323" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="7.5" fill="#000" opacity="0.6">model·contextual</text>

  <!-- Store -->
  <path d="M 323 118 L 323 150" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="333" y="137" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">Store</text>

  <!-- Vector DB (shared, dashed) -->
  <rect x="269" y="150" width="108" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="323" y="166" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Vector DB</text>
  <text x="323" y="182" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">+ BM25</text>

  <!-- Search -->
  <path d="M 323 194 L 323 224" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="333" y="212" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">Search</text>

  <!-- ② Answer Generation -->
  <text x="8" y="214" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">② Answer Generation — per query</text>

  <rect x="8" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="47" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Query</text>
  <path d="M 86 246 L 100 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="100" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="139" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Embedding</text>
  <path d="M 178 246 L 192 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <!-- Query Transform (new) -->
  <rect x="216" y="207" width="30" height="15" rx="3" fill="#000"/>
  <text x="231" y="214.5" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="8" font-weight="600" fill="#fff">NEW</text>
  <rect x="192" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="231" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Transform</text>
  <text x="231" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#000" opacity="0.6">query rewrite</text>
  <path d="M 270 246 L 284 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="284" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="323" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Retrieval</text>
  <text x="323" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">Hybrid</text>
  <path d="M 362 246 L 376 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <!-- Reranking (new) -->
  <rect x="400" y="207" width="30" height="15" rx="3" fill="#000"/>
  <text x="415" y="214.5" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="8" font-weight="600" fill="#fff">NEW</text>
  <rect x="376" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="415" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Reranking</text>
  <text x="415" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">cross-encoder</text>
  <path d="M 454 246 L 468 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="468" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="507" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Prompt</text>
  <text x="507" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8" fill="#000" opacity="0.6">source citation</text>
  <path d="M 546 246 L 560 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="560" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="599" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">LLM</text>
  <path d="M 638 246 L 652 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="652" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="691" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Answer</text>

  <!-- Evaluation -->
  <path d="M 192 282 L 192 290 L 730 290 L 730 282" fill="none" stroke="#000" stroke-width="1.2" opacity="0.55"/>
  <rect x="405" y="280" width="112" height="20" rx="4" fill="#fff"/>
  <text x="461" y="290.5" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">Evaluation (RAGAS)</text>

  <text x="370" y="320" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">Query transformation and reranking added; each stage receives further improvements</text>
</svg>
