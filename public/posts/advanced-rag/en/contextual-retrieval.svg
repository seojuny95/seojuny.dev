<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Contextual Retrieval — Prepending Context Before Embedding</title>
  <desc>Left: a chunk embedded alone has no context — its topic isn't clear and retrieval is weak. Right: a one-sentence context prepended to the chunk before embedding preserves the topic, so the chunk retrieves accurately.</desc>

  <defs>
    <marker id="cr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Contextual Retrieval — Prepending Context Before Embedding</text>

  <line x1="340" y1="56" x2="340" y2="270" stroke="#000" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- Left: bare chunk -->
  <text x="170" y="68" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000" opacity="0.7">Chunk-only embedding</text>
  <rect x="44" y="80" width="252" height="54" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="170" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">"…must be submitted</text>
  <text x="170" y="120" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">within 30 days"</text>
  <path d="M 170 134 L 170 170" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#cr-arr)"/>
  <text x="186" y="156" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">Embed</text>
  <rect x="60" y="172" width="220" height="46" rx="6" fill="#fff" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="170" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">No context — what deadline?</text>
  <text x="170" y="207" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">→ Weak retrieval signal</text>

  <!-- Right: context-prepended chunk -->
  <text x="510" y="68" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000" opacity="0.7">Context-prepended embedding</text>
  <rect x="384" y="78" width="252" height="26" rx="5" fill="#000" stroke="#000" stroke-width="1.5"/>
  <text x="510" y="95" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#fff">Context: Annual Leave · application deadline</text>
  <rect x="384" y="104" width="252" height="34" rx="5" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="510" y="125" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Applications due within 30 days…</text>
  <path d="M 510 138 L 510 170" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#cr-arr)"/>
  <text x="526" y="158" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">Embed</text>
  <rect x="400" y="172" width="220" height="46" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="510" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">Context preserved</text>
  <text x="510" y="207" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">→ Retrieved accurately</text>

  <text x="340" y="286" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">Context is auto-generated by prompting an LLM with the document and the chunk</text>
</svg>
