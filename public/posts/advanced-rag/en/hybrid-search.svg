<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Hybrid Search — Combining Semantic and Keyword Search with RRF</title>
  <desc>The query goes into both semantic search (embedding) and keyword search (BM25) simultaneously, each producing a ranking. RRF merges the two rankings into a final ranking. Semantic search handles synonyms and paraphrases; keyword search handles exact word matches — they complement each other.</desc>

  <defs>
    <marker id="hs-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Hybrid Search — Combining Semantic and Keyword with RRF</text>

  <!-- Query -->
  <rect x="22" y="130" width="104" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="74" y="159" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Query</text>

  <!-- Two branches -->
  <path d="M 126 148 Q 150 100 174 96" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#hs-arr)"/>
  <path d="M 126 162 Q 150 210 174 214" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#hs-arr)"/>

  <!-- Semantic search -->
  <rect x="176" y="72" width="178" height="56" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="265" y="94" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Semantic Search</text>
  <text x="265" y="113" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">synonyms &amp; paraphrases</text>

  <!-- Keyword search -->
  <rect x="176" y="182" width="178" height="56" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="265" y="204" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Keyword Search (BM25)</text>
  <text x="265" y="223" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Strong on exact word matches</text>

  <!-- Converge to RRF -->
  <path d="M 354 100 Q 384 130 406 150" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#hs-arr)"/>
  <path d="M 354 210 Q 384 180 406 160" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#hs-arr)"/>

  <rect x="408" y="120" width="122" height="70" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="469" y="147" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#000">RRF</text>
  <text x="469" y="167" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Merge rankings</text>

  <path d="M 530 155 L 566 155" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#hs-arr)"/>
  <rect x="568" y="130" width="96" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="616" y="159" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Final ranking</text>

  <text x="340" y="284" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">Chunks that rank highly in both retrievers earn the highest combined score</text>
</svg>
