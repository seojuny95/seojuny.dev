<svg width="100%" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Source Citation — Citing Chunk Numbers in the Answer</title>
  <desc>Chunks are numbered and placed in the prompt. The model appends citation numbers to each sentence in its answer. Users can verify the sources, and the model stays closer to the retrieved chunks because it must cite them.</desc>

  <defs>
    <marker id="ci-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Source Citation — Citing Chunk Numbers in the Answer</text>

  <!-- Chunks -->
  <text x="138" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000" opacity="0.7">Retrieved chunks</text>
  <rect x="40" y="76" width="196" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <circle cx="62" cy="96" r="11" fill="#000"/>
  <text x="62" y="96" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="82" y="96" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">Deadline: 30 days in advance…</text>

  <rect x="40" y="124" width="196" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <circle cx="62" cy="144" r="11" fill="#000"/>
  <text x="62" y="144" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="82" y="144" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">Annual leave: 15 days…</text>

  <rect x="40" y="172" width="196" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <circle cx="62" cy="192" r="11" fill="#000"/>
  <text x="62" y="192" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="82" y="192" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">Probation period: 3 months…</text>

  <!-- Answer -->
  <rect x="372" y="72" width="280" height="146" rx="8" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="392" y="96" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Answer</text>
  <text x="392" y="126" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Deadline is 30 days in advance <tspan font-weight="700">[1]</tspan>.</text>
  <text x="392" y="152" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Annual leave: 15 days granted <tspan font-weight="700">[2]</tspan>.</text>
  <text x="392" y="186" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Absent from docs — model says so.</text>

  <!-- Citation arrows (answer -> chunk) -->
  <path d="M 384 121 Q 300 110 240 96" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3 3" marker-end="url(#ci-arr)"/>
  <path d="M 384 147 Q 300 146 240 144" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="3 3" marker-end="url(#ci-arr)"/>

  <text x="340" y="252" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">Users can verify sources; the model stays closer to the retrieved chunks</text>
</svg>
