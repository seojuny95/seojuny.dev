<svg width="100%" viewBox="0 0 740 330" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RAG 파이프라인 — 어디를 개선하나</title>
  <desc>지난 글의 기본 RAG 파이프라인(인덱싱: 문서→텍스트 추출→청킹→청크 임베딩→벡터 DB, 답변 생성: 질문→질문 임베딩→검색→프롬프트 구성→LLM→답변) 위에 이번 글의 개선을 얹는다. 답변 생성 흐름에 쿼리 변환(검색 전)과 리랭킹(검색 후)을 새로 끼워 넣고, 각 기존 단계에는 청킹 전략·임베딩 모델 선택·하이브리드 검색·출처 인용 같은 개선을 적용한다. 평가로 검색부터 생성까지 점수를 재 병목을 찾는다.</desc>

  <defs>
    <marker id="ov-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="370" y="22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RAG 파이프라인 — 어디를 개선하나</text>

  <!-- ① 인덱싱 -->
  <text x="8" y="64" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">① 인덱싱 — 질문 전에 미리 준비</text>

  <rect x="8" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="47" y="96" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">문서</text>
  <path d="M 86 96 L 100 96" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="100" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="139" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">텍스트 추출</text>
  <text x="139" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">표·이미지 파싱</text>
  <path d="M 178 96 L 192 96" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="192" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="231" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">청킹</text>
  <text x="231" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">재귀·의미</text>
  <path d="M 270 96 L 284 96" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="284" y="74" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="323" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">청크 임베딩</text>
  <text x="323" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">모델·Contextual</text>

  <!-- 저장 -->
  <path d="M 323 118 L 323 150" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="333" y="137" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">저장</text>

  <!-- 벡터 DB (공유, 점선) -->
  <rect x="269" y="150" width="108" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="323" y="166" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">벡터 DB</text>
  <text x="323" y="182" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">+ BM25</text>

  <!-- 검색 -->
  <path d="M 323 194 L 323 224" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="333" y="212" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">검색</text>

  <!-- ② 답변 생성 -->
  <text x="8" y="214" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">② 답변 생성 — 질문이 올 때마다 반복</text>

  <rect x="8" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="47" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">질문</text>
  <path d="M 86 246 L 100 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="100" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="139" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">질문 임베딩</text>
  <path d="M 178 246 L 192 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <!-- 쿼리 변환 (추가) -->
  <rect x="216" y="207" width="30" height="15" rx="3" fill="#000"/>
  <text x="231" y="214.5" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="8" font-weight="600" fill="#fff">추가</text>
  <rect x="192" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="231" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">쿼리 변환</text>
  <text x="231" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">쿼리 재작성</text>
  <path d="M 270 246 L 284 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="284" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="323" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">검색</text>
  <text x="323" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">하이브리드</text>
  <path d="M 362 246 L 376 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <!-- 리랭킹 (추가) -->
  <rect x="400" y="207" width="30" height="15" rx="3" fill="#000"/>
  <text x="415" y="214.5" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="8" font-weight="600" fill="#fff">추가</text>
  <rect x="376" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="415" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">리랭킹</text>
  <text x="415" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">cross-encoder</text>
  <path d="M 454 246 L 468 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="468" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="507" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">프롬프트 구성</text>
  <text x="507" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="8.5" fill="#000" opacity="0.6">출처 인용</text>
  <path d="M 546 246 L 560 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="560" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="599" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">LLM</text>
  <path d="M 638 246 L 652 246" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="652" y="224" width="78" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="691" y="246" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">답변</text>

  <!-- 평가 -->
  <path d="M 192 282 L 192 290 L 730 290 L 730 282" fill="none" stroke="#000" stroke-width="1.2" opacity="0.55"/>
  <rect x="405" y="280" width="112" height="20" rx="4" fill="#fff"/>
  <text x="461" y="290.5" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">평가 (RAGAS)</text>

  <text x="370" y="320" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">기본 파이프라인에 쿼리 변환·리랭킹을 더하고, 각 단계마다 개선 기법을 적용한다</text>
</svg>
