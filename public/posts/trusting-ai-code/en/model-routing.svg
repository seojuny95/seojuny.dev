<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Core judgment goes to a strong model, repetitive work goes to a lighter model</title>
  <desc>The main agent uses a strong model for core judgment calls like designing code structure or resolving ambiguous requirements. Repetitive, mechanical work — code search, rule checks, test verification — is split across subagents running a lighter model.</desc>

  <defs>
    <marker id="mr-arr-en" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Splitting model use by role</text>

  <!-- Main agent -->
  <rect x="230" y="46" width="220" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.9"/>
  <text x="340" y="72" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#000">Main agent</text>
  <text x="340" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Core judgment · strong model</text>

  <!-- Arrows: main -> 3 subagents -->
  <path d="M 300 108 L 140 176" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mr-arr-en)"/>
  <path d="M 340 108 L 340 176" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mr-arr-en)"/>
  <path d="M 380 108 L 540 176" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mr-arr-en)"/>

  <!-- Subagent 1 -->
  <rect x="46" y="178" width="188" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="140" y="203" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Code search</text>
  <text x="140" y="220" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">Subagent · lighter model</text>

  <!-- Subagent 2 -->
  <rect x="246" y="178" width="188" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="340" y="203" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Rule checks</text>
  <text x="340" y="220" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">Subagent · lighter model</text>

  <!-- Subagent 3 -->
  <rect x="446" y="178" width="188" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="540" y="203" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Test verification</text>
  <text x="540" y="220" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">Subagent · lighter model</text>

  <!-- Caption -->
  <text x="340" y="300" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">Core judgment goes to a strong model, repetitive work goes to a lighter model</text>
</svg>
