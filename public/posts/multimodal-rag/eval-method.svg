<svg width="100%" viewBox="0 0 680 216" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>평가 방법 — 작은 평가셋으로 측정</title>
  <desc>Attention 논문 질문 18개를 정답 위치(본문·표·그림)에 따라 6개씩 나누고, 챗봇 답변을 다른 LLM이 지어내지 않았는지(faithful)·핵심을 담았는지(covers) 0/1로 채점한다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fafaf9; stroke: #d8d8d4; stroke-width: 1.5; }
      .accent { fill: #fff3ec; stroke: #f26522; stroke-width: 1.6; }
      .t { font-size: 12.5px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .row { font-size: 11px; font-weight: 600; fill: #8a8a85; }
      .sm { font-size: 10.5px; fill: #8a8a85; text-anchor: middle; }
      .flow { stroke: #171717; stroke-width: 1.6; fill: none; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#171717"/>
    </marker>
  </defs>

  <text x="340" y="22" class="hdr">평가 방법 — 작은 평가셋으로 측정</text>

  <!-- 질문 18개 -->
  <rect class="box" x="24" y="82" width="96" height="46" rx="9"/>
  <text class="t" x="72" y="100">질문 18개</text>
  <text class="sm" x="72" y="116">Attention 논문</text>

  <!-- split into 3 -->
  <text x="150" y="52" class="row">정답 위치별로 나눔</text>
  <rect class="box" x="150" y="60" width="104" height="30" rx="8"/>
  <rect class="box" x="150" y="98" width="104" height="30" rx="8"/>
  <rect class="box" x="150" y="136" width="104" height="30" rx="8"/>
  <text class="t" x="202" y="75">본문 6개</text>
  <text class="t" x="202" y="113">표 6개</text>
  <text class="t" x="202" y="151">그림 6개</text>

  <path class="flow" d="M120,105 H146" marker-end="url(#ah)"/>

  <!-- 챗봇 답변 -->
  <rect class="box" x="286" y="82" width="96" height="46" rx="9"/>
  <text class="t" x="334" y="105">챗봇 답변</text>
  <path class="flow" d="M254,105 H282" marker-end="url(#ah)"/>

  <!-- 채점 -->
  <rect class="accent" x="414" y="66" width="232" height="78" rx="10"/>
  <text class="t" x="530" y="84" style="fill:#f26522;">LLM 채점</text>
  <text x="432" y="106" style="font-size:11.5px;font-weight:600;">· 지어내지 않았나 (faithful)</text>
  <text x="432" y="125" style="font-size:11.5px;font-weight:600;">· 핵심을 담았나 (covers)</text>
  <text x="530" y="140" class="sm" style="fill:#f26522;">각 항목 0 / 1 로 채점</text>
  <path class="flow" d="M382,105 H410" marker-end="url(#ah)"/>
</svg>
