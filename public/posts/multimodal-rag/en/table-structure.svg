<svg width="100%" viewBox="0 0 680 214" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Reading Tables — Plain Text vs Structure Preserved</title>
  <desc>Converting a table to plain text loses row and column boundaries, blurring which value belongs where. Converting to a Markdown table preserves the structure so each value's position is clear.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fafaf9; stroke: #d8d8d4; stroke-width: 1.5; }
      .colh { font-size: 11.5px; font-weight: 600; fill: #8a8a85; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 10.5px; fill: #8a8a85; text-anchor: middle; }
      .mono { font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; fill: #6b6b66; }
      .num { fill: #f26522; font-weight: 600; }
      .grid { stroke: #d8d8d4; stroke-width: 1.3; }
      .cell { font-size: 10.5px; text-anchor: middle; dominant-baseline: central; }
      .divide { stroke: #e5e5e2; stroke-width: 1.4; stroke-dasharray: 5 4; }
    </style>
  </defs>

  <text x="340" y="22" class="hdr">Reading Tables — Plain Text vs Structure Preserved</text>
  <line class="divide" x1="340" y1="42" x2="340" y2="200"/>

  <!-- Left: plain text -->
  <text x="166" y="58" class="colh">Converted to plain text</text>
  <rect class="box" x="34" y="72" width="272" height="66" rx="9"/>
  <text class="mono" x="50" y="98">Transformer(base) <tspan class="num">27.3 38.1</tspan></text>
  <text class="mono" x="50" y="120">Transformer(big) <tspan class="num">28.4 41.8</tspan></text>
  <text x="166" y="164" class="sub">Boundaries lost — values blur together</text>

  <!-- Right: structure preserved -->
  <text x="512" y="58" class="colh">Structure preserved (Markdown table)</text>
  <rect x="386" y="72" width="252" height="78" rx="4" fill="#fafaf9" stroke="#d8d8d4" stroke-width="1.4"/>
  <rect x="386" y="72" width="252" height="26" rx="4" fill="#fff3ec"/>
  <line class="grid" x1="386" y1="98"  x2="638" y2="98"/>
  <line class="grid" x1="386" y1="124" x2="638" y2="124"/>
  <line class="grid" x1="510" y1="72"  x2="510" y2="150"/>
  <line class="grid" x1="574" y1="72"  x2="574" y2="150"/>
  <text class="cell" x="448" y="85" style="font-weight:600;fill:#f26522;">Model</text>
  <text class="cell" x="542" y="85" style="font-weight:600;fill:#f26522;">EN-DE</text>
  <text class="cell" x="606" y="85" style="font-weight:600;fill:#f26522;">EN-FR</text>
  <text class="cell" x="448" y="111">Transformer(base)</text>
  <text class="cell" x="542" y="111">27.3</text>
  <text class="cell" x="606" y="111">38.1</text>
  <text class="cell" x="448" y="137">Transformer(big)</text>
  <text class="cell" x="542" y="137">28.4</text>
  <text class="cell" x="606" y="137">41.8</text>
  <text x="512" y="164" class="sub">Rows and columns kept — positions clear</text>
</svg>
