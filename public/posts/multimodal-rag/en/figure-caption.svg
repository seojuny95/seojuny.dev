<svg width="100%" viewBox="0 0 680 190" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Reading Figures — Turning Images into Text</title>
  <desc>A vector-graphic page with no searchable text is shown to a VLM, which returns a caption; that caption is stored in the vector DB as a text chunk, tagged with type and page metadata.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fafaf9; stroke: #d8d8d4; stroke-width: 1.5; }
      .vlm { fill: #fff3ec; stroke: #f26522; stroke-width: 1.6; }
      .db { fill: #fff3ec; stroke: #f26522; stroke-width: 1.6; }
      .t { font-size: 12.5px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
      .flow { stroke: #171717; stroke-width: 1.6; fill: none; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#171717"/>
    </marker>
  </defs>

  <text x="340" y="22" class="hdr">Reading Figures — Turning Images into Text</text>

  <rect class="box" x="20" y="66" width="126" height="54" rx="9"/>
  <text class="t" x="83" y="87">Vector graphic</text>
  <text class="sub" x="83" y="104">No searchable text</text>
  <path class="flow" d="M146,93 H186" marker-end="url(#ah)"/>

  <rect class="vlm" x="186" y="66" width="72" height="54" rx="9"/>
  <text class="t" x="222" y="93" style="fill:#f26522;">VLM</text>
  <path class="flow" d="M258,93 H298" marker-end="url(#ah)"/>

  <rect class="box" x="298" y="66" width="176" height="54" rx="9"/>
  <text class="t" x="386" y="87">Caption (text)</text>
  <text class="sub" x="386" y="104">"Encoder–decoder structure…"</text>
  <path class="flow" d="M474,93 H514" marker-end="url(#ah)"/>

  <rect class="db" x="514" y="66" width="146" height="54" rx="9"/>
  <text class="t" x="587" y="87">Vector DB chunk</text>
  <text class="sub" x="587" y="104">type=figure, p.3</text>

  <text class="sub" x="340" y="158" style="font-size:11px;">Figures with no searchable text are converted to captions and stored alongside text chunks.</text>
</svg>
