<svg width="100%" viewBox="0 0 680 226" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Eval Reliability — Fix the Measurement Tool First</title>
  <desc>Before fixes, scoring the same paper with the same index gave wildly different results (83% and 50%) due to LLM non-determinism and a language mismatch between Korean answers and English keywords. Fixing temperature, seed, and scoring semantics stabilized the scores.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fafaf9; stroke: #d8d8d4; stroke-width: 1.5; }
      .accent { fill: #fff3ec; stroke: #f26522; stroke-width: 1.6; }
      .t { font-size: 12px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; font-weight: 600; fill: #8a8a85; text-anchor: middle; }
      .sub { font-size: 10.5px; fill: #8a8a85; text-anchor: middle; }
      .flow { stroke: #171717; stroke-width: 1.6; fill: none; }
      .divide { stroke: #e5e5e2; stroke-width: 1.4; stroke-dasharray: 5 4; }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#171717"/>
    </marker>
  </defs>

  <text x="340" y="22" class="hdr">Eval Reliability — Fix the Tool First</text>
  <line class="divide" x1="340" y1="44" x2="340" y2="212"/>

  <!-- Before fix -->
  <text x="166" y="58" class="cap">Before fix</text>
  <rect class="box" x="24" y="78" width="120" height="40" rx="9"/>
  <text class="t" x="84" y="98">Same paper/index</text>
  <path class="flow" d="M144,98 H176" marker-end="url(#ah)"/>
  <rect class="box" x="176" y="78" width="70" height="40" rx="9"/>
  <text class="t" x="211" y="98">Scoring</text>
  <path class="flow" d="M246,90 L286,72" marker-end="url(#ah)"/>
  <path class="flow" d="M246,106 L286,124" marker-end="url(#ah)"/>
  <rect class="accent" x="286" y="56" width="48" height="30" rx="8"/>
  <text class="t" x="310" y="71" style="fill:#f26522;">83%</text>
  <rect class="accent" x="286" y="110" width="48" height="30" rx="8"/>
  <text class="t" x="310" y="125" style="fill:#f26522;">50%</text>
  <text x="166" y="150" class="sub" style="font-size:11px;">Same answer, unstable scores</text>
  <text x="166" y="167" class="sub">Non-determinism · language mismatch</text>

  <!-- After fix -->
  <text x="512" y="58" class="cap">After fix</text>
  <rect class="box" x="366" y="72" width="252" height="52" rx="9"/>
  <text x="384" y="92" style="font-size:11.5px;font-weight:600;">① temperature 0 · fixed seed</text>
  <text x="384" y="112" style="font-size:11.5px;font-weight:600;">② semantic scoring · match keywords</text>
  <path class="flow" d="M492,124 V150" marker-end="url(#ah)"/>
  <rect class="accent" x="432" y="150" width="120" height="34" rx="9"/>
  <text class="t" x="492" y="167" style="fill:#f26522;">Stable scores</text>
</svg>
