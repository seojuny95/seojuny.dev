<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>파인튜닝의 종류 — 가중치를 얼마나 학습시키나</title>
  <desc>사전학습 모델을 적응시키는 방법을 가중치를 학습시키는 비율로 늘어놓으면, 특성추출(거의 0%)에서 PEFT(약 0.x%)를 거쳐 풀 파인튜닝(100%)까지 이어진다. 우리 상황에서는 PEFT가 가장 현실적이다.</desc>

  <text x="340" y="30" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">파인튜닝의 종류 — 가중치를 얼마나 학습시키나</text>

  <!-- 스펙트럼 축 -->
  <line x1="70" y1="150" x2="610" y2="150" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="150" cy="150" r="4" fill="#000"/>
  <circle cx="340" cy="150" r="4" fill="#000"/>
  <circle cx="530" cy="150" r="4" fill="#000"/>

  <!-- 특성추출 -->
  <rect x="78" y="92" width="144" height="34" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="108" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">특성추출</text>
  <text x="150" y="121" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.6">feature extraction</text>
  <line x1="150" y1="126" x2="150" y2="146" stroke="#000" stroke-width="1" opacity="0.5"/>
  <text x="150" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">본체 동결</text>
  <text x="150" y="193" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">head만 학습</text>
  <text x="150" y="212" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11.5" font-weight="600" fill="#000">&#8776; 0%</text>

  <!-- PEFT (강조) -->
  <rect x="266" y="88" width="148" height="38" rx="6" fill="#fff" stroke="#000" stroke-width="2.4"/>
  <text x="340" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">PEFT</text>
  <text x="340" y="120" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.6">LoRA · QLoRA</text>
  <line x1="340" y1="126" x2="340" y2="146" stroke="#000" stroke-width="1" opacity="0.5"/>
  <text x="340" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">본체 동결</text>
  <text x="340" y="193" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">작은 어댑터만</text>
  <text x="340" y="212" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11.5" font-weight="600" fill="#000">~ 0.x%</text>

  <!-- 풀 파인튜닝 -->
  <rect x="456" y="92" width="148" height="34" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="530" y="108" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">풀 파인튜닝</text>
  <text x="530" y="121" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.6">full fine-tuning</text>
  <line x1="530" y1="126" x2="530" y2="146" stroke="#000" stroke-width="1" opacity="0.5"/>
  <text x="530" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">전체 업데이트</text>
  <text x="530" y="212" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11.5" font-weight="600" fill="#000">100%</text>

  <!-- 축 양끝 라벨 -->
  <text x="70" y="240" text-anchor="start" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">&#8592; 적게 건드림</text>
  <text x="610" y="240" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">더 많이 건드림 &#8594;</text>

  <!-- 구분선 + 결론 -->
  <line x1="60" y1="262" x2="620" y2="262" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="286" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">풀 파인튜닝은 리소스 부담, 특성추출은 생성형과 안 맞음</text>
  <text x="340" y="306" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">&#8594; 우리에겐 PEFT가 가장 현실적이다</text>
</svg>
