<svg width="100%" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>페이지 옵티마이저 — 넘치면 CPU 메모리로 잠깐 대피</title>
  <desc>학습 도중 GPU 메모리가 순간적으로 넘칠 때, 넘치는 부분만 CPU 메모리로 잠깐 옮겨 둔다. 그래서 GPU 메모리가 터지는(OOM) 사고를 막는다.</desc>

  <defs>
    <pattern id="po-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.7" opacity="0.32"/>
    </pattern>
    <marker id="po-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">페이지 옵티마이저 — 넘치면 CPU로 잠깐 대피</text>

  <!-- 넘치는 부분 (GPU 위로 삐져나옴) -->
  <text x="160" y="64" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">넘치는 부분</text>
  <rect x="122" y="70" width="76" height="22" rx="3" fill="url(#po-hatch)" stroke="#000" stroke-width="1.6"/>

  <!-- GPU 메모리 (꽉 참) -->
  <rect x="112" y="96" width="96" height="108" rx="4" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="1.7"/>
  <text x="160" y="150" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.6">꽉 참</text>
  <text x="160" y="224" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">GPU 메모리</text>

  <!-- 대피 화살표 -->
  <path d="M 206 81 C 300 81 320 150 408 150" fill="none" stroke="#000" stroke-width="1.6" marker-end="url(#po-arr)"/>
  <text x="318" y="72" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.8">잠깐 옮김</text>

  <!-- CPU 메모리 (여유) -->
  <rect x="430" y="110" width="150" height="94" rx="4" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <rect x="448" y="156" width="76" height="22" rx="3" fill="url(#po-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="486" y="171" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#000" opacity="0.7">넘친 부분</text>
  <text x="505" y="135" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.55">여유 있음</text>
  <text x="505" y="224" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">CPU 메모리</text>

  <!-- 캡션 -->
  <line x1="40" y1="240" x2="640" y2="240" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="261" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">넘치는 만큼만 CPU 메모리로 잠깐 옮겨, GPU가 터지는(OOM) 사고를 막는다</text>
</svg>
