<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How PEFT Saves Memory — Training Overhead on the Adapter Only</title>
  <desc>Full fine-tuning trains the entire backbone, adding training memory (gradients · optimizer, ~98 GB) on top of the weights (14 GB) for ~112 GB total. PEFT freezes the backbone (14 GB in memory) and attaches training overhead only to the small adapter, ending at ~15 GB — fitting on a single personal GPU.</desc>

  <defs>
    <pattern id="pm-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">How PEFT Saves Memory — Training Overhead on the Adapter Only</text>

  <!-- personal GPU baseline -->
  <line x1="92" y1="211" x2="526" y2="211" stroke="#000" stroke-width="1" stroke-dasharray="5 4" opacity="0.65"/>
  <text x="96" y="206" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.75">Single GPU ≈ 24 GB</text>

  <!-- ===== Full Fine-Tuning bar ===== -->
  <!-- training memory -->
  <rect x="168" y="70" width="66" height="157.5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.5"/>
  <!-- weights -->
  <rect x="168" y="227.5" width="66" height="22.5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="201" y="60" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">≈ 112 GB</text>
  <text x="201" y="272" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Full Fine-Tuning</text>

  <!-- Full bar labels -->
  <text x="244" y="142" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">Training memory</text>
  <text x="244" y="157" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.65">gradient · optimizer</text>
  <text x="244" y="243" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">backbone weights ≈ 14 GB</text>

  <!-- ===== PEFT bar ===== -->
  <!-- adapter training memory (tiny) -->
  <rect x="455" y="220.5" width="66" height="7" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.5"/>
  <!-- backbone (frozen) -->
  <rect x="455" y="227.5" width="66" height="22.5" fill="url(#pm-hatch)" stroke="#000" stroke-width="1.5"/>
  <text x="488" y="272" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">PEFT</text>

  <!-- PEFT bar labels -->
  <text x="531" y="218" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Adapter training mem.</text>
  <text x="531" y="232" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.65">(tiny)</text>
  <text x="531" y="247" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">backbone frozen ≈ 14 GB</text>
  <text x="595" y="200" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">≈ 15 GB</text>

  <!-- legend -->
  <rect x="180" y="294" width="15" height="11" rx="2" fill="url(#pm-hatch)" stroke="#000" stroke-width="1.3"/>
  <text x="201" y="303" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Frozen backbone</text>
  <rect x="300" y="294" width="15" height="11" rx="2" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.3"/>
  <text x="321" y="303" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Training memory (grad · optimizer)</text>
</svg>
