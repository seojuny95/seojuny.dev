<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>PEFT — Adapters on Selected Weight Matrices within a Layer</title>
  <desc>Inside one transformer layer are several weight matrices — attention's q, k, v, o and MLP weights. PEFT freezes all of them and attaches a dedicated adapter only to selected matrices (e.g., q and v). A model is many such layers stacked; the backbone is entirely frozen while only the adapters are trained.</desc>

  <defs>
    <pattern id="pe2-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13.5" font-weight="500" fill="#000">PEFT — Multiple Weight Matrices per Layer; Adapters on Selected Ones</text>

  <!-- background layer stack hint -->
  <rect x="67" y="52" width="570" height="150" rx="10" fill="#fff" stroke="#000" stroke-width="1.2" opacity="0.28"/>

  <!-- layer container -->
  <rect x="55" y="62" width="570" height="150" rx="10" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="340" y="84" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Inside one layer</text>

  <!-- group labels -->
  <text x="242" y="96" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000" opacity="0.8">Attention</text>
  <text x="528" y="96" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000" opacity="0.8">MLP</text>

  <!-- weight matrices (all frozen) -->
  <rect x="68" y="102" width="78" height="50" rx="5" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="107" y="132" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#000">q</text>
  <rect x="158" y="102" width="78" height="50" rx="5" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="197" y="132" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#000">k</text>
  <rect x="248" y="102" width="78" height="50" rx="5" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="287" y="132" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#000">v</text>
  <rect x="338" y="102" width="78" height="50" rx="5" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="377" y="132" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#000">o</text>
  <rect x="444" y="102" width="78" height="50" rx="5" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="483" y="132" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">MLP &#8593;</text>
  <rect x="534" y="102" width="78" height="50" rx="5" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="573" y="132" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">MLP &#8595;</text>

  <!-- q adapter -->
  <line x1="107" y1="152" x2="107" y2="162" stroke="#000" stroke-width="1.2"/>
  <rect x="82" y="162" width="50" height="24" rx="5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <text x="107" y="177" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">Adapter</text>

  <!-- v adapter -->
  <line x1="287" y1="152" x2="287" y2="162" stroke="#000" stroke-width="1.2"/>
  <rect x="262" y="162" width="50" height="24" rx="5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <text x="287" y="177" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">Adapter</text>

  <!-- caption -->
  <text x="340" y="234" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Each selected matrix gets its own adapter — here only q and v get one; the rest are frozen</text>
  <text x="340" y="252" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">The model stacks many such layers — the backbone (all matrices · layers) is frozen; only adapters train</text>

  <!-- legend -->
  <rect x="178" y="272" width="15" height="11" rx="2" fill="url(#pe2-hatch)" stroke="#000" stroke-width="1.3"/>
  <text x="199" y="281" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Frozen</text>
  <rect x="330" y="272" width="15" height="11" rx="2" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.8"/>
  <text x="351" y="281" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Adapter (trained)</text>
</svg>
