<svg width="100%" viewBox="0 0 680 296" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Building the NF4 Table — Dividing the Normal Distribution into 16 Equal Slices by Area</title>
  <desc>Model weights follow a bell-shaped (normal) distribution centered near zero. NF4 cuts the area under the curve into 16 equal slices and records one representative value per slice. Near zero, where values are dense, each equal-area slice is narrow, making the entries closely spaced. At the extremes the slices are wide, so entries are sparse. The 16 table values end up concentrated near zero.</desc>

  <defs>
    <pattern id="nq-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.14"/>
    </pattern>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Building the NF4 Table — 16 Equal Slices by Area</text>
  <text x="340" y="46" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Both shaded regions have equal area — only their width differs (each 1/16)</text>

  <!-- weight distribution (bell curve) -->
  <path d="M 80 180 C 225 180 280 82 340 82 C 400 82 455 180 600 180 Z" fill="url(#nq-hatch)" stroke="#000" stroke-width="1.6"/>

  <!-- equal-area slices: near zero (narrow) vs extremes (wide) -->
  <rect x="332" y="86" width="16" height="94" fill="#000" fill-opacity="0.16" stroke="#000" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="450" y="150" width="124" height="30" fill="#000" fill-opacity="0.16" stroke="#000" stroke-width="0.8" stroke-opacity="0.4"/>

  <text x="340" y="78" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.8">narrow</text>
  <text x="512" y="143" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.8">wide</text>
  <text x="150" y="120" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.85">Weights cluster near zero</text>

  <!-- baseline -->
  <line x1="70" y1="180" x2="610" y2="180" stroke="#000" stroke-width="1" opacity="0.5"/>

  <!-- 16 representative values (quantiles) — dense near zero, sparse at extremes -->
  <g fill="#000">
    <circle cx="82"  cy="180" r="2.8"/>
    <circle cx="125" cy="180" r="2.8"/>
    <circle cx="180" cy="180" r="2.8"/>
    <circle cx="225" cy="180" r="2.8"/>
    <circle cx="260" cy="180" r="2.8"/>
    <circle cx="288" cy="180" r="2.8"/>
    <circle cx="310" cy="180" r="2.8"/>
    <circle cx="330" cy="180" r="2.8"/>
    <circle cx="350" cy="180" r="2.8"/>
    <circle cx="370" cy="180" r="2.8"/>
    <circle cx="392" cy="180" r="2.8"/>
    <circle cx="420" cy="180" r="2.8"/>
    <circle cx="455" cy="180" r="2.8"/>
    <circle cx="500" cy="180" r="2.8"/>
    <circle cx="555" cy="180" r="2.8"/>
    <circle cx="598" cy="180" r="2.8"/>
  </g>

  <!-- value axis -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.5" text-anchor="middle">
    <text x="82"  y="197">-1</text>
    <text x="340" y="197">0</text>
    <text x="598" y="197">+1</text>
  </g>

  <text x="340" y="222" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">&#8593; Each slice's representative value becomes one of the 16 table entries — dense near 0, sparse at extremes</text>

  <!-- caption -->
  <line x1="40" y1="250" x2="640" y2="250" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="272" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Equal-area slices: the denser values near zero get more closely-spaced entries</text>
</svg>
