<svg width="100%" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Full Fine-Tuning — All Weights Updated</title>
  <desc>Every layer in the model is retrained on your data, from the backbone to the output. Most expressive but most expensive in memory and storage.</desc>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Full Fine-Tuning — All Weights Updated</text>

  <text x="255" y="80" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">Model (pretrained base model)</text>

  <!-- layers (all trained) -->
  <rect x="180" y="92" width="150" height="26" rx="5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <text x="255" y="109" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9312;</text>
  <rect x="180" y="125" width="150" height="26" rx="5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <text x="255" y="142" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9313;</text>
  <rect x="180" y="158" width="150" height="26" rx="5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <text x="255" y="175" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9314;</text>
  <rect x="180" y="191" width="150" height="26" rx="5" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <text x="255" y="208" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9315;</text>

  <!-- right bracket: all trained -->
  <path d="M 344 92 L 352 92 L 352 217 L 344 217" fill="none" stroke="#000" stroke-width="1.3"/>
  <text x="362" y="150" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">All trained</text>
  <text x="362" y="167" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000" opacity="0.7">100%</text>

  <!-- caption -->
  <text x="340" y="252" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Every layer retrained on your data — maximum expressiveness, maximum cost</text>

  <!-- legend -->
  <rect x="283" y="270" width="16" height="12" rx="2" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.8"/>
  <text x="305" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.75">Trained</text>
</svg>
