<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pretraining vs Fine-Tuning — Different Starting Points</title>
  <desc>Pretraining trains a blank model from scratch on internet-scale data to produce the base model, demanding thousands of GPUs and enormous cost. Fine-tuning starts from that base model and adjusts the weights further with a small dataset to produce your model.</desc>

  <defs>
    <marker id="pf-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Pretraining vs Fine-Tuning — Different Starting Points</text>

  <!-- ===== Pretraining (top) ===== -->
  <g transform="rotate(-2 68 57)">
    <rect x="22" y="46" width="92" height="22" rx="3" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="68" y="57" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Pretraining</text>
  </g>

  <!-- Data -->
  <rect x="34" y="86" width="120" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="94" y="110" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Internet-scale</text>
  <text x="94" y="127" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Data</text>

  <path d="M 156 115 L 200 115" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pf-arr)"/>

  <!-- Blank model -->
  <rect x="204" y="86" width="132" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="270" y="110" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">Blank Model</text>
  <text x="270" y="127" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Random weights</text>

  <path d="M 338 115 L 392 115" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pf-arr)"/>
  <text x="362" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9" font-weight="600" fill="#000">from scratch</text>

  <!-- Base model -->
  <rect x="396" y="86" width="150" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="471" y="108" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">Base Model</text>
  <text x="471" y="126" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">GPT · Llama · Qwen</text>

  <text x="290" y="167" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Thousands of GPUs · enormous cost — not something we'd do ourselves</text>

  <!-- Divider -->
  <line x1="40" y1="196" x2="640" y2="196" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- ===== Fine-Tuning (bottom) ===== -->
  <g transform="rotate(-2 68 225)">
    <rect x="22" y="214" width="92" height="22" rx="3" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="68" y="225" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Fine-Tuning</text>
  </g>

  <!-- Base model (starting point) -->
  <rect x="36" y="242" width="120" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="96" y="266" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Base Model</text>
  <text x="96" y="283" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">from above</text>

  <text x="172" y="277" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="400" fill="#000" opacity="0.7">+</text>

  <!-- My data -->
  <rect x="190" y="242" width="118" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="249" y="266" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">My Data</text>
  <text x="249" y="283" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">(small)</text>

  <path d="M 310 271 L 388 271" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pf-arr)"/>
  <text x="349" y="259" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">train further</text>

  <!-- My model -->
  <rect x="392" y="242" width="154" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="469" y="264" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">My Model</text>
  <text x="469" y="282" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">domain · tone tailored</text>

  <text x="291" y="328" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Starts from a model that already knows language — a small dataset is enough</text>

  <text x="340" y="360" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">What we can do is the bottom part — the fine-tuning stage</text>
</svg>
