<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>One Column × One Row Reproduces a Large Matrix</title>
  <desc>Even a 4096×4096 matrix (~16.77 million cells) can be produced by multiplying a single column vector (4096×1) by a single row vector (1×4096). Just 8,192 numbers in the two vectors restore the entire large matrix. This is a rank-1 decomposition — one pair of vectors.</desc>

  <defs>
    <pattern id="ld-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Start with One Pair — Column Vector × Row Vector</text>

  <!-- large matrix -->
  <rect x="70" y="70" width="120" height="120" rx="4" fill="url(#ld-hatch)" stroke="#000" stroke-width="1.7"/>
  <text x="130" y="135" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000" opacity="0.85">Large matrix</text>
  <text x="130" y="208" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.7">4096×4096 ≈ 16.8M cells</text>

  <!-- ≈ -->
  <text x="218" y="136" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="22" fill="#000">&#8776;</text>

  <!-- column vector (thin vertical bar) -->
  <rect x="248" y="70" width="13" height="120" rx="2" fill="#000" fill-opacity="0.08" stroke="#000" stroke-width="2"/>
  <text x="254" y="208" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Column vector</text>
  <text x="254" y="222" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.7">4096×1</text>

  <!-- × -->
  <text x="284" y="136" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="18" fill="#000">×</text>

  <!-- row vector (thin horizontal bar) -->
  <rect x="302" y="124" width="120" height="13" rx="2" fill="#000" fill-opacity="0.08" stroke="#000" stroke-width="2"/>
  <text x="362" y="160" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Row vector</text>
  <text x="362" y="174" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.7">1×4096</text>

  <!-- right-side conclusion -->
  <text x="470" y="118" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">Stored in</text>
  <text x="470" y="146" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="#000">8,192 values</text>
  <text x="470" y="167" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">restore the large matrix</text>

  <!-- divider + caption -->
  <line x1="40" y1="244" x2="640" y2="244" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="266" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Like a multiplication table, a column vector × row vector produces the large matrix</text>
  <text x="340" y="284" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">One pair of vectors = a rank-1 decomposition</text>
</svg>
