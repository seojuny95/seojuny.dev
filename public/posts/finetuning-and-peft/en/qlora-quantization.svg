<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>QLoRA — Original Model Quantized to 4-Bit; Only Adapter Trained</title>
  <desc>QLoRA compresses the original model from ~14 GB (16-bit) to ~3.5 GB (4-bit). The compressed original model is frozen, and only the small adapter placed on top is trained.</desc>

  <defs>
    <pattern id="ql-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
    <marker id="ql-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">QLoRA — Original Model to 4-Bit; Only Adapter Trained</text>

  <!-- Before -->
  <text x="160" y="64" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Before</text>
  <rect x="120" y="74" width="80" height="140" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="160" y="140" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Original model</text>
  <text x="160" y="156" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.6">16-bit</text>
  <text x="160" y="232" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#000">14 GB</text>

  <!-- compress arrow -->
  <text x="300" y="135" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">compress to 4-bit</text>
  <text x="300" y="152" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">1/4 memory</text>
  <path d="M 250 178 L 388 178" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#ql-arr)"/>

  <!-- After -->
  <text x="470" y="64" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">After</text>
  <!-- adapter (trained) -->
  <rect x="430" y="150" width="80" height="18" rx="3" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="2"/>
  <text x="470" y="163" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#000">Adapter</text>
  <!-- 4-bit original model (frozen) -->
  <rect x="430" y="170" width="80" height="44" rx="4" fill="url(#ql-hatch)" stroke="#000" stroke-width="1.6"/>
  <text x="470" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Original model</text>
  <text x="470" y="204" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.6">4-bit</text>
  <text x="470" y="232" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#000">3.5 GB</text>

  <!-- legend -->
  <rect x="210" y="252" width="14" height="11" rx="2" fill="url(#ql-hatch)" stroke="#000" stroke-width="1.3"/>
  <text x="230" y="261" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Frozen (not trained)</text>
  <rect x="350" y="252" width="14" height="11" rx="2" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.8"/>
  <text x="370" y="261" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Adapter (trained)</text>
</svg>
