<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Stack r Pairs to Get Two Small Matrices</title>
  <desc>Using only one pair of vectors produces changes too simple to be useful, so r pairs are stacked. r column vectors side by side become one small matrix (4096×r); r row vectors become another (r×4096). These two matrices are the adapter; multiplying them gives the large matrix to add to the original. r is the number of stacked pairs — the rank. With r=8, there are ~65,536 values to train, only 0.4% of the total.</desc>

  <defs>
    <pattern id="lr-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">One Pair Isn't Enough — Stack r Pairs into Two Small Matrices</text>

  <!-- delta matrix -->
  <rect x="58" y="62" width="100" height="100" rx="4" fill="url(#lr-hatch)" stroke="#000" stroke-width="1.7"/>
  <text x="108" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000" opacity="0.85">Delta matrix</text>
  <text x="108" y="180" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.7">4096×4096</text>

  <!-- ≈ -->
  <text x="180" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="20" fill="#000">&#8776;</text>

  <!-- B: r column vectors stacked -->
  <rect x="204" y="62" width="56" height="100" rx="3" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="2"/>
  <g stroke="#000" stroke-width="0.7" opacity="0.55">
    <line x1="211" y1="62" x2="211" y2="162"/>
    <line x1="218" y1="62" x2="218" y2="162"/>
    <line x1="225" y1="62" x2="225" y2="162"/>
    <line x1="232" y1="62" x2="232" y2="162"/>
    <line x1="239" y1="62" x2="239" y2="162"/>
    <line x1="246" y1="62" x2="246" y2="162"/>
    <line x1="253" y1="62" x2="253" y2="162"/>
  </g>
  <text x="232" y="180" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.75">4096×r</text>
  <text x="232" y="193" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.7">r columns</text>

  <!-- × -->
  <text x="280" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="17" fill="#000">×</text>

  <!-- A: r row vectors stacked -->
  <rect x="300" y="84" width="100" height="56" rx="3" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="2"/>
  <g stroke="#000" stroke-width="0.7" opacity="0.55">
    <line x1="300" y1="91" x2="400" y2="91"/>
    <line x1="300" y1="98" x2="400" y2="98"/>
    <line x1="300" y1="105" x2="400" y2="105"/>
    <line x1="300" y1="112" x2="400" y2="112"/>
    <line x1="300" y1="119" x2="400" y2="119"/>
    <line x1="300" y1="126" x2="400" y2="126"/>
    <line x1="300" y1="133" x2="400" y2="133"/>
  </g>
  <text x="350" y="158" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.75">r×4096</text>
  <text x="350" y="171" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.7">r rows</text>

  <!-- right-side conclusion -->
  <text x="450" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">when r = 8</text>
  <text x="450" y="128" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="700" fill="#000">65,536 vals</text>
  <text x="450" y="149" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">= 0.4% of total</text>

  <!-- divider + caption -->
  <line x1="40" y1="232" x2="640" y2="232" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="254" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000"><tspan font-weight="600">r</tspan> = number of stacked pairs (rank). r columns → one small matrix; r rows → another</text>
  <text x="340" y="272" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">Larger r captures more complex changes but increases training cost — typically 8 or 16</text>
</svg>
