<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>4-Bit Is Storage Only — One Cell Expands to 16-Bit for Computation</title>
  <desc>The entire model (7 billion weights) lives in GPU memory in 4-bit (~3.5 GB). Only the weight about to be multiplied is momentarily expanded to 16-bit for computation, then discarded. Because the whole model is never unpacked at once, the resident model stays at its compressed 4-bit size.</desc>

  <defs>
    <pattern id="dq-hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.6" opacity="0.22"/>
    </pattern>
    <marker id="dq-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">4-Bit Is Storage Only — One Cell Expands to 16-Bit for Computation</text>

  <!-- left: GPU memory (full model in 4-bit) -->
  <text x="163" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">GPU Memory</text>
  <rect x="48" y="68" width="230" height="150" rx="5" fill="#fff" stroke="#000" stroke-width="1.6"/>

  <!-- 4-bit weight cells (frozen · compressed) -->
  <g stroke="#000" stroke-width="1.3">
    <rect x="72"  y="84"  width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="110" y="84"  width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="148" y="84"  width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="186" y="84"  width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="72"  y="112" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="110" y="112" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="148" y="112" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="186" y="112" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="224" y="112" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="72"  y="140" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="110" y="140" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="148" y="140" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="186" y="140" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="224" y="140" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="72"  y="168" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="110" y="168" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="148" y="168" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="186" y="168" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
    <rect x="224" y="168" width="30" height="20" rx="2.5" fill="url(#dq-hatch)"/>
  </g>
  <!-- active cell -->
  <rect x="224" y="84" width="30" height="20" rx="2.5" fill="#000" fill-opacity="0.12" stroke="#000" stroke-width="2.2"/>

  <text x="163" y="206" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">7B weights · stored in 4-bit</text>
  <text x="163" y="238" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#000">3.5 GB unchanged</text>

  <!-- center: expand arrow -->
  <text x="362" y="82" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.8">when needed, only that cell</text>
  <path d="M 260 94 L 462 94" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#dq-arr)"/>
  <text x="362" y="110" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">briefly to 16-bit</text>

  <!-- right: expand, multiply, discard -->
  <rect x="470" y="72" width="152" height="50" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="546" y="92"  text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Expanded to 16-bit</text>
  <text x="546" y="108" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.6">used in multiply</text>

  <!-- discard → dashed back to memory -->
  <path d="M 512 124 C 430 196, 350 212, 282 186" fill="none" stroke="#000" stroke-width="1.3" stroke-dasharray="4 4" opacity="0.7" marker-end="url(#dq-arr)"/>
  <text x="402" y="214" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">discard after use — same for each next cell</text>

  <!-- caption -->
  <line x1="40" y1="256" x2="640" y2="256" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="278" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">The full model is never unpacked at once, so the resident model stays at its 4-bit size</text>
</svg>
