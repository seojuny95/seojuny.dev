<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Double Quantization — Compressing the Scale Factors Too</title>
  <desc>Storing weights in 4-bit groups of 64 requires one 32-bit scale factor per group. A 7B model has over 100 million groups, totaling hundreds of MB. Double quantization quantizes those scale factors once more, to 8-bit, shrinking them to roughly one-quarter the size.</desc>

  <defs>
    <pattern id="dq2-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.18"/>
    </pattern>
    <marker id="dq2-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Double Quantization — Compress the Scale Factors Too</text>

  <!-- top: where does the scale factor come from -->
  <text x="340" y="52" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.85">Weights stored in groups of 64 (4-bit); each group gets one scale factor</text>

  <rect x="176" y="70" width="80" height="44" rx="4" fill="url(#dq2-hatch)" stroke="#000" stroke-width="1.6"/>
  <text x="216" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Weight group</text>
  <text x="216" y="104" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#000" opacity="0.6">64 × 4-bit</text>

  <path d="M 262 92 L 300 92" fill="none" stroke="#000" stroke-width="1.4" marker-end="url(#dq2-arr)"/>

  <rect x="306" y="72" width="76" height="40" rx="4" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="1.6"/>
  <text x="344" y="90" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Scale factor</text>
  <text x="344" y="104" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#000" opacity="0.6">32-bit</text>

  <text x="400" y="88" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">One per group</text>
  <text x="400" y="102" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#000" opacity="0.55">(&gt;100M for 7B)</text>

  <!-- divider -->
  <line x1="40" y1="138" x2="640" y2="138" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.45"/>

  <!-- bottom: scale factors compressed to 8-bit -->
  <text x="340" y="162" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.85">Double quantization: compress those scale factors once more to 8-bit</text>

  <rect x="176" y="180" width="80" height="46" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="216" y="202" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">Scale factor</text>
  <text x="216" y="217" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.6">32-bit</text>
  <text x="216" y="250" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Total: hundreds of MB</text>

  <text x="330" y="193" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">quantize to 8-bit</text>
  <path d="M 268 204 L 392 204" fill="none" stroke="#000" stroke-width="1.5" marker-end="url(#dq2-arr)"/>

  <rect x="430" y="189" width="80" height="30" rx="4" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.6"/>
  <text x="470" y="208" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000">8-bit</text>
  <text x="470" y="250" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">~1/4</text>

  <!-- caption -->
  <line x1="40" y1="270" x2="640" y2="270" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">Weights are already 4-bit. Shrinking their scale factors saves additional memory</text>
</svg>
