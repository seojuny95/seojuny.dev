<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>줄을 r쌍 겹쳐 작은 행렬 두 개로</title>
  <desc>줄 한 쌍만으로는 표현이 단순해서, 세로·가로 줄을 r쌍 겹쳐 쓴다. 세로 줄 r개를 옆으로 모으면 작은 행렬 하나(4096×r), 가로 줄 r개를 모으면 또 하나(r×4096)가 된다. 이 두 행렬이 어댑터이고, 곱하면 원본에 더할 큰 행렬이 된다. r은 겹친 줄 쌍의 개수, 곧 랭크다. 그림은 r=8인 경우로, 학습할 숫자가 약 6.5만 개, 전체의 0.4%로 줄어든다.</desc>

  <defs>
    <pattern id="lr-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">줄 한 쌍은 약하니 — r쌍 겹쳐 작은 행렬 두 개로</text>

  <!-- 더할 행렬 -->
  <rect x="58" y="62" width="100" height="100" rx="4" fill="url(#lr-hatch)" stroke="#000" stroke-width="1.7"/>
  <text x="108" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000" opacity="0.85">더할 행렬</text>
  <text x="108" y="180" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.7">4096×4096</text>

  <!-- ≈ -->
  <text x="180" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="20" fill="#000">&#8776;</text>

  <!-- B: 세로 줄 r개를 모은 행렬 -->
  <rect x="204" y="62" width="56" height="100" rx="3" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="2"/>
  <g stroke="#000" stroke-width="0.7" opacity="0.55">
    <line x1="211" y1="62" x2="211" y2="162"/>
    <line x1="218" y1="62" x2="218" y2="162"/>
    <line x1="225" y1="62" x2="225" y2="162"/>
    <line x1="232" y1="62" x2="232" y2="162"/>
    <line x1="239" y1="62" x2="239" y2="162"/>
    <line x1="246" y1="62" x2="246" y2="162"/>
    <line x1="253" y1="62" x2="253" y2="162"/>
  </g>
  <text x="232" y="180" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.75">4096×r</text>
  <text x="232" y="193" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.7">세로 줄 r개</text>

  <!-- × -->
  <text x="280" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="17" fill="#000">×</text>

  <!-- A: 가로 줄 r개를 모은 행렬 -->
  <rect x="300" y="84" width="100" height="56" rx="3" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="2"/>
  <g stroke="#000" stroke-width="0.7" opacity="0.55">
    <line x1="300" y1="91" x2="400" y2="91"/>
    <line x1="300" y1="98" x2="400" y2="98"/>
    <line x1="300" y1="105" x2="400" y2="105"/>
    <line x1="300" y1="112" x2="400" y2="112"/>
    <line x1="300" y1="119" x2="400" y2="119"/>
    <line x1="300" y1="126" x2="400" y2="126"/>
    <line x1="300" y1="133" x2="400" y2="133"/>
  </g>
  <text x="350" y="158" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.75">r×4096</text>
  <text x="350" y="171" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.7">가로 줄 r개</text>

  <!-- 오른쪽 결론 -->
  <text x="450" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">r = 8이면</text>
  <text x="450" y="128" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="700" fill="#000">6.5만 개</text>
  <text x="450" y="149" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">= 전체의 0.4%</text>

  <!-- 구분선 + 캡션 -->
  <line x1="40" y1="232" x2="640" y2="232" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="254" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000"><tspan font-weight="600">r</tspan> = 겹친 줄 쌍의 개수(랭크). 세로 줄 r개, 가로 줄 r개를 각각 묶어 작은 행렬 두 개로 만든다</text>
  <text x="340" y="272" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">r이 클수록 더 복잡한 변화까지 담지만 학습량도 는다 — 보통 8이나 16</text>
</svg>
