<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>풀 파인튜닝 메모리 — 파라미터당 약 16byte</title>
  <desc>풀 파인튜닝은 가중치(2byte)뿐 아니라 기울기(2byte), 옵티마이저 상태와 가중치 사본(약 12byte)까지 메모리에 올려야 해서 파라미터당 약 16byte가 든다. 70억 파라미터 모델이면 약 112GB로, 개인 GPU 16~24GB로는 한참 모자란다.</desc>

  <defs>
    <pattern id="fm-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
    <marker id="fm-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">풀 파인튜닝 메모리 — 파라미터 1개당 약 16byte</text>

  <!-- 16byte 스택 바 -->
  <!-- 옵티마이저 상태 12B -->
  <rect x="110" y="64" width="64" height="132" fill="url(#fm-hatch)" stroke="#000" stroke-width="1.5"/>
  <text x="184" y="126" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">옵티마이저 + 사본</text>
  <text x="184" y="142" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#000" opacity="0.7">≈ 12 B</text>
  <!-- 기울기 2B -->
  <rect x="110" y="196" width="64" height="22" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.5"/>
  <text x="184" y="211" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">기울기 <tspan font-family="ui-monospace, Menlo, monospace" font-size="10.5" opacity="0.7">2 B</tspan></text>
  <!-- 가중치 2B -->
  <rect x="110" y="218" width="64" height="22" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="184" y="233" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">가중치 <tspan font-family="ui-monospace, Menlo, monospace" font-size="10.5" opacity="0.7">2 B</tspan></text>

  <text x="142" y="258" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">1개당 ≈ 16 B</text>

  <!-- × 70억 = 112GB -->
  <path d="M 305 150 L 345 150" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#fm-arr)"/>
  <text x="352" y="143" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">× 70억 파라미터</text>
  <text x="352" y="166" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">≈ 112 GB</text>

  <!-- 격차 비교 바 -->
  <rect x="520" y="70" width="40" height="170" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.6"/>
  <text x="540" y="62" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10.5" font-weight="600" fill="#000">112GB</text>
  <text x="540" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">필요</text>

  <rect x="582" y="204" width="40" height="36" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="602" y="196" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10.5" fill="#000" opacity="0.85">~24GB</text>
  <text x="602" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">내 GPU</text>

  <!-- 캡션 -->
  <text x="340" y="286" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">가중치보다 학습에 딸려 오는 데이터(기울기·옵티마이저)가 메모리 대부분을 차지한다</text>
</svg>
