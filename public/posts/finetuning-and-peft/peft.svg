<svg width="100%" viewBox="0 0 680 290" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>PEFT — 본체는 동결하고 작은 어댑터만 학습</title>
  <desc>사전학습 본체의 모든 layer는 동결하고, 각 layer에 새로 끼워 넣은 작은 어댑터만 학습한다. 학습하는 파라미터가 전체의 1%도 안 되어 가볍고 저장 비용이 작다.</desc>

  <defs>
    <pattern id="pe-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.2"/>
    </pattern>
    <marker id="pe-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">PEFT — 본체는 동결하고, 작은 어댑터만 학습</text>

  <text x="247" y="80" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">사전학습 본체 (동결)</text>

  <!-- layer1 + 어댑터 -->
  <rect x="172" y="92" width="150" height="26" rx="5" fill="url(#pe-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="247" y="109" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9312;</text>
  <rect x="326" y="97" width="34" height="16" rx="4" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <!-- layer2 + 어댑터 -->
  <rect x="172" y="125" width="150" height="26" rx="5" fill="url(#pe-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="247" y="142" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9313;</text>
  <rect x="326" y="130" width="34" height="16" rx="4" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <!-- layer3 + 어댑터 -->
  <rect x="172" y="158" width="150" height="26" rx="5" fill="url(#pe-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="247" y="175" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9314;</text>
  <rect x="326" y="163" width="34" height="16" rx="4" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>
  <!-- layer4 + 어댑터 -->
  <rect x="172" y="191" width="150" height="26" rx="5" fill="url(#pe-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="247" y="208" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">layer &#9315;</text>
  <rect x="326" y="196" width="34" height="16" rx="4" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="2.2"/>

  <!-- 어댑터 callout -->
  <path d="M 382 150 L 364 142" fill="none" stroke="#000" stroke-width="1" opacity="0.6" marker-end="url(#pe-arr)"/>
  <text x="386" y="146" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">작은 어댑터</text>
  <text x="386" y="163" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.75">이것만 학습 · ~0.x%</text>

  <!-- 캡션 -->
  <text x="340" y="252" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">본체는 동결하고, 끼워 넣은 작은 어댑터만 학습 — 가볍고 저장도 작다</text>

  <!-- 범례 -->
  <rect x="206" y="270" width="16" height="12" rx="2" fill="url(#pe-hatch)" stroke="#000" stroke-width="1.4"/>
  <text x="228" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.75">동결(freeze)</text>
  <rect x="350" y="270" width="16" height="12" rx="2" fill="#000" fill-opacity="0.06" stroke="#000" stroke-width="1.8"/>
  <text x="372" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.75">학습(어댑터)</text>
</svg>
