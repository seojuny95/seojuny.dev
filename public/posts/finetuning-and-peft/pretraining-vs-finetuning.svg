<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>사전학습 vs 파인튜닝 — 출발점이 다르다</title>
  <desc>사전학습은 인터넷 규모 데이터로 백지 상태의 모델을 처음부터 학습시켜 원본 모델을 만드는 단계로, 수천 장의 GPU와 막대한 비용이 든다. 파인튜닝은 그 원본 모델을 출발점 삼아 작은 데이터로 가중치를 조금 더 조정해 내 모델을 만드는 단계다.</desc>

  <defs>
    <marker id="pf-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">사전학습 vs 파인튜닝 — 출발점이 다르다</text>

  <!-- ===== 사전학습 (위) ===== -->
  <g transform="rotate(-2 68 57)">
    <rect x="22" y="46" width="92" height="22" rx="3" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="68" y="57" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">사전학습</text>
  </g>

  <!-- 데이터 -->
  <rect x="34" y="86" width="120" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="94" y="110" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">인터넷 규모</text>
  <text x="94" y="127" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">데이터</text>

  <path d="M 156 115 L 200 115" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pf-arr)"/>

  <!-- 백지 모델 -->
  <rect x="204" y="86" width="132" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="270" y="110" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">백지 모델</text>
  <text x="270" y="127" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">랜덤 가중치</text>

  <path d="M 338 115 L 392 115" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pf-arr)"/>
  <text x="365" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">처음부터</text>

  <!-- 원본 모델 -->
  <rect x="396" y="86" width="150" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="471" y="108" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">원본 모델</text>
  <text x="471" y="126" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">GPT · Llama · Qwen</text>

  <text x="290" y="167" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">수천 장의 GPU · 막대한 비용 — 우리가 직접 하긴 어려운 단계</text>

  <!-- 구분선 -->
  <line x1="40" y1="196" x2="640" y2="196" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- ===== 파인튜닝 (아래) ===== -->
  <g transform="rotate(-2 68 225)">
    <rect x="22" y="214" width="92" height="22" rx="3" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="68" y="225" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">파인튜닝</text>
  </g>

  <!-- 원본 모델 (출발점) -->
  <rect x="36" y="242" width="120" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="96" y="266" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">원본 모델</text>
  <text x="96" y="283" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">위에서 가져옴</text>

  <text x="172" y="277" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="400" fill="#000" opacity="0.7">+</text>

  <!-- 내 데이터 -->
  <rect x="190" y="242" width="118" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="249" y="266" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">내 데이터</text>
  <text x="249" y="283" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">(작음)</text>

  <path d="M 310 271 L 388 271" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pf-arr)"/>
  <text x="349" y="259" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">조금 더 학습</text>

  <!-- 내 모델 -->
  <rect x="392" y="242" width="154" height="58" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="469" y="264" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">내 모델</text>
  <text x="469" y="282" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">도메인 · 말투 맞춤</text>

  <text x="291" y="328" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">이미 언어를 아는 모델에서 출발 — 적은 데이터로도 충분하다</text>

  <text x="340" y="360" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">우리가 할 수 있는 건 아래쪽, 파인튜닝 단계다</text>
</svg>
