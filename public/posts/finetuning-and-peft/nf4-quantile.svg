<svg width="100%" viewBox="0 0 680 296" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>NF4 표 만들기 — 정규분포를 넓이로 16등분한다</title>
  <desc>모델 가중치는 0을 중심으로 한 정규분포(종 모양)를 닮았다. NF4는 곡선 아래 면적을 똑같은 16조각으로 자르고 각 조각의 대표값을 표에 적는다. 같은 넓이라도 값이 몰린 0 근처는 폭이 좁아 칸이 촘촘하고, 값이 드문 양 끝은 폭이 넓어 듬성하다. 그래서 표의 16개 값이 0 근처에 모인다.</desc>

  <defs>
    <pattern id="nq-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#000" stroke-width="0.6" opacity="0.14"/>
    </pattern>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">NF4 표 만들기 — 정규분포를 '넓이'로 16등분한다</text>
  <text x="340" y="46" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">색칠한 두 칸의 넓이는 같다 — 폭만 다르다 (각 1/16)</text>

  <!-- 가중치 분포 (종 모양) -->
  <path d="M 80 180 C 225 180 280 82 340 82 C 400 82 455 180 600 180 Z" fill="url(#nq-hatch)" stroke="#000" stroke-width="1.6"/>

  <!-- 같은 넓이의 두 칸: 0 근처(좁음) vs 양 끝(넓음) -->
  <rect x="332" y="86" width="16" height="94" fill="#000" fill-opacity="0.16" stroke="#000" stroke-width="0.8" stroke-opacity="0.4"/>
  <rect x="450" y="150" width="124" height="30" fill="#000" fill-opacity="0.16" stroke="#000" stroke-width="0.8" stroke-opacity="0.4"/>

  <text x="340" y="78" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.8">좁음</text>
  <text x="512" y="143" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.8">넓음</text>
  <text x="150" y="120" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.85">가중치는 0 근처에 몰린다</text>

  <!-- 기준선 -->
  <line x1="70" y1="180" x2="610" y2="180" stroke="#000" stroke-width="1" opacity="0.5"/>

  <!-- 표의 16개 값 (분위수) — 0 근처 촘촘, 양 끝 듬성 -->
  <g fill="#000">
    <circle cx="82"  cy="180" r="2.8"/>
    <circle cx="125" cy="180" r="2.8"/>
    <circle cx="180" cy="180" r="2.8"/>
    <circle cx="225" cy="180" r="2.8"/>
    <circle cx="260" cy="180" r="2.8"/>
    <circle cx="288" cy="180" r="2.8"/>
    <circle cx="310" cy="180" r="2.8"/>
    <circle cx="330" cy="180" r="2.8"/>
    <circle cx="350" cy="180" r="2.8"/>
    <circle cx="370" cy="180" r="2.8"/>
    <circle cx="392" cy="180" r="2.8"/>
    <circle cx="420" cy="180" r="2.8"/>
    <circle cx="455" cy="180" r="2.8"/>
    <circle cx="500" cy="180" r="2.8"/>
    <circle cx="555" cy="180" r="2.8"/>
    <circle cx="598" cy="180" r="2.8"/>
  </g>

  <!-- 값 축 -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="9.5" fill="#000" opacity="0.5" text-anchor="middle">
    <text x="82"  y="197">-1</text>
    <text x="340" y="197">0</text>
    <text x="598" y="197">+1</text>
  </g>

  <text x="340" y="222" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">↑ 각 조각의 대표값이 표의 16개 값 — 0 근처 촘촘 · 양 끝 듬성</text>

  <!-- 캡션 -->
  <line x1="40" y1="250" x2="640" y2="250" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <text x="340" y="272" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">넓이를 똑같이 16등분하니, 값이 몰린 0 근처일수록 칸이 촘촘해진다</text>
</svg>
