<svg width="100%" viewBox="0 0 680 170" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>이미지 인코더 + LLM = 이미지를 보고 답하는 모델</title>
  <desc>CLIP이 정렬해 둔 이미지 인코더(이미지를 이해)에 글을 생성하는 LLM을 붙이면, 이미지를 보고 텍스트로 답하는 모델(VLM)이 된다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .acc { fill: #fff8f4; stroke: #f26522; stroke-width: 2.2; }
      .lbl { font-size: 12.5px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
      .op { font-size: 20px; font-weight: 600; text-anchor: middle; fill: #8a8a85; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
  </defs>

  <text x="340" y="26" class="hdr">이미지 인코더 + LLM = 보고 답하는 모델</text>

  <rect class="box" x="24" y="56" width="180" height="70" rx="8"/>
  <text x="114" y="84" class="lbl" dominant-baseline="central">CLIP 이미지 인코더</text>
  <text x="114" y="103" class="sub">이미지를 이해</text>

  <text x="218" y="93" class="op" dominant-baseline="central">+</text>

  <rect class="box" x="234" y="56" width="120" height="70" rx="8"/>
  <text x="294" y="84" class="lbl" dominant-baseline="central">LLM</text>
  <text x="294" y="103" class="sub">글을 생성</text>

  <text x="368" y="93" class="op" dominant-baseline="central">=</text>

  <rect class="acc" x="384" y="50" width="272" height="82" rx="9"/>
  <text x="520" y="82" class="lbl" dominant-baseline="central">이미지를 보고 답하는 모델</text>
  <text x="520" y="102" class="sub">VLM (Vision-Language Model)</text>

  <text x="340" y="158" class="cap">이해하는 인코더에 생성하는 LLM을 붙이면, 보고 답하는 멀티모달 모델이 된다</text>
</svg>
