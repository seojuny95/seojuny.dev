<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RNN과 Transformer의 처리 방식</title>
  <desc>RNN은 단어를 순서대로 읽으며 상태를 넘기는데 앞 단어일수록 신호가 약해진다. Transformer는 모든 단어가 동시에 서로를 직접 참조해 멀리 떨어진 단어끼리도 바로 연결된다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .wd { font-size: 12px; font-weight: 600; text-anchor: middle; }
      .sec { font-size: 12.5px; font-weight: 700; text-anchor: start; }
      .note { font-size: 11px; fill: #8a8a85; text-anchor: middle; }
      .hs { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="rt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ===== RNN ===== -->
  <text x="40" y="54" class="sec">RNN — 순서대로 처리</text>

  <path d="M 18 89 L 38 89" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <text x="14" y="76" class="hs">h₀</text>

  <g opacity="0.4">
    <rect class="box" x="40" y="70" width="96" height="38" rx="6"/>
    <text x="88" y="89" class="wd" dominant-baseline="central">나는</text>
  </g>
  <path d="M 138 89 L 166 89" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <g opacity="0.6">
    <rect class="box" x="168" y="70" width="96" height="38" rx="6"/>
    <text x="216" y="89" class="wd" dominant-baseline="central">서울에서</text>
  </g>
  <path d="M 266 89 L 294 89" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <g opacity="0.8">
    <rect class="box" x="296" y="70" width="96" height="38" rx="6"/>
    <text x="344" y="89" class="wd" dominant-baseline="central">부산에서</text>
  </g>
  <path d="M 394 89 L 422 89" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <rect class="box" x="424" y="70" width="96" height="38" rx="6"/>
  <text x="472" y="89" class="wd" dominant-baseline="central">산다</text>

  <text x="280" y="134" class="note">앞 단어일수록 신호가 약해진다 (기울기 소실) · 순차 처리라 느리다</text>

  <!-- ===== Transformer ===== -->
  <text x="40" y="190" class="sec">Transformer — 동시에 처리</text>

  <!-- all-to-all 연결 -->
  <g fill="none" stroke="#f26522" stroke-width="1.3" opacity="0.55" stroke-linecap="round">
    <path d="M 88 280 Q 152 250 216 280"/>
    <path d="M 216 280 Q 280 250 344 280"/>
    <path d="M 344 280 Q 408 250 472 280"/>
    <path d="M 88 280 Q 216 230 344 280"/>
    <path d="M 216 280 Q 344 230 472 280"/>
    <path d="M 88 280 Q 280 210 472 280"/>
  </g>

  <rect class="box" x="40" y="280" width="96" height="38" rx="6"/>
  <text x="88" y="299" class="wd" dominant-baseline="central">나는</text>
  <rect class="box" x="168" y="280" width="96" height="38" rx="6"/>
  <text x="216" y="299" class="wd" dominant-baseline="central">서울에서</text>
  <rect class="box" x="296" y="280" width="96" height="38" rx="6"/>
  <text x="344" y="299" class="wd" dominant-baseline="central">부산에서</text>
  <rect class="box" x="424" y="280" width="96" height="38" rx="6"/>
  <text x="472" y="299" class="wd" dominant-baseline="central">산다</text>

  <text x="280" y="340" class="note">모든 단어가 동시에 서로 참조 — 멀리 떨어져도 바로 연결, 병렬 처리</text>
</svg>
