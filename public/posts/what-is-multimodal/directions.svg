<svg width="100%" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>멀티모달의 세 가지 방향</title>
  <desc>멀티모달은 입력과 출력 중 어느 쪽이 여러 모달이냐에 따라 셋으로 나뉜다. 멀티모달 입력에서 텍스트 출력(이해), 텍스트 입력에서 멀티모달 출력(생성), 멀티모달 입력에서 멀티모달 출력(옴니).</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .mdl { fill: #fff8f4; stroke: #f26522; stroke-width: 2; }
      .bt { font-size: 11px; font-weight: 600; text-anchor: middle; }
      .tag { font-size: 12px; font-weight: 700; text-anchor: start; }
      .ex { font-size: 9px; fill: #8a8a85; text-anchor: start; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="dr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" class="hdr">멀티모달의 세 가지 방향</text>

  <!-- ① 멀티모달 → 텍스트 -->
  <text x="110" y="52" class="tag">① 멀티모달 → 텍스트 · 이해</text>
  <rect class="box" x="110" y="60" width="150" height="40" rx="6"/>
  <text x="185" y="80" class="bt" dominant-baseline="central">이미지 · 오디오 · 영상</text>
  <path d="M 262 80 L 298 80" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#dr-arr)"/>
  <rect class="mdl" x="300" y="60" width="80" height="40" rx="6"/>
  <text x="340" y="80" class="bt" dominant-baseline="central">모델</text>
  <path d="M 382 80 L 408 80" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#dr-arr)"/>
  <rect class="box" x="410" y="60" width="150" height="40" rx="6"/>
  <text x="485" y="80" class="bt" dominant-baseline="central">텍스트</text>
  <text x="568" y="80" class="ex" dominant-baseline="central">VLM · Whisper</text>

  <!-- ② 텍스트 → 멀티모달 -->
  <text x="110" y="140" class="tag">② 텍스트 → 멀티모달 · 생성</text>
  <rect class="box" x="110" y="148" width="150" height="40" rx="6"/>
  <text x="185" y="168" class="bt" dominant-baseline="central">텍스트</text>
  <path d="M 262 168 L 298 168" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#dr-arr)"/>
  <rect class="mdl" x="300" y="148" width="80" height="40" rx="6"/>
  <text x="340" y="168" class="bt" dominant-baseline="central">모델</text>
  <path d="M 382 168 L 408 168" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#dr-arr)"/>
  <rect class="box" x="410" y="148" width="150" height="40" rx="6"/>
  <text x="485" y="168" class="bt" dominant-baseline="central">이미지 · 오디오 · 영상</text>
  <text x="568" y="168" class="ex" dominant-baseline="central">이미지 생성</text>

  <!-- ③ 멀티모달 → 멀티모달 -->
  <text x="110" y="228" class="tag">③ 멀티모달 → 멀티모달 · 옴니</text>
  <rect class="box" x="110" y="236" width="150" height="40" rx="6"/>
  <text x="185" y="256" class="bt" dominant-baseline="central">이미지 · 오디오 · 영상</text>
  <path d="M 262 256 L 298 256" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#dr-arr)"/>
  <rect class="mdl" x="300" y="236" width="80" height="40" rx="6"/>
  <text x="340" y="256" class="bt" dominant-baseline="central">모델</text>
  <path d="M 382 256 L 408 256" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#dr-arr)"/>
  <rect class="box" x="410" y="236" width="150" height="40" rx="6"/>
  <text x="485" y="256" class="bt" dominant-baseline="central">이미지 · 오디오 · 영상</text>
  <text x="568" y="256" class="ex" dominant-baseline="central">GPT-4o</text>

  <text x="340" y="312" class="cap">입력과 출력 중 어느 쪽이 여러 모달이냐로 나뉜다 — 이번 실습은 세 방향을 모두 다룬다</text>
</svg>
