<svg width="100%" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>프로젝터가 하는 두 가지 — 차원 맞추기와 개수 줄이기</title>
  <desc>인코더가 내놓는 많고 좁은(1024차원) 패치 벡터를, 프로젝터가 LLM 차원(4096)으로 맞추고 개수를 줄여, 적고 넓은 토큰으로 바꿔 LLM에 넣는다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .acc { fill: #fff8f4; stroke: #f26522; stroke-width: 2.2; }
      .barL { fill: #e8e8e5; stroke: #c4c4c0; stroke-width: 1; }
      .barR { fill: #fff3ea; stroke: #f26522; stroke-width: 1.4; }
      .lbl { font-size: 12px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
      .pj { font-size: 11px; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="pd-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" class="hdr">프로젝터가 하는 두 가지</text>

  <!-- 인코더 출력: 많고 좁은 벡터 -->
  <text x="92" y="54" class="lbl">인코더 출력</text>
  <g>
    <rect class="barL" x="40" y="70" width="9" height="56"/>
    <rect class="barL" x="55" y="70" width="9" height="56"/>
    <rect class="barL" x="70" y="70" width="9" height="56"/>
    <rect class="barL" x="85" y="70" width="9" height="56"/>
    <rect class="barL" x="100" y="70" width="9" height="56"/>
    <rect class="barL" x="115" y="70" width="9" height="56"/>
    <rect class="barL" x="130" y="70" width="9" height="56"/>
  </g>
  <text x="92" y="146" class="sub">패치 많음 · 1024차원</text>

  <path d="M 150 98 L 211 98" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pd-arr)"/>

  <!-- 프로젝터 -->
  <rect class="acc" x="213" y="66" width="172" height="64" rx="8"/>
  <text x="299" y="84" class="lbl" dominant-baseline="central">프로젝터</text>
  <text x="299" y="103" class="pj" dominant-baseline="central">① 차원 1024 → 4096</text>
  <text x="299" y="119" class="pj" dominant-baseline="central">② 개수 줄이기</text>

  <path d="M 387 98 L 470 98" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#pd-arr)"/>

  <!-- LLM 입력: 적고 넓은 토큰 -->
  <text x="516" y="54" class="lbl">LLM 입력 토큰</text>
  <g>
    <rect class="barR" x="476" y="70" width="20" height="56"/>
    <rect class="barR" x="506" y="70" width="20" height="56"/>
    <rect class="barR" x="536" y="70" width="20" height="56"/>
  </g>
  <text x="516" y="146" class="sub">토큰 적음 · 4096차원</text>

  <text x="340" y="184" class="cap">① 벡터 차원을 LLM에 맞추고, ② 토큰 수를 줄여 텍스트 토큰 사이에 끼워 넣는다</text>
</svg>
