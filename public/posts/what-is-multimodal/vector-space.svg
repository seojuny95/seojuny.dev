<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>벡터 공간 — 뜻이 가까우면 모인다</title>
  <desc>같은 벡터 공간에서 강아지 사진과 강아지 글자처럼 뜻이 같은 것은 모달이 달라도 가까이 모이고, 자동차처럼 뜻이 다른 것은 멀리 떨어진다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .plane { fill: #fafaf9; stroke: #ececea; stroke-width: 1.5; }
      .img { fill: #f26522; }
      .txt { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .word { font-size: 11.5px; font-weight: 600; text-anchor: middle; }
      .leg { font-size: 10.5px; dominant-baseline: central; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
  </defs>

  <text x="340" y="24" class="hdr">벡터 공간 — 뜻이 가까우면 모인다</text>

  <rect class="plane" x="40" y="42" width="600" height="170" rx="10"/>

  <!-- 강아지 클러스터 -->
  <line x1="150" y1="104" x2="184" y2="120" stroke="#f26522" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle class="img" cx="150" cy="104" r="7"/>
  <circle class="txt" cx="184" cy="120" r="6"/>
  <text x="167" y="86" class="word">강아지</text>

  <!-- 고양이 클러스터 -->
  <line x1="498" y1="96" x2="532" y2="112" stroke="#f26522" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle class="img" cx="498" cy="96" r="7"/>
  <circle class="txt" cx="532" cy="112" r="6"/>
  <text x="515" y="78" class="word">고양이</text>

  <!-- 자동차 클러스터 -->
  <line x1="322" y1="176" x2="356" y2="190" stroke="#f26522" stroke-width="1.2" stroke-dasharray="3 3"/>
  <circle class="img" cx="322" cy="176" r="7"/>
  <circle class="txt" cx="356" cy="190" r="6"/>
  <text x="339" y="164" class="word">자동차</text>

  <!-- 범례 -->
  <circle class="img" cx="244" cy="240" r="7"/>
  <text x="258" y="240" class="leg">이미지</text>
  <circle class="txt" cx="338" cy="240" r="6"/>
  <text x="352" y="240" class="leg">텍스트</text>

  <text x="340" y="268" class="cap">강아지 사진과 "강아지" 글자는 모달이 달라도 가까이, 자동차는 멀리 떨어진다</text>
</svg>
