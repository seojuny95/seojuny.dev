<svg width="100%" viewBox="0 0 680 252" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>확산 모델 — 노이즈에서 그림으로</title>
  <desc>무작위 노이즈에서 시작해 텍스트 조건에 맞게 노이즈를 수십 번 걷어내면 흐릿하던 화면이 점점 또렷한 그림으로 떠오른다. 이미지 생성의 주류인 확산 모델의 동작이다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .sq { fill: #fafaf9; stroke: #ececea; stroke-width: 1.5; }
      .cond { fill: #fff8f4; stroke: #f26522; stroke-width: 2; }
      .ct { font-size: 11.5px; font-weight: 600; text-anchor: middle; }
      .st { font-size: 11px; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .guide { font-size: 9.5px; fill: #f26522; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
      .dot { fill: #8a8a85; }
    </style>
    <marker id="ds-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <g id="ds-cat" fill="none" stroke="#171717" stroke-width="2" stroke-linejoin="round">
      <circle cx="0" cy="2" r="17"/>
      <path d="M -13 -10 L -19 -26 L -3 -14 Z"/>
      <path d="M 13 -10 L 19 -26 L 3 -14 Z"/>
      <circle cx="-6" cy="0" r="1.8" fill="#171717" stroke="none"/>
      <circle cx="6" cy="0" r="1.8" fill="#171717" stroke="none"/>
      <path d="M -11 9 L 11 9" stroke-width="1.4"/>
    </g>
  </defs>

  <text x="340" y="22" class="hdr">확산 — 노이즈에서 그림으로</text>

  <!-- 텍스트 조건 -->
  <rect class="cond" x="246" y="36" width="188" height="28" rx="6"/>
  <text x="340" y="50" class="ct" dominant-baseline="central">텍스트 조건: "고양이"</text>
  <path d="M 340 64 L 340 96" fill="none" stroke="#f26522" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="4 3" marker-end="url(#ds-arr)"/>
  <text x="408" y="82" class="guide">매 단계 안내</text>

  <!-- 4 단계 -->
  <rect class="sq" x="36" y="100" width="110" height="100" rx="6"/>
  <rect class="sq" x="196" y="100" width="110" height="100" rx="6"/>
  <rect class="sq" x="356" y="100" width="110" height="100" rx="6"/>
  <rect class="sq" x="516" y="100" width="110" height="100" rx="6"/>

  <!-- 노이즈 점 (단계가 갈수록 줄어든다) -->
  <g class="dot">
    <circle cx="58" cy="120" r="1.8"/><circle cx="92" cy="116" r="1.8"/><circle cx="120" cy="124" r="1.8"/><circle cx="70" cy="138" r="1.8"/>
    <circle cx="104" cy="142" r="1.8"/><circle cx="50" cy="152" r="1.8"/><circle cx="86" cy="156" r="1.8"/><circle cx="124" cy="150" r="1.8"/>
    <circle cx="64" cy="170" r="1.8"/><circle cx="98" cy="172" r="1.8"/><circle cx="120" cy="182" r="1.8"/><circle cx="54" cy="186" r="1.8"/>
    <circle cx="78" cy="128" r="1.8"/><circle cx="112" cy="162" r="1.8"/><circle cx="90" cy="188" r="1.8"/><circle cx="132" cy="138" r="1.8"/>
    <circle cx="222" cy="122" r="1.8"/><circle cx="258" cy="118" r="1.8"/><circle cx="284" cy="134" r="1.8"/><circle cx="214" cy="152" r="1.8"/>
    <circle cx="250" cy="156" r="1.8"/><circle cx="286" cy="168" r="1.8"/><circle cx="228" cy="180" r="1.8"/><circle cx="266" cy="186" r="1.8"/><circle cx="244" cy="138" r="1.8"/>
    <circle cx="384" cy="124" r="1.8"/><circle cx="440" cy="140" r="1.8"/><circle cx="376" cy="178" r="1.8"/><circle cx="430" cy="184" r="1.8"/>
  </g>

  <!-- 고양이가 점점 또렷해진다 -->
  <use href="#ds-cat" x="251" y="148" opacity="0.3"/>
  <use href="#ds-cat" x="411" y="148" opacity="0.65"/>
  <use href="#ds-cat" x="571" y="148" opacity="1"/>

  <!-- 단계 사이 화살표 -->
  <path d="M 148 150 L 194 150" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arr)"/>
  <path d="M 308 150 L 354 150" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arr)"/>
  <path d="M 468 150 L 514 150" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ds-arr)"/>

  <text x="91" y="216" class="st">노이즈</text>
  <text x="251" y="216" class="st">걷어내는 중</text>
  <text x="411" y="216" class="st">흐릿</text>
  <text x="571" y="216" class="st">또렷한 고양이</text>

  <text x="340" y="242" class="cap">무작위 노이즈에서 시작해 텍스트에 맞게 조금씩 걷어내면 그림이 떠오른다 — 확산(diffusion)</text>
</svg>
