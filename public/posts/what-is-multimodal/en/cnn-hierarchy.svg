<svg width="100%" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CNN — Patterns Composed Layer by Layer</title>
  <desc>Small filters detect simple patterns like edges from raw pixels; as layers stack, they combine into curves, then facial parts like eyes, nose, and ears, and finally into a whole object like a cat.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .frame { fill: #fafaf9; stroke: #ececea; stroke-width: 1.4; }
      .lbl { font-size: 10.5px; font-weight: 600; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
      .stroke { fill: none; stroke: #171717; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="ch-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" class="hdr">CNN — Patterns Composed Layer by Layer</text>

  <!-- 5 frames -->
  <rect class="frame" x="18"  y="46" width="76" height="74" rx="6"/>
  <rect class="frame" x="150" y="46" width="76" height="74" rx="6"/>
  <rect class="frame" x="282" y="46" width="76" height="74" rx="6"/>
  <rect class="frame" x="414" y="46" width="76" height="74" rx="6"/>
  <rect class="frame" x="546" y="46" width="76" height="74" rx="6"/>

  <!-- ① Raw pixels + filter -->
  <g>
    <rect x="36" y="60" width="11" height="11" fill="#e8e8e5"/><rect x="47" y="60" width="11" height="11" fill="#d0d0cc"/><rect x="58" y="60" width="11" height="11" fill="#d0d0cc"/><rect x="69" y="60" width="11" height="11" fill="#e8e8e5"/>
    <rect x="36" y="71" width="11" height="11" fill="#d0d0cc"/><rect x="47" y="71" width="11" height="11" fill="#b3b3ae"/><rect x="58" y="71" width="11" height="11" fill="#b3b3ae"/><rect x="69" y="71" width="11" height="11" fill="#d0d0cc"/>
    <rect x="36" y="82" width="11" height="11" fill="#d0d0cc"/><rect x="47" y="82" width="11" height="11" fill="#9a9a95"/><rect x="58" y="82" width="11" height="11" fill="#b3b3ae"/><rect x="69" y="82" width="11" height="11" fill="#d0d0cc"/>
    <rect x="36" y="93" width="11" height="11" fill="#e8e8e5"/><rect x="47" y="93" width="11" height="11" fill="#d0d0cc"/><rect x="58" y="93" width="11" height="11" fill="#d0d0cc"/><rect x="69" y="93" width="11" height="11" fill="#e8e8e5"/>
  </g>
  <rect x="36" y="60" width="22" height="22" fill="none" stroke="#f26522" stroke-width="2"/>
  <text x="56" y="134" class="lbl">Pixels · Filter</text>

  <!-- ② Edges -->
  <path class="stroke" d="M 170 100 L 188 70 L 206 98"/>
  <path class="stroke" d="M 178 88 L 200 88" stroke-width="1.6"/>
  <text x="188" y="134" class="lbl">Edges</text>

  <!-- ③ Curves & shapes -->
  <path class="stroke" d="M 298 98 Q 320 66 342 98"/>
  <path class="stroke" d="M 302 84 Q 320 100 338 84" stroke-width="1.6"/>
  <text x="320" y="134" class="lbl">Curves &amp; Shapes</text>

  <!-- ④ Eyes, nose, ears -->
  <path class="stroke" d="M 440 78 L 448 64 L 458 80 Z"/>
  <ellipse cx="452" cy="92" rx="16" ry="9" class="stroke"/>
  <circle cx="452" cy="92" r="3" fill="#171717"/>
  <text x="452" y="134" class="lbl">Eyes·Nose·Ears</text>

  <!-- ⑤ Cat -->
  <circle cx="584" cy="86" r="15" class="stroke"/>
  <path class="stroke" d="M 572 78 L 568 64 L 580 74 Z"/>
  <path class="stroke" d="M 596 78 L 600 64 L 588 74 Z"/>
  <circle cx="579" cy="85" r="1.7" fill="#171717"/>
  <circle cx="589" cy="85" r="1.7" fill="#171717"/>
  <text x="584" y="134" class="lbl">Cat 92%</text>

  <!-- Arrows -->
  <path d="M 96 83 L 148 83" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch-arr)"/>
  <path d="M 228 83 L 280 83" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch-arr)"/>
  <path d="M 360 83 L 412 83" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch-arr)"/>
  <path d="M 492 83 L 544 83" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch-arr)"/>

  <text x="340" y="184" class="cap">Small filters detect simple patterns like edges first; stacking layers builds up to parts then the whole object</text>
</svg>
