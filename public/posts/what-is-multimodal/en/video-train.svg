<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Two Training Methods for Video-Native Models</title>
  <desc>Video-native models learn from video alone, without labels. Contrastive learning pulls a video clip and its caption close in the same vector space; masked prediction has the model reconstruct masked regions from the rest.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .space { fill: #fafaf9; stroke: #ececea; stroke-width: 1.5; }
      .cell { fill: #fff; stroke: #171717; stroke-width: 1.1; }
      .mask { fill: #171717; }
      .lbl { font-size: 11px; font-weight: 600; text-anchor: middle; }
      .tag { font-size: 11.5px; font-weight: 700; text-anchor: start; }
      .sub { font-size: 9.5px; fill: #8a8a85; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="vt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" class="hdr">How Video-Native Models Learn</text>

  <line x1="338" y1="50" x2="338" y2="208" stroke="#ececea" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ① Contrastive -->
  <text x="26" y="58" class="tag">① Contrastive — pair video &amp; text</text>
  <rect class="box" x="26" y="80" width="84" height="38" rx="6"/>
  <text x="68" y="99" class="lbl" dominant-baseline="central">Video</text>
  <rect class="box" x="26" y="132" width="152" height="38" rx="6"/>
  <text x="102" y="151" class="lbl" font-size="10" dominant-baseline="central">"A dog running"</text>

  <path d="M 110 99 C 150 99 175 112 208 116" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#vt-arr)"/>
  <path d="M 178 151 C 192 151 196 140 208 136" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#vt-arr)"/>

  <rect class="space" x="210" y="86" width="112" height="80" rx="8"/>
  <text x="266" y="100" class="sub">vector space</text>
  <line x1="248" y1="128" x2="284" y2="118" stroke="#f26522" stroke-width="1.3" stroke-dasharray="3 3"/>
  <circle cx="248" cy="128" r="6" fill="#f26522"/>
  <circle cx="284" cy="118" r="5" fill="#171717"/>
  <text x="266" y="152" class="sub" fill="#f26522">pull close</text>

  <!-- ② Masking -->
  <text x="360" y="58" class="tag">② Masking — predict masked regions</text>
  <g>
    <rect class="cell" x="372" y="82" width="22" height="22"/>
    <rect class="mask" x="396" y="82" width="22" height="22"/>
    <rect class="cell" x="420" y="82" width="22" height="22"/>
    <rect class="cell" x="444" y="82" width="22" height="22"/>
    <rect class="mask" x="372" y="106" width="22" height="22"/>
    <rect class="cell" x="396" y="106" width="22" height="22"/>
    <rect class="cell" x="420" y="106" width="22" height="22"/>
    <rect class="cell" x="444" y="106" width="22" height="22"/>
    <rect class="cell" x="372" y="130" width="22" height="22"/>
    <rect class="cell" x="396" y="130" width="22" height="22"/>
    <rect class="mask" x="420" y="130" width="22" height="22"/>
    <rect class="cell" x="444" y="130" width="22" height="22"/>
  </g>
  <path d="M 470 117 L 496 117" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#vt-arr)"/>
  <rect class="box" x="498" y="97" width="120" height="40" rx="7"/>
  <text x="558" y="117" class="lbl" font-size="10.5" dominant-baseline="central">Predict masked</text>

  <text x="340" y="236" class="cap">No labels needed — learn by pairing video with text (contrastive) or predicting masked regions</text>
</svg>
