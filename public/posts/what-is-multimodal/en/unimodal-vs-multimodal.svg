<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Unimodal vs Multimodal</title>
  <desc>Unimodal uses a separate model per modality — text and image models are independent. Multimodal feeds text, image, audio, and more into a single model that handles all modalities together.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .acc { fill: #fff; stroke: #f26522; stroke-width: 2.2; }
      .hdr { font-size: 13px; font-weight: 600; text-anchor: middle; }
      .lbl { font-size: 12.5px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 11px; fill: #8a8a85; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="mm1-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="30" class="hdr" font-size="14">Unimodal vs Multimodal</text>

  <!-- ===== Unimodal (left) ===== -->
  <text x="158" y="64" class="hdr">Unimodal</text>

  <rect class="box" x="34" y="92" width="80" height="40" rx="6"/>
  <text x="74" y="112" class="lbl" dominant-baseline="central">Text</text>
  <path d="M 116 112 L 146 112" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#mm1-arr)"/>
  <rect class="box" x="148" y="86" width="104" height="52" rx="6"/>
  <text x="200" y="112" class="lbl" dominant-baseline="central">Language model</text>

  <rect class="box" x="34" y="166" width="80" height="40" rx="6"/>
  <text x="74" y="186" class="lbl" dominant-baseline="central">Image</text>
  <path d="M 116 186 L 146 186" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#mm1-arr)"/>
  <rect class="box" x="148" y="160" width="104" height="52" rx="6"/>
  <text x="200" y="186" class="lbl" dominant-baseline="central">Vision model</text>

  <text x="143" y="246" class="sub">Separate model per modality — siloed</text>

  <!-- ===== Divider ===== -->
  <line x1="340" y1="80" x2="340" y2="252" stroke="#ececea" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ===== Multimodal (right) ===== -->
  <text x="508" y="64" class="hdr">Multimodal</text>

  <rect class="box" x="372" y="80" width="64" height="36" rx="6"/>
  <text x="404" y="98" class="lbl" font-size="11.5" dominant-baseline="central">Text</text>
  <rect class="box" x="372" y="128" width="64" height="36" rx="6"/>
  <text x="404" y="146" class="lbl" font-size="11.5" dominant-baseline="central">Image</text>
  <rect class="box" x="372" y="176" width="64" height="36" rx="6"/>
  <text x="404" y="194" class="lbl" font-size="11.5" dominant-baseline="central">Audio</text>

  <path d="M 438 98 C 456 98 456 120 468 124" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mm1-arr)"/>
  <path d="M 438 146 L 468 146" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mm1-arr)"/>
  <path d="M 438 194 C 456 194 456 172 468 168" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mm1-arr)"/>

  <rect class="acc" x="470" y="104" width="98" height="84" rx="7"/>
  <text x="519" y="140" class="lbl" dominant-baseline="central">Multimodal</text>
  <text x="519" y="158" class="lbl" dominant-baseline="central">Model</text>

  <path d="M 568 146 L 586 146" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#mm1-arr)"/>
  <rect class="box" x="588" y="126" width="60" height="40" rx="6"/>
  <text x="618" y="146" class="lbl" font-size="11.5" dominant-baseline="central">Output</text>

  <text x="510" y="246" class="sub">One model handles all modalities</text>

  <!-- ===== Caption ===== -->
  <text x="340" y="338" class="cap">Unimodal needs separate models per modality; multimodal handles all in one shared space</text>
</svg>
