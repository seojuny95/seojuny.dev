<svg width="100%" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Audio and Video Become Images</title>
  <desc>Audio converted to a spectrogram becomes a single image; video sliced into frames becomes a sequence of images. Both are then split into patches and tokens and processed by a Transformer.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .acc { fill: #fff8f4; stroke: #f26522; stroke-width: 2.2; }
      .lbl { font-size: 11.5px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="av-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" class="hdr">Audio and Video Become Images</text>

  <!-- Audio row -->
  <rect class="box" x="24" y="64" width="130" height="48" rx="7"/>
  <polyline points="36,88 42,80 48,96 54,82 60,94 66,78 72,98 78,86 80,88" fill="none" stroke="#171717" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="112" y="88" class="lbl" dominant-baseline="central">Audio</text>
  <path d="M 154 88 L 184 88" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#av-arr)"/>

  <rect class="box" x="186" y="64" width="130" height="48" rx="7"/>
  <g>
    <rect x="196" y="84" width="6" height="22" fill="#f26522" opacity="0.5"/>
    <rect x="204" y="72" width="6" height="34" fill="#f26522" opacity="0.8"/>
    <rect x="212" y="90" width="6" height="16" fill="#f26522" opacity="0.4"/>
    <rect x="220" y="76" width="6" height="30" fill="#f26522" opacity="0.7"/>
    <rect x="228" y="86" width="6" height="20" fill="#f26522" opacity="0.55"/>
  </g>
  <text x="272" y="88" class="lbl" font-size="10.5" dominant-baseline="central">Spectrogram</text>

  <!-- Video row -->
  <rect class="box" x="24" y="168" width="130" height="48" rx="7"/>
  <path d="M 42 182 L 42 202 L 64 192 Z" fill="#171717"/>
  <text x="108" y="192" class="lbl" dominant-baseline="central">Video</text>
  <path d="M 154 192 L 184 192" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#av-arr)"/>

  <rect class="box" x="186" y="168" width="130" height="48" rx="7"/>
  <rect x="200" y="178" width="28" height="22" rx="2" fill="#fff" stroke="#171717" stroke-width="1.2"/>
  <rect x="208" y="184" width="28" height="22" rx="2" fill="#fff" stroke="#171717" stroke-width="1.2"/>
  <rect x="216" y="190" width="28" height="22" rx="2" fill="#fff" stroke="#171717" stroke-width="1.2"/>
  <text x="282" y="192" class="lbl" font-size="10.5" dominant-baseline="central">Frames</text>

  <!-- Merge -->
  <path d="M 316 88 C 360 88 376 128 416 132" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#av-arr)"/>
  <path d="M 316 192 C 360 192 376 152 416 148" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#av-arr)"/>

  <rect class="acc" x="418" y="96" width="214" height="88" rx="8"/>
  <text x="525" y="132" class="lbl" dominant-baseline="central">Processed like images</text>
  <text x="525" y="153" class="sub">patches → tokens → Transformer</text>

  <text x="340" y="252" class="cap">Audio becomes a spectrogram; video becomes frames — both processed as images via patches and Transformer</text>
</svg>
