<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Two AI Tracks Meet at CLIP</title>
  <desc>Text AI evolved from RNN to Transformer; image AI evolved from CNN to ViT — on separate tracks. The two converged at CLIP (2021) in a shared vector space, leading to VLMs that can see and talk, and then to GPT-4o and small multimodal models.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .acc { fill: #fff8f4; stroke: #f26522; stroke-width: 2.2; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .lbl { font-size: 12px; font-weight: 600; text-anchor: middle; }
      .yr { font-size: 9.5px; fill: #8a8a85; text-anchor: middle; }
      .trk { font-size: 11.5px; font-weight: 600; fill: #8a8a85; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="tt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" class="hdr">Two Tracks Meet at CLIP</text>

  <!-- Text track -->
  <text x="134" y="68" class="trk">Text AI</text>
  <rect class="box" x="24" y="82" width="82" height="46" rx="7"/>
  <text x="65" y="100" class="lbl" dominant-baseline="central">RNN</text>
  <text x="65" y="116" class="yr">~2017</text>
  <path d="M 106 105 L 126 105" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#tt-arr)"/>
  <rect class="box" x="128" y="82" width="116" height="46" rx="7"/>
  <text x="186" y="100" class="lbl" dominant-baseline="central">Transformer</text>
  <text x="186" y="116" class="yr">2017</text>

  <!-- Image track -->
  <rect class="box" x="24" y="232" width="82" height="46" rx="7"/>
  <text x="65" y="250" class="lbl" dominant-baseline="central">CNN</text>
  <text x="65" y="266" class="yr">~2019</text>
  <path d="M 106 255 L 126 255" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#tt-arr)"/>
  <rect class="box" x="128" y="232" width="116" height="46" rx="7"/>
  <text x="186" y="250" class="lbl" dominant-baseline="central">ViT</text>
  <text x="186" y="266" class="yr">2020</text>
  <text x="134" y="300" class="trk">Image AI</text>
  <text x="134" y="315" class="yr">Audio · video follow the same path</text>

  <!-- Converge → CLIP -->
  <path d="M 244 105 C 274 105 276 162 298 166" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#tt-arr)"/>
  <path d="M 244 255 C 274 255 276 198 298 194" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#tt-arr)"/>

  <rect class="acc" x="300" y="148" width="104" height="64" rx="7"/>
  <text x="352" y="174" class="lbl" dominant-baseline="central">CLIP</text>
  <text x="352" y="192" class="yr">2021 · aligned</text>

  <path d="M 404 180 L 436 180" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#tt-arr)"/>
  <rect class="box" x="438" y="152" width="92" height="56" rx="7"/>
  <text x="484" y="174" class="lbl" dominant-baseline="central">VLM</text>
  <text x="484" y="192" class="yr">2022~</text>

  <path d="M 530 180 L 556 180" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#tt-arr)"/>
  <rect class="box" x="558" y="150" width="112" height="60" rx="7"/>
  <text x="614" y="174" class="lbl" font-size="11.5" dominant-baseline="central">GPT-4o · SLM</text>
  <text x="614" y="192" class="yr">2024~</text>

  <text x="340" y="344" class="cap">Text and image AI tracks converged at CLIP, leading to VLMs and broader multimodal models</text>
</svg>
