<svg width="100%" viewBox="0 0 680 392" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>CLIP Contrastive Learning — N×N Match/Mismatch Grid</title>
  <desc>A batch of images (rows) and captions (columns) forms an N×N grid. Matched diagonal cells are trained to pull vectors close; all other cells are trained to push them apart.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .axis { font-size: 12px; font-weight: 600; text-anchor: middle; }
      .clbl { font-size: 11px; text-anchor: middle; }
      .rlbl { font-size: 11px; text-anchor: end; }
      .chk { font-size: 22px; font-weight: 700; text-anchor: middle; fill: #fff; }
      .leg { font-size: 11px; dominant-baseline: central; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
  </defs>

  <text x="346" y="28" class="hdr">CLIP — Pull matches close, push mismatches apart</text>

  <!-- Axis labels -->
  <text x="346" y="60" class="axis">Caption</text>
  <text x="170" y="208" class="axis" transform="rotate(-90 170 208)">Image</text>

  <!-- Column (caption) labels -->
  <text x="258" y="82" class="clbl">dog</text>
  <text x="316" y="82" class="clbl">cat</text>
  <text x="374" y="82" class="clbl">car</text>
  <text x="432" y="82" class="clbl">pizza</text>

  <!-- Row (image) labels -->
  <text x="218" y="120" class="rlbl" dominant-baseline="central">dog</text>
  <text x="218" y="178" class="rlbl" dominant-baseline="central">cat</text>
  <text x="218" y="236" class="rlbl" dominant-baseline="central">car</text>
  <text x="218" y="294" class="rlbl" dominant-baseline="central">pizza</text>

  <!-- Grid (row r, col c) -->
  <!-- r0 -->
  <rect x="230" y="92"  width="56" height="56" rx="3" fill="#f26522"/>
  <text x="258" y="121" class="chk">✓</text>
  <rect x="288" y="92"  width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="346" y="92"  width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="404" y="92"  width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <!-- r1 -->
  <rect x="230" y="150" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="288" y="150" width="56" height="56" rx="3" fill="#f26522"/>
  <text x="316" y="179" class="chk">✓</text>
  <rect x="346" y="150" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="404" y="150" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <!-- r2 -->
  <rect x="230" y="208" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="288" y="208" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="346" y="208" width="56" height="56" rx="3" fill="#f26522"/>
  <text x="374" y="237" class="chk">✓</text>
  <rect x="404" y="208" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <!-- r3 -->
  <rect x="230" y="266" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="288" y="266" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="346" y="266" width="56" height="56" rx="3" fill="#f5f5f3" stroke="#e6e6e3"/>
  <rect x="404" y="266" width="56" height="56" rx="3" fill="#f26522"/>
  <text x="432" y="295" class="chk">✓</text>

  <!-- Legend -->
  <rect x="150" y="346" width="15" height="15" rx="2" fill="#f26522"/>
  <text x="172" y="354" class="leg">Match (diagonal) — pull close</text>
  <rect x="410" y="346" width="15" height="15" rx="2" fill="#f5f5f3" stroke="#e6e6e3"/>
  <text x="432" y="354" class="leg">Other — push apart</text>

  <text x="340" y="382" class="cap">Pick the right caption per photo — matches pulled close, mismatches pushed apart</text>
</svg>
