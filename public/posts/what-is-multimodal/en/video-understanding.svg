<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Video Processing — Frames and Audio, Selectively Sampled</title>
  <desc>Video is split into visual frames and an audio track processed separately. A subset of frames is sampled and fed to a VLM for visual descriptions; audio is transcribed by Whisper. Both results are merged by timestamp.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .acc { fill: #fff8f4; stroke: #f26522; stroke-width: 2.2; }
      .frame { fill: #fff; stroke: #171717; stroke-width: 1.2; }
      .pick { fill: #fff8f4; stroke: #f26522; stroke-width: 1.8; }
      .lbl { font-size: 11.5px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 9.5px; fill: #8a8a85; text-anchor: middle; }
      .note { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="vu-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" class="hdr">Video = Frames + Audio, Sampled Selectively</text>

  <!-- Video -->
  <rect class="box" x="20" y="118" width="82" height="56" rx="7"/>
  <text x="61" y="146" class="lbl" dominant-baseline="central">Video</text>
  <path d="M 102 134 C 124 134 128 90 144 88" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#vu-arr)"/>
  <path d="M 102 158 C 124 158 128 210 144 212" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#vu-arr)"/>

  <!-- Visual lane: frame sampling → VLM -->
  <rect class="frame" x="148" y="72" width="16" height="30" rx="2"/>
  <rect class="pick"  x="168" y="72" width="16" height="30" rx="2"/>
  <rect class="frame" x="188" y="72" width="16" height="30" rx="2"/>
  <rect class="frame" x="208" y="72" width="16" height="30" rx="2"/>
  <rect class="pick"  x="228" y="72" width="16" height="30" rx="2"/>
  <rect class="frame" x="248" y="72" width="16" height="30" rx="2"/>
  <text x="206" y="116" class="note">Frames — sample only some</text>
  <path d="M 272 87 L 296 87" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#vu-arr)"/>
  <rect class="box" x="298" y="65" width="78" height="44" rx="7"/>
  <text x="337" y="87" class="lbl" dominant-baseline="central">VLM</text>

  <!-- Audio lane: audio → Whisper -->
  <rect class="box" x="148" y="192" width="124" height="44" rx="7"/>
  <polyline points="160,214 165,207 170,221 175,208 180,220 185,206 190,222 195,210 200,214" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="236" y="214" class="lbl" font-size="10.5" dominant-baseline="central">Audio track</text>
  <path d="M 272 214 L 296 214" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#vu-arr)"/>
  <rect class="box" x="298" y="192" width="78" height="44" rx="7"/>
  <text x="337" y="214" class="lbl" dominant-baseline="central">Whisper</text>

  <!-- Merge -->
  <path d="M 376 87 C 404 87 408 132 426 136" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#vu-arr)"/>
  <text x="400" y="74" class="sub">visual captions</text>
  <path d="M 376 214 C 404 214 408 168 426 164" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#vu-arr)"/>
  <text x="400" y="230" class="sub">transcript</text>

  <rect class="acc" x="428" y="118" width="196" height="64" rx="8"/>
  <text x="526" y="142" class="lbl" dominant-baseline="central">Merge by timestamp</text>
  <text x="526" y="162" class="sub">what was seen &amp; heard, when</text>

  <text x="340" y="284" class="cap">Read visual frames (sampled) and audio separately, then merge by timestamp — not every frame</text>
</svg>
