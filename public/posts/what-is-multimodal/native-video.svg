<svg width="100%" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>영상을 보는 두 방식 — 조각내 합치기 vs 영상 네이티브</title>
  <desc>한 방식은 영상을 프레임과 소리로 잘라 여러 모델로 처리한 뒤 합친다. 다른 방식은 TwelveLabs처럼 영상 전용 모델 하나가 화면·시간·소리를 통째로 이해한다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .box { fill: #fff; stroke: #171717; stroke-width: 1.7; }
      .acc { fill: #fff8f4; stroke: #f26522; stroke-width: 2.2; }
      .lbl { font-size: 11px; font-weight: 600; text-anchor: middle; }
      .sub { font-size: 9.5px; fill: #8a8a85; text-anchor: middle; }
      .tag { font-size: 11.5px; font-weight: 700; text-anchor: start; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
    </style>
    <marker id="nv-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" class="hdr">영상을 보는 두 방식</text>

  <!-- ① 조각내 합치기 -->
  <text x="30" y="54" class="tag">① 조각내 합치기</text>
  <rect class="box" x="30" y="66" width="64" height="40" rx="6"/>
  <text x="62" y="86" class="lbl" dominant-baseline="central">영상</text>
  <path d="M 94 86 L 114 86" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#nv-arr)"/>
  <rect class="box" x="116" y="66" width="106" height="40" rx="6"/>
  <text x="169" y="86" class="lbl" font-size="10" dominant-baseline="central">프레임·소리 분해</text>
  <path d="M 222 86 L 242 86" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#nv-arr)"/>
  <rect class="box" x="244" y="66" width="100" height="40" rx="6"/>
  <text x="294" y="86" class="lbl" font-size="10" dominant-baseline="central">모델 여러 개</text>
  <path d="M 344 86 L 364 86" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#nv-arr)"/>
  <rect class="box" x="366" y="66" width="84" height="40" rx="6"/>
  <text x="408" y="86" class="lbl" dominant-baseline="central">합치기</text>

  <!-- ② 영상 네이티브 -->
  <text x="30" y="146" class="tag">② 영상 네이티브 모델</text>
  <rect class="box" x="30" y="156" width="64" height="44" rx="6"/>
  <text x="62" y="178" class="lbl" dominant-baseline="central">영상</text>
  <path d="M 94 178 L 114 178" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#nv-arr)"/>
  <rect class="acc" x="116" y="156" width="200" height="44" rx="7"/>
  <text x="216" y="173" class="lbl" dominant-baseline="central">영상 전용 모델</text>
  <text x="216" y="190" class="sub">화면·시간·소리를 통째로</text>
  <path d="M 316 178 L 336 178" fill="none" stroke="#171717" stroke-width="1.4" stroke-linecap="round" marker-end="url(#nv-arr)"/>
  <rect class="box" x="338" y="156" width="92" height="44" rx="6"/>
  <text x="384" y="178" class="lbl" dominant-baseline="central">영상 이해</text>

  <text x="340" y="226" class="cap">프레임·소리로 잘라 합치는 대신, 영상 전용 모델이 화면·시간·소리를 한 번에 이해한다</text>
</svg>
