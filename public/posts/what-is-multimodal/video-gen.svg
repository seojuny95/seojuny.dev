<svg width="100%" viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>영상 생성 — 프레임을 시간까지 함께 만든다</title>
  <desc>여러 프레임을 한 덩어리로 놓고 가로·세로뿐 아니라 시간축까지 함께 확산한다. 노이즈를 걷어내는 동안 프레임끼리 서로 참조해, 움직임이 끊기지 않고 앞뒤가 자연스럽게 이어진다.</desc>

  <defs>
    <style>
      text { font-family: -apple-system, system-ui, sans-serif; fill: #171717; }
      .frame { fill: #fafaf9; stroke: #171717; stroke-width: 1.5; }
      .lbl { font-size: 11px; text-anchor: middle; }
      .hdr { font-size: 14px; font-weight: 600; text-anchor: middle; }
      .note { font-size: 10px; fill: #8a8a85; text-anchor: middle; }
      .cap { font-size: 11.5px; fill: #8a8a85; text-anchor: middle; }
      .dot { fill: #8a8a85; }
      .link { stroke: #f26522; stroke-width: 1.3; }
    </style>
    <marker id="vg-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" class="hdr">영상 — 프레임을 시간까지 함께</text>

  <!-- 노이즈 프레임들 -->
  <g class="frame"><rect x="28" y="72" width="46" height="58" rx="4"/></g>
  <g class="frame"><rect x="80" y="72" width="46" height="58" rx="4"/></g>
  <g class="frame"><rect x="132" y="72" width="46" height="58" rx="4"/></g>
  <g class="dot">
    <circle cx="40" cy="86" r="1.7"/><circle cx="60" cy="92" r="1.7"/><circle cx="48" cy="108" r="1.7"/><circle cx="66" cy="118" r="1.7"/><circle cx="38" cy="120" r="1.7"/>
    <circle cx="92" cy="84" r="1.7"/><circle cx="112" cy="96" r="1.7"/><circle cx="98" cy="112" r="1.7"/><circle cx="116" cy="120" r="1.7"/><circle cx="88" cy="104" r="1.7"/>
    <circle cx="144" cy="90" r="1.7"/><circle cx="164" cy="84" r="1.7"/><circle cx="150" cy="110" r="1.7"/><circle cx="168" cy="118" r="1.7"/><circle cx="140" cy="122" r="1.7"/>
  </g>
  <text x="103" y="148" class="lbl">노이즈 프레임</text>

  <!-- 확산 화살표 -->
  <path d="M 188 101 L 300 101" fill="none" stroke="#171717" stroke-width="1.5" stroke-linecap="round" marker-end="url(#vg-arr)"/>
  <text x="244" y="90" class="note">시간축까지 함께 확산</text>

  <!-- 완성 프레임들 (공이 이동) -->
  <g class="frame"><rect x="312" y="72" width="46" height="58" rx="4"/></g>
  <g class="frame"><rect x="364" y="72" width="46" height="58" rx="4"/></g>
  <g class="frame"><rect x="416" y="72" width="46" height="58" rx="4"/></g>
  <circle cx="326" cy="112" r="7" fill="#171717"/>
  <circle cx="387" cy="100" r="7" fill="#171717"/>
  <circle cx="450" cy="88" r="7" fill="#171717"/>

  <!-- 프레임 간 참조 -->
  <path d="M 335 140 L 376 140" class="link" fill="none" marker-start="url(#vg-arr)" marker-end="url(#vg-arr)"/>
  <path d="M 398 140 L 439 140" class="link" fill="none" marker-start="url(#vg-arr)" marker-end="url(#vg-arr)"/>
  <text x="387" y="160" class="note" fill="#f26522">프레임끼리 참조</text>

  <text x="387" y="184" class="lbl">완성된 영상 — 앞뒤가 이어진다</text>

  <text x="340" y="232" class="cap">여러 프레임을 한꺼번에 확산하고 서로 참조해, 움직임이 끊기지 않게 만든다</text>
</svg>
