<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Masked self-attention — matrix blocking future tokens</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Masked Self-Attention — masks out future tokens</text>

  <text x="340" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">Each row = "which tokens are visible when generating this one"</text>

  <text x="220" y="92" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">I</text>
  <text x="262" y="92" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">love</text>
  <text x="304" y="92" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">you</text>
  <text x="346" y="92" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">.</text>

  <text x="195" y="129" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">I</text>
  <text x="195" y="171" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">love</text>
  <text x="195" y="213" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">you</text>
  <text x="195" y="255" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">.</text>

  <g stroke="#000" stroke-width="1.2">
    <rect x="200" y="105" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="242" y="105" width="40" height="32" fill="#fff" opacity="0.55"/>
    <rect x="284" y="105" width="40" height="32" fill="#fff" opacity="0.55"/>
    <rect x="326" y="105" width="40" height="32" fill="#fff" opacity="0.55"/>

    <rect x="200" y="147" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="242" y="147" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="284" y="147" width="40" height="32" fill="#fff" opacity="0.55"/>
    <rect x="326" y="147" width="40" height="32" fill="#fff" opacity="0.55"/>

    <rect x="200" y="189" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="242" y="189" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="284" y="189" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="326" y="189" width="40" height="32" fill="#fff" opacity="0.55"/>

    <rect x="200" y="231" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="242" y="231" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="284" y="231" width="40" height="32" fill="#000" opacity="0.85"/>
    <rect x="326" y="231" width="40" height="32" fill="#000" opacity="0.85"/>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#fff">
    <text x="220" y="126" text-anchor="middle">✓</text>

    <text x="220" y="168" text-anchor="middle">✓</text>
    <text x="262" y="168" text-anchor="middle">✓</text>

    <text x="220" y="210" text-anchor="middle">✓</text>
    <text x="262" y="210" text-anchor="middle">✓</text>
    <text x="304" y="210" text-anchor="middle">✓</text>

    <text x="220" y="252" text-anchor="middle">✓</text>
    <text x="262" y="252" text-anchor="middle">✓</text>
    <text x="304" y="252" text-anchor="middle">✓</text>
    <text x="346" y="252" text-anchor="middle">✓</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">
    <rect x="430" y="135" width="22" height="22" fill="#000" opacity="0.85"/>
    <text x="462" y="151" font-size="11" opacity="0.7">Visible (score computed)</text>

    <rect x="430" y="170" width="22" height="22" fill="#fff" stroke="#000" stroke-width="1.2" opacity="0.55"/>
    <text x="462" y="186" font-size="11" opacity="0.7">Masked (-∞ → 0)</text>
  </g>

  <text x="340" y="295" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">Seeing "you" when generating "love" is cheating → masked in advance</text>
</svg>
