<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>After Transformer — expanding to BERT, GPT, ViT, Whisper, and beyond</title>

  <defs>
    <marker id="ar-ft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">After Transformer — spanning across domains</text>

  <rect x="260" y="55" width="160" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="340" y="78" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000">Transformer (2017)</text>
  <text x="340" y="96" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">Attention is All You Need</text>

  <g stroke="#000" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M 340 105 L 340 135 L 130 135 L 130 160" marker-end="url(#ar-ft)"/>
    <path d="M 340 105 L 340 160" marker-end="url(#ar-ft)"/>
    <path d="M 340 105 L 340 135 L 550 135 L 550 160" marker-end="url(#ar-ft)"/>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <rect x="60" y="165" width="140" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="130" y="185" text-anchor="middle" font-size="12" font-weight="500">NLP (Language)</text>
    <text x="130" y="203" text-anchor="middle" font-size="11" opacity="0.7">BERT (2018)</text>
    <text x="130" y="219" text-anchor="middle" font-size="11" opacity="0.7">GPT (2018~)</text>

    <rect x="270" y="165" width="140" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="340" y="185" text-anchor="middle" font-size="12" font-weight="500">Vision</text>
    <text x="340" y="203" text-anchor="middle" font-size="11" opacity="0.7">ViT (2020)</text>
    <text x="340" y="219" text-anchor="middle" font-size="11" opacity="0.7">DALL·E, Stable Diffusion</text>

    <rect x="480" y="165" width="140" height="60" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="550" y="185" text-anchor="middle" font-size="12" font-weight="500">Audio / Video</text>
    <text x="550" y="203" text-anchor="middle" font-size="11" opacity="0.7">Whisper (2022)</text>
    <text x="550" y="219" text-anchor="middle" font-size="11" opacity="0.7">VideoMAE</text>
  </g>

  <g stroke="#000" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M 130 225 L 130 250 L 340 250 L 340 270" marker-end="url(#ar-ft)"/>
    <path d="M 340 225 L 340 250" stroke-dasharray="3 3"/>
    <path d="M 550 225 L 550 250 L 340 250" stroke-dasharray="3 3"/>
  </g>

  <rect x="240" y="275" width="200" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="340" y="297" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000">Multimodal LLM</text>
  <text x="340" y="315" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">GPT-4, Claude, Gemini …</text>

  <text x="340" y="350" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">One architecture unified text, images, and audio</text>
</svg>
