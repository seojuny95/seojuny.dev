<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Attention 3 types compared — Self / Masked Self / Cross</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Attention 3 types — only differs in where Q, K, V come from</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <rect x="20" y="55" width="200" height="220" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="120" y="78" text-anchor="middle" font-size="13" font-weight="500">Self-Attention</text>
    <text x="120" y="96" text-anchor="middle" font-size="10" opacity="0.6">one encoder layer</text>

    <rect x="60" y="120" width="120" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="120" y="145" text-anchor="middle" font-size="11">Sentence X</text>

    <text x="120" y="180" text-anchor="middle" font-size="11" opacity="0.7">Q, K, V all</text>
    <text x="120" y="196" text-anchor="middle" font-size="11" opacity="0.7">from X</text>

    <text x="120" y="232" text-anchor="middle" font-size="10" opacity="0.6">"attends within</text>
    <text x="120" y="248" text-anchor="middle" font-size="10" opacity="0.6">the same sentence"</text>

    <rect x="240" y="55" width="200" height="220" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="340" y="78" text-anchor="middle" font-size="13" font-weight="500">Masked Self-Attention</text>
    <text x="340" y="96" text-anchor="middle" font-size="10" opacity="0.6">decoder's 1st attention</text>

    <rect x="280" y="120" width="120" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="340" y="145" text-anchor="middle" font-size="11">Output sentence Y</text>

    <text x="340" y="180" text-anchor="middle" font-size="11" opacity="0.7">Q, K, V all</text>
    <text x="340" y="196" text-anchor="middle" font-size="11" opacity="0.7">from Y (+ masking)</text>

    <text x="340" y="232" text-anchor="middle" font-size="10" opacity="0.6">"past tokens only</text>
    <text x="340" y="248" text-anchor="middle" font-size="10" opacity="0.6">— no cheating"</text>

    <rect x="460" y="55" width="200" height="220" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="560" y="78" text-anchor="middle" font-size="13" font-weight="500">Cross-Attention</text>
    <text x="560" y="96" text-anchor="middle" font-size="10" opacity="0.6">decoder's 2nd attention</text>

    <rect x="480" y="120" width="70" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="515" y="145" text-anchor="middle" font-size="11">Y (Q)</text>

    <rect x="570" y="120" width="70" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="605" y="145" text-anchor="middle" font-size="11">X (K, V)</text>

    <text x="560" y="180" text-anchor="middle" font-size="11" opacity="0.7">Q from decoder Y</text>
    <text x="560" y="196" text-anchor="middle" font-size="11" opacity="0.7">K, V from encoder X</text>

    <text x="560" y="232" text-anchor="middle" font-size="10" opacity="0.6">"bridges two sequences</text>
    <text x="560" y="248" text-anchor="middle" font-size="10" opacity="0.6">— key to translation"</text>
  </g>

  <text x="340" y="300" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">Same formula for all three: softmax(QKᵀ/√d_k) · V</text>
</svg>
