  <text x="130" y="285" text-anchor="middle" font-family="var(--font-mono)" font-size="11" fill="#000" opacity="0.7" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:ui-monospace, monospace;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">sum = 6 (arbitrary)</text>

  <!-- ============ center: softmax box ============ -->
  <path d="M 260 185 Q 260 180 265 180 L 420 181 Q 425 181 425 186 L 424 220 Q 424 225 419 225 L 264 224 Q 259 224 259 219 Z" fill="none" stroke="#000" stroke-width="1.8" style="fill:none;stroke:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:1.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="342" y="202" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#000" dominant-baseline="central" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:central">softmax</text>

  <!-- arrow (left → box) -->
  <path d="M 225 203 L 257 203" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ar3)" style="fill:none;stroke:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- arrow (box → right) -->
  <path d="M 426 203 L 458 203" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ar3)" style="fill:none;stroke:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

