<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>BLEU score comparison — Transformer sets new SOTA on WMT 2014</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">WMT 2014 BLEU — Transformer sets new SOTA</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <text x="60" y="68" font-size="12" font-weight="500">English → German</text>

    <text x="60" y="100" font-size="11" opacity="0.65">GNMT (RNN)</text>
    <rect x="180" y="88" width="195" height="18" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="385" y="102" font-size="11">24.6</text>

    <text x="60" y="128" font-size="11" opacity="0.65">ConvS2S (CNN)</text>
    <rect x="180" y="116" width="201" height="18" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="391" y="130" font-size="11">25.16</text>

    <text x="60" y="156" font-size="11" opacity="0.65">Transformer (base)</text>
    <rect x="180" y="144" width="218" height="18" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="408" y="158" font-size="11">27.3</text>

    <text x="60" y="184" font-size="11" font-weight="500">Transformer (big)</text>
    <rect x="180" y="172" width="227" height="18" fill="#000" opacity="0.85"/>
    <text x="417" y="186" font-size="11" font-weight="500">28.4</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <text x="60" y="222" font-size="12" font-weight="500">English → French</text>

    <text x="60" y="254" font-size="11" opacity="0.65">GNMT (RNN)</text>
    <rect x="180" y="242" width="195" height="18" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="385" y="256" font-size="11">39.92</text>

    <text x="60" y="282" font-size="11" opacity="0.65">ConvS2S (CNN)</text>
    <rect x="180" y="270" width="203" height="18" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="393" y="284" font-size="11">40.46</text>

    <text x="60" y="310" font-size="11" font-weight="500">Transformer (big)</text>
    <rect x="180" y="298" width="209" height="18" fill="#000" opacity="0.85"/>
    <text x="399" y="312" font-size="11" font-weight="500">41.8</text>
  </g>

  <line x1="180" y1="80" x2="180" y2="200" stroke="#000" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="232" x2="180" y2="320" stroke="#000" stroke-width="1" opacity="0.5"/>

  <text x="600" y="200" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.55">Training time: 12 hrs – 3.5 days (far faster than prior models)</text>
</svg>
