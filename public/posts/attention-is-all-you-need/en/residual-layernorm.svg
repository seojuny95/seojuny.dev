<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Residual connection and Layer Normalization — two stabilizers for training</title>

  <defs>
    <marker id="ar-rl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Residual + LayerNorm — two devices that help training</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <text x="170" y="58" text-anchor="middle" font-size="12" font-weight="500">Residual</text>
    <text x="170" y="74" text-anchor="middle" font-size="10" opacity="0.55">"adds the input directly"</text>

    <rect x="120" y="85" width="100" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="170" y="108" text-anchor="middle" font-size="11">input x</text>

    <line x1="170" y1="121" x2="170" y2="140" stroke="#000" stroke-width="1.2" marker-end="url(#ar-rl)"/>

    <rect x="120" y="143" width="100" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="170" y="167" text-anchor="middle" font-size="11">function f(x)</text>

    <line x1="170" y1="183" x2="170" y2="202" stroke="#000" stroke-width="1.2" marker-end="url(#ar-rl)"/>

    <rect x="120" y="205" width="100" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="170" y="228" text-anchor="middle" font-size="11">f(x) + x</text>

    <path d="M 110 103 C 70 103 70 223 110 223" stroke="#000" stroke-width="1.3" fill="none" marker-end="url(#ar-rl)"/>
    <text x="60" y="166" text-anchor="middle" font-size="10" fill="#000" opacity="0.6" transform="rotate(-90 60 166)">bypass carries original x</text>

    <text x="510" y="58" text-anchor="middle" font-size="12" font-weight="500">Layer Normalization</text>
    <text x="510" y="74" text-anchor="middle" font-size="10" opacity="0.55">"keeps values at a consistent scale"</text>

    <rect x="380" y="100" width="260" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="510" y="123" text-anchor="middle" font-size="11">[3.5, -7.2, 12.1, 0.8, -4.5]  (uneven)</text>

    <line x1="510" y1="136" x2="510" y2="160" stroke="#000" stroke-width="1.2" marker-end="url(#ar-rl)"/>

    <rect x="430" y="163" width="160" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.5"/>
    <text x="510" y="186" text-anchor="middle" font-size="11">normalize to mean=0, var=1</text>

    <line x1="510" y1="199" x2="510" y2="223" stroke="#000" stroke-width="1.2" marker-end="url(#ar-rl)"/>

    <rect x="380" y="226" width="260" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="510" y="249" text-anchor="middle" font-size="11">[0.2, -1.1, 1.6, -0.3, -0.4]  (stable range)</text>
  </g>
</svg>
