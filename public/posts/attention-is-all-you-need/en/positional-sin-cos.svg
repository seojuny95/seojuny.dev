  <text x="500" y="206" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.5">(brightness = value magnitude)</text>

  <text x="340" y="340" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Position 0 and 1 are never identical; position 100 is distinct from position 0</text>
  <text x="340" y="360" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">When this pattern is added to word embeddings, the model can detect positions</text>
