<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Positional Encoding — unique numeric pattern per position</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">A fixed, unique numeric pattern for each position</text>

  <text x="340" y="50" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">Each position has its own vector — an ID that lets the model distinguish positions</text>

