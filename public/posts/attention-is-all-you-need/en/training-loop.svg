<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Training loop — input → model → output, compare with label, update parameters</title>

  <defs>
    <marker id="ar-tl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Training loop — nudge parameters toward the correct answer</text>

  <rect x="60" y="80" width="100" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="110" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">Input</text>
  <text x="110" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">"I love"</text>

  <line x1="160" y1="102" x2="195" y2="102" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="200" y="78" width="130" height="48" rx="6" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="265" y="98" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000">Model</text>
  <text x="265" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">compute via weights W</text>

  <line x1="330" y1="102" x2="365" y2="102" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="370" y="80" width="100" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="420" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">Prediction</text>
  <text x="420" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">"I love you"</text>

  <line x1="470" y1="102" x2="505" y2="102" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="510" y="80" width="130" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="575" y="98" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">loss</text>
  <text x="575" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">pred vs "love you"</text>

  <line x1="575" y1="124" x2="575" y2="155" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="60" y="160" width="580" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="350" y="180" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">Parameter update: nudge W to reduce loss — gradient descent</text>
  <text x="350" y="197" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.55">backpropagation computes how much each W contributed to the loss</text>

  <path d="M 60 182 C 30 182 30 102 55 102" stroke="#000" stroke-width="1.4" fill="none" marker-end="url(#ar-tl)"/>
  <rect x="10" y="135" width="40" height="16" rx="3" fill="#fff"/>
  <text x="30" y="147" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">repeat</text>

  <text x="350" y="245" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Billions of iterations later, the model converges to correct answers</text>
  <text x="350" y="267" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">"Training" is ultimately fine-tuning the W matrices</text>
</svg>
