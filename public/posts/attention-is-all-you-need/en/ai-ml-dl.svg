  <path d="M 60 200&#10;           Q 55 110 145 75&#10;           Q 240 42 330 55&#10;           Q 410 65 445 130&#10;           Q 470 195 430 280&#10;           Q 380 360 270 365&#10;           Q 160 370 95 310&#10;           Q 50 270 60 200 Z" fill="none" stroke="#000" stroke-width="2" stroke-linejoin="round" mask="url(#imagine-text-gaps-ckdj7f)" style="fill:none;stroke:rgb(0, 0, 0);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

