<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>학습 루프 — 입력 → 모델 → 출력, 정답과 비교해 파라미터 업데이트</title>

  <defs>
    <marker id="ar-tl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">학습 루프 — 정답과 비교해 파라미터를 조금씩 민다</text>

  <rect x="60" y="80" width="100" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="110" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">입력</text>
  <text x="110" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">"나는 너를"</text>

  <line x1="160" y1="102" x2="195" y2="102" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="200" y="78" width="130" height="48" rx="6" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="265" y="98" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000">모델</text>
  <text x="265" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">파라미터 W로 계산</text>

  <line x1="330" y1="102" x2="365" y2="102" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="370" y="80" width="100" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="420" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">예측</text>
  <text x="420" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">"좋아해"</text>

  <line x1="470" y1="102" x2="505" y2="102" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="510" y="80" width="130" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="575" y="98" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="500" fill="#000">loss</text>
  <text x="575" y="116" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">예측 vs "사랑해"</text>

  <line x1="575" y1="124" x2="575" y2="155" stroke="#000" stroke-width="1.4" marker-end="url(#ar-tl)"/>

  <rect x="60" y="160" width="580" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
  <text x="350" y="180" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">파라미터 업데이트 (loss가 줄어드는 방향으로 W를 조금씩 민다 — gradient descent)</text>
  <text x="350" y="197" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.55">backpropagation으로 각 W가 loss에 얼마나 기여했는지 역으로 계산</text>

  <path d="M 60 182 C 30 182 30 102 55 102" stroke="#000" stroke-width="1.4" fill="none" marker-end="url(#ar-tl)"/>
  <rect x="10" y="135" width="40" height="16" rx="3" fill="#fff"/>
  <text x="30" y="147" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">반복</text>

  <text x="350" y="245" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">이 루프를 수십억 번 돌리면 모델이 점점 정답에 가까운 답을 내게 된다</text>
  <text x="350" y="267" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">"학습"은 결국 W 행렬들을 미세 조정하는 과정</text>
</svg>
