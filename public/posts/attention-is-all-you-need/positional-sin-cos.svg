<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Positional Encoding — 위치마다 고유한 숫자 패턴</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">위치마다 미리 정해진 고유한 숫자 패턴</text>

  <text x="340" y="50" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">각 위치는 자기만의 벡터(숫자 묶음)를 가진다 — 모델이 위치를 구별할 수 있게 해주는 ID</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">
    <text x="90" y="92" text-anchor="end">위치 0</text>
    <text x="90" y="132" text-anchor="end">위치 1</text>
    <text x="90" y="172" text-anchor="end">위치 2</text>
    <text x="90" y="212" text-anchor="end">위치 3</text>
    <text x="90" y="252" text-anchor="end" opacity="0.55">…</text>
    <text x="90" y="292" text-anchor="end">위치 100</text>
  </g>

