  <text x="500" y="190" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.65">→ 가로 한 줄 = 한 위치의 벡터</text>
  <text x="500" y="206" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.5">(밝기 = 숫자 크기)</text>

  <text x="340" y="340" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">위치 0과 1이 절대 같지 않고, 100번째 위치도 0번과 구별됨</text>
  <text x="340" y="360" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">이 패턴이 단어 임베딩에 더해지면 모델이 위치를 알아챈다</text>
