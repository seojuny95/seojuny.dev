<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Multi-head 출력 합치기 — concat + W^O</title>

  <defs>
    <marker id="ar-co" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
    <pattern id="p-h1" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="p-h2" patternUnits="userSpaceOnUse" width="6" height="6">
      <line x1="0" y1="0" x2="6" y2="0" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="p-h3" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="p-h4" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="0.9" fill="#000"/>
    </pattern>
    <pattern id="p-h5" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="1.1"/>
    </pattern>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Multi-head 결과 합치기 — concat 후 W^O로 정리</text>

  <text x="340" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">① h개의 head가 각자 출력 벡터를 내놓는다 (각 d/h = 64차원)</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="11" text-anchor="middle">
    <rect x="80" y="72" width="60" height="44" fill="url(#p-h1)" stroke="#000" stroke-width="1.3"/>
    <text x="110" y="98" style="paint-order:stroke;stroke:#fff;stroke-width:3">head 1</text>

    <rect x="150" y="72" width="60" height="44" fill="url(#p-h2)" stroke="#000" stroke-width="1.3"/>
    <text x="180" y="98" style="paint-order:stroke;stroke:#fff;stroke-width:3">head 2</text>

    <rect x="220" y="72" width="60" height="44" fill="url(#p-h3)" stroke="#000" stroke-width="1.3"/>
    <text x="250" y="98" style="paint-order:stroke;stroke:#fff;stroke-width:3">head 3</text>

    <text x="320" y="98" font-size="18" opacity="0.5">···</text>

    <rect x="360" y="72" width="60" height="44" fill="url(#p-h4)" stroke="#000" stroke-width="1.3"/>
    <text x="390" y="98" style="paint-order:stroke;stroke:#fff;stroke-width:3">head 8</text>

    <text x="110" y="130" font-size="10" opacity="0.6">64차원</text>
    <text x="180" y="130" font-size="10" opacity="0.6">64차원</text>
    <text x="250" y="130" font-size="10" opacity="0.6">64차원</text>
    <text x="390" y="130" font-size="10" opacity="0.6">64차원</text>
  </g>

  <line x1="250" y1="148" x2="250" y2="172" stroke="#000" stroke-width="1.4" marker-end="url(#ar-co)"/>
  <text x="430" y="167" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000" opacity="0.75">② 옆으로 이어 붙이기 (concat)</text>

  <g>
    <rect x="80" y="180" width="100" height="44" fill="url(#p-h1)" stroke="#000" stroke-width="1.3"/>
    <rect x="180" y="180" width="100" height="44" fill="url(#p-h2)" stroke="#000" stroke-width="1.3"/>
    <rect x="280" y="180" width="100" height="44" fill="url(#p-h3)" stroke="#000" stroke-width="1.3"/>
    <rect x="380" y="180" width="40" height="44" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="400" y="206" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#000" opacity="0.5">···</text>
    <rect x="420" y="180" width="100" height="44" fill="url(#p-h4)" stroke="#000" stroke-width="1.3"/>

    <text x="300" y="245" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">한 줄로 이어진 긴 벡터 — 총 512차원 (8 × 64)</text>
  </g>

  <line x1="300" y1="260" x2="300" y2="290" stroke="#000" stroke-width="1.4" marker-end="url(#ar-co)"/>
  <text x="450" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000" opacity="0.75">③ × W^O (출력 가중치, 512×512)</text>

  <rect x="80" y="300" width="440" height="44" fill="url(#p-h5)" stroke="#000" stroke-width="1.8"/>
  <text x="300" y="326" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000" style="paint-order:stroke;stroke:#fff;stroke-width:4">최종 출력 벡터 (512차원)</text>

  <text x="300" y="370" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">head들의 정보가 한 벡터에 골고루 섞여 정리됨 — 원래 차원으로 돌아옴</text>
</svg>
