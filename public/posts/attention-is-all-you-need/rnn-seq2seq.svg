<svg width="100%" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RNN seq2seq — attention 없을 때 마지막 벡터 하나에 모든 정보 압축</title>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RNN 시대 (attention 없을 때) — 마지막 벡터 하나로 다 넘긴다</text>

  <text x="135" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">Encoder (RNN)</text>
  <text x="545" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">Decoder (RNN)</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">
    <rect x="30" y="80" width="60" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="60" y="98" text-anchor="middle">나는</text>
    <text x="60" y="115" text-anchor="middle" font-size="10" opacity="0.55">h₁</text>

    <rect x="105" y="80" width="60" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="135" y="98" text-anchor="middle">너를</text>
    <text x="135" y="115" text-anchor="middle" font-size="10" opacity="0.55">h₂</text>

    <rect x="180" y="80" width="70" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="215" y="98" text-anchor="middle">사랑해</text>
    <text x="215" y="115" text-anchor="middle" font-size="10" opacity="0.7" font-weight="500">h₃</text>
  </g>

  <g stroke="#000" stroke-width="1.2" fill="none">
    <line x1="90" y1="102" x2="105" y2="102" marker-end="url(#ar)"/>
    <line x1="165" y1="102" x2="180" y2="102" marker-end="url(#ar)"/>
  </g>

  <path d="M 250 102 L 430 102" stroke="#000" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <text x="340" y="92" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">h₃ 하나만 넘김</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">
    <rect x="430" y="80" width="60" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="460" y="107" text-anchor="middle">I</text>

    <rect x="505" y="80" width="60" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="535" y="107" text-anchor="middle">love</text>

    <rect x="580" y="80" width="60" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="610" y="107" text-anchor="middle">you</text>
  </g>

  <g stroke="#000" stroke-width="1.2" fill="none">
    <line x1="490" y1="102" x2="505" y2="102" marker-end="url(#ar)"/>
    <line x1="565" y1="102" x2="580" y2="102" marker-end="url(#ar)"/>
  </g>

  <text x="340" y="170" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000" opacity="0.75">문장이 길어질수록 h₃ 하나에 정보를 못 다 담아 앞쪽이 흐려진다</text>
  <text x="340" y="195" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">→ 해결책: encoder의 모든 hidden state를 다시 보자 (attention)</text>
</svg>
