<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Encoder-Decoder — 한국어를 의미 벡터로 압축하고 영어로 풀어 쓴다</title>

  <defs>
    <marker id="ar-ed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Encoder–Decoder — 읽고(encode) 풀어 쓴다(decode)</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">
    <text x="60" y="68" text-anchor="middle" font-size="11" opacity="0.55">입력 (한국어)</text>
    <rect x="20" y="80" width="80" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="60" y="105" text-anchor="middle">나는 너를 사랑해</text>
  </g>

  <line x1="100" y1="100" x2="155" y2="100" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ed)"/>

  <rect x="160" y="70" width="160" height="60" rx="6" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="240" y="95" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000">Encoder</text>
  <text x="240" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">의미 정리</text>

  <line x1="320" y1="100" x2="375" y2="100" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ed)"/>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">
    <text x="380" y="78" font-size="10" opacity="0.55">의미 벡터(들)</text>
    <rect x="380" y="85" width="20" height="30" rx="2" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <rect x="402" y="85" width="20" height="30" rx="2" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <rect x="424" y="85" width="20" height="30" rx="2" fill="#fff" stroke="#000" stroke-width="1.2"/>
  </g>

  <line x1="448" y1="100" x2="500" y2="100" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ed)"/>

  <rect x="505" y="70" width="120" height="60" rx="6" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="565" y="95" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="#000">Decoder</text>
  <text x="565" y="115" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">한 단어씩 생성</text>

  <line x1="565" y1="130" x2="565" y2="160" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ed)"/>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000">
    <rect x="490" y="165" width="150" height="40" rx="4" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="565" y="190" text-anchor="middle">I love you</text>
    <text x="565" y="218" text-anchor="middle" font-size="11" opacity="0.55">출력 (영어)</text>
  </g>

  <text x="340" y="245" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">번역가가 원문을 읽고 → 의미를 잡고 → 다른 언어로 풀어 쓰는 흐름</text>
</svg>
