<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>논문 Table 1 — 한 layer당 복잡도 / 순차 연산 / 경로 길이 비교</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">한 layer당 복잡도 / 순차 연산 / 경로 길이</text>
  <text x="340" y="48" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">n = 단어 수, d = 표현 차원, k = CNN 커널</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <rect x="40" y="70" width="600" height="40" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="130" y="93" text-anchor="middle" font-size="12" font-weight="500">Layer 종류</text>
    <text x="290" y="93" text-anchor="middle" font-size="12" font-weight="500">Complexity / layer</text>
    <text x="440" y="93" text-anchor="middle" font-size="12" font-weight="500">Sequential ops</text>
    <text x="580" y="93" text-anchor="middle" font-size="12" font-weight="500">Max path length</text>

    <rect x="40" y="110" width="600" height="40" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="130" y="133" text-anchor="middle" font-size="12">Self-Attention</text>
    <text x="290" y="133" text-anchor="middle" font-size="12">O(n²·d)</text>
    <text x="440" y="133" text-anchor="middle" font-size="12" font-weight="500">O(1)  ✓</text>
    <text x="580" y="133" text-anchor="middle" font-size="12" font-weight="500">O(1)  ✓</text>

    <rect x="40" y="150" width="600" height="40" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="130" y="173" text-anchor="middle" font-size="12">Recurrent (RNN)</text>
    <text x="290" y="173" text-anchor="middle" font-size="12" font-weight="500">O(n·d²)  ✓</text>
    <text x="440" y="173" text-anchor="middle" font-size="12">O(n)</text>
    <text x="580" y="173" text-anchor="middle" font-size="12">O(n)</text>

    <rect x="40" y="190" width="600" height="40" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="130" y="213" text-anchor="middle" font-size="12">Convolutional</text>
    <text x="290" y="213" text-anchor="middle" font-size="12">O(k·n·d²)</text>
    <text x="440" y="213" text-anchor="middle" font-size="12" font-weight="500">O(1)  ✓</text>
    <text x="580" y="213" text-anchor="middle" font-size="12">O(log_k n)</text>

    <rect x="40" y="230" width="600" height="40" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="130" y="253" text-anchor="middle" font-size="12">Self-Attn (restricted)</text>
    <text x="290" y="253" text-anchor="middle" font-size="12">O(r·n·d)</text>
    <text x="440" y="253" text-anchor="middle" font-size="12">O(1)</text>
    <text x="580" y="253" text-anchor="middle" font-size="12">O(n/r)</text>
  </g>

  <text x="340" y="295" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.65">Self-Attention은 순차 연산과 경로 길이에서 모두 유리 — 단, n²이라 긴 문장에선 메모리 부담</text>
  <text x="340" y="312" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.5">대부분의 번역 task에서는 n &lt; d라 self-attention이 RNN보다도 가볍다</text>
</svg>
