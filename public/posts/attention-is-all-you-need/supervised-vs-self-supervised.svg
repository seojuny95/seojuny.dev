<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>지도학습 vs 자기지도학습 — 정답이 어디서 오는가</title>

  <defs>
    <marker id="ar-sv" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">지도학습 vs 자기지도학습 — 정답을 누가 만드나</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <rect x="30" y="55" width="290" height="205" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="175" y="78" text-anchor="middle" font-size="13" font-weight="500">지도학습 (Supervised)</text>

    <rect x="55" y="100" width="100" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="105" y="123" text-anchor="middle" font-size="11">고양이 사진</text>

    <line x1="155" y1="118" x2="190" y2="118" stroke="#000" stroke-width="1.2" marker-end="url(#ar-sv)"/>

    <rect x="195" y="100" width="100" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="245" y="123" text-anchor="middle" font-size="11" font-weight="500">"고양이"</text>

    <text x="175" y="160" text-anchor="middle" font-size="11" opacity="0.7">정답 라벨을 사람이 붙여둠</text>
    <text x="175" y="180" text-anchor="middle" font-size="10" opacity="0.55">→ 고품질, 비쌈</text>

    <text x="175" y="220" text-anchor="middle" font-size="10" opacity="0.55">예: ImageNet, 번역 데이터셋</text>

    <rect x="360" y="55" width="290" height="205" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="505" y="78" text-anchor="middle" font-size="13" font-weight="500">자기지도학습 (Self-supervised)</text>

    <rect x="385" y="100" width="130" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="450" y="123" text-anchor="middle" font-size="11">"I love ___"</text>

    <line x1="515" y1="118" x2="540" y2="118" stroke="#000" stroke-width="1.2" marker-end="url(#ar-sv)"/>

    <rect x="545" y="100" width="80" height="36" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="585" y="123" text-anchor="middle" font-size="11" font-weight="500">"you"</text>

    <text x="505" y="160" text-anchor="middle" font-size="11" opacity="0.7">정답이 데이터 안에 이미 있음</text>
    <text x="505" y="180" text-anchor="middle" font-size="10" opacity="0.55">→ 인터넷 텍스트 통째로 사용 가능</text>

    <text x="505" y="220" text-anchor="middle" font-size="10" opacity="0.55">예: GPT, Claude — "다음 단어 맞추기"</text>
  </g>
</svg>
