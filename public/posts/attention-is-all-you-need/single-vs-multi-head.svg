<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Single-head vs Multi-head — 한 관점 vs 여러 관점 동시에</title>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">왜 머리를 여러 개로? — Single vs Multi-head</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <rect x="40" y="55" width="290" height="225" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="185" y="78" text-anchor="middle" font-size="13" font-weight="500">Single-head</text>

    <rect x="155" y="100" width="60" height="32" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="185" y="120" text-anchor="middle" font-size="11">"love"</text>

    <line x1="185" y1="135" x2="185" y2="155" stroke="#000" stroke-width="1.2"/>

    <rect x="105" y="158" width="160" height="50" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="185" y="180" text-anchor="middle" font-size="11">W_Q, W_K, W_V</text>
    <text x="185" y="197" text-anchor="middle" font-size="10" opacity="0.6">한 가지 관점만</text>

    <line x1="185" y1="208" x2="185" y2="228" stroke="#000" stroke-width="1.2"/>

    <text x="185" y="245" text-anchor="middle" font-size="11" opacity="0.7">"love가 무엇과 관련 있나?"</text>
    <text x="185" y="262" text-anchor="middle" font-size="10" opacity="0.55">한 가지 관계만 잡힘</text>

    <rect x="350" y="55" width="290" height="225" rx="6" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="495" y="78" text-anchor="middle" font-size="13" font-weight="500">Multi-head (8개)</text>

    <rect x="465" y="100" width="60" height="32" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="495" y="120" text-anchor="middle" font-size="11">"love"</text>

    <g stroke="#000" stroke-width="1" fill="none" opacity="0.5">
      <line x1="495" y1="132" x2="385" y2="155"/>
      <line x1="495" y1="132" x2="440" y2="155"/>
      <line x1="495" y1="132" x2="495" y2="155"/>
      <line x1="495" y1="132" x2="550" y2="155"/>
      <line x1="495" y1="132" x2="605" y2="155"/>
    </g>

    <g font-size="9" fill="#000">
      <rect x="365" y="158" width="40" height="34" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
      <text x="385" y="178" text-anchor="middle">h1</text>

      <rect x="420" y="158" width="40" height="34" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
      <text x="440" y="178" text-anchor="middle">h2</text>

      <rect x="475" y="158" width="40" height="34" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
      <text x="495" y="178" text-anchor="middle">h3</text>

      <rect x="530" y="158" width="40" height="34" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
      <text x="550" y="178" text-anchor="middle">…</text>

      <rect x="585" y="158" width="40" height="34" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
      <text x="605" y="178" text-anchor="middle">h8</text>
    </g>

    <text x="495" y="218" text-anchor="middle" font-size="10" opacity="0.6">각 head가 다른 관점</text>

    <text x="495" y="245" text-anchor="middle" font-size="10" opacity="0.7">h1: love → I (주어 관계)</text>
    <text x="495" y="260" text-anchor="middle" font-size="10" opacity="0.7">h2: love → you (목적어 관계)</text>
    <text x="495" y="275" text-anchor="middle" font-size="10" opacity="0.7">h3: 어조 / 시제 / …</text>
  </g>

  <text x="340" y="305" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">각 head는 자기만의 W를 학습하기 때문에 자연스럽게 다른 관점이 갈린다</text>
</svg>
