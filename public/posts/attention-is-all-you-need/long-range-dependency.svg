<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Long-range dependency — RNN에선 앞 단어 정보가 점점 흐려진다</title>

  <defs>
    <marker id="ar-lr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RNN의 약점 — 멀리 갈수록 앞 단어 정보가 흐려진다</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">
    <rect x="20" y="80" width="80" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.8" opacity="1"/>
    <text x="60" y="100" text-anchor="middle" font-weight="500">"The cat"</text>
    <text x="60" y="118" text-anchor="middle" font-size="10" opacity="0.7">h₁ (선명)</text>

    <rect x="120" y="80" width="80" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.5" opacity="0.8"/>
    <text x="160" y="100" text-anchor="middle">"sat on"</text>
    <text x="160" y="118" text-anchor="middle" font-size="10" opacity="0.55">h₂</text>

    <rect x="220" y="80" width="80" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.3" opacity="0.65"/>
    <text x="260" y="100" text-anchor="middle">"the mat"</text>
    <text x="260" y="118" text-anchor="middle" font-size="10" opacity="0.45">h₃</text>

    <text x="340" y="105" text-anchor="middle" font-size="14" opacity="0.5">···</text>

    <rect x="380" y="80" width="80" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1.1" opacity="0.5"/>
    <text x="420" y="100" text-anchor="middle" opacity="0.7">"…"</text>
    <text x="420" y="118" text-anchor="middle" font-size="10" opacity="0.35">h_n</text>

    <rect x="480" y="80" width="80" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1" opacity="0.35"/>
    <text x="520" y="100" text-anchor="middle" opacity="0.55">"it was"</text>
    <text x="520" y="118" text-anchor="middle" font-size="10" opacity="0.3">h_n+1</text>

    <rect x="580" y="80" width="80" height="44" rx="4" fill="#fff" stroke="#000" stroke-width="1" opacity="0.3"/>
    <text x="620" y="100" text-anchor="middle" opacity="0.5">"warm"</text>
    <text x="620" y="118" text-anchor="middle" font-size="10" opacity="0.3">h_n+2</text>
  </g>

  <g stroke="#000" stroke-width="1.2" fill="none">
    <line x1="100" y1="102" x2="120" y2="102" marker-end="url(#ar-lr)"/>
    <line x1="200" y1="102" x2="220" y2="102" marker-end="url(#ar-lr)"/>
    <line x1="300" y1="102" x2="320" y2="102" marker-end="url(#ar-lr)" opacity="0.7"/>
    <line x1="360" y1="102" x2="380" y2="102" marker-end="url(#ar-lr)" opacity="0.6"/>
    <line x1="460" y1="102" x2="480" y2="102" marker-end="url(#ar-lr)" opacity="0.5"/>
    <line x1="560" y1="102" x2="580" y2="102" marker-end="url(#ar-lr)" opacity="0.5"/>
  </g>

  <path d="M 60 145 C 60 195 620 195 620 145" stroke="#000" stroke-width="1.1" fill="none" stroke-dasharray="3 3" opacity="0.55"/>

  <text x="340" y="220" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">"warm"이 "The cat"을 봐야 하는데, 거리만큼 정보가 흐려져 잘 안 닿는다</text>

  <text x="340" y="242" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">→ Attention의 동기: 모든 단어를 직접 다시 본다</text>
</svg>
