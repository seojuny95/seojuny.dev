<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FFN — 한 단어 벡터를 펼쳤다 줄이는 3단계</title>

  <defs>
    <marker id="ar-ffn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
    <pattern id="p-pos" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="1.1"/>
    </pattern>
    <pattern id="p-neg" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.4"/>
    </pattern>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">FFN — 한 단어 벡터를 펼쳤다 다시 줄인다</text>

  <text x="60" y="70" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">① 입력 (d=512)</text>
  <rect x="60" y="80" width="60" height="100" fill="url(#p-pos)" stroke="#000" stroke-width="1.4"/>

  <line x1="125" y1="130" x2="170" y2="130" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ffn)"/>
  <text x="148" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">× W₁ + b₁</text>
  <text x="148" y="148" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">펼친다</text>

  <text x="180" y="70" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">② 펼쳐진 벡터 (4d=2048)</text>
  <g>
    <rect x="180" y="80" width="140" height="100" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <rect x="183" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="201" y="83" width="16" height="94" fill="url(#p-neg)"/>
    <rect x="219" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="237" y="83" width="16" height="94" fill="url(#p-neg)"/>
    <rect x="255" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="273" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="291" y="83" width="16" height="94" fill="url(#p-neg)"/>
  </g>
  <text x="250" y="200" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.55">양수 + 음수 섞임</text>

  <line x1="325" y1="130" x2="370" y2="130" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ffn)"/>
  <text x="348" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">ReLU</text>
  <text x="348" y="148" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">음수 → 0</text>

  <text x="380" y="70" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">③ ReLU 후 (2048)</text>
  <g>
    <rect x="380" y="80" width="140" height="100" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <rect x="383" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="401" y="83" width="16" height="94" fill="#fff"/>
    <rect x="419" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="437" y="83" width="16" height="94" fill="#fff"/>
    <rect x="455" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="473" y="83" width="16" height="94" fill="url(#p-pos)"/>
    <rect x="491" y="83" width="16" height="94" fill="#fff"/>
  </g>
  <text x="450" y="200" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.55">음수 자리는 비어 있음</text>

  <line x1="525" y1="130" x2="565" y2="130" stroke="#000" stroke-width="1.4" marker-end="url(#ar-ffn)"/>
  <text x="545" y="118" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">× W₂ + b₂</text>
  <text x="545" y="148" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">줄인다</text>

  <text x="615" y="70" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">④ 출력 (d=512)</text>
  <rect x="575" y="80" width="60" height="100" fill="url(#p-pos)" stroke="#000" stroke-width="1.6"/>

  <line x1="60" y1="230" x2="635" y2="230" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"/>

  <text x="340" y="255" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000" opacity="0.8">512 → 2048 → 음수 0으로 → 2048 → 512</text>
  <text x="340" y="278" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">한 단어 벡터를 한 번 펼쳤다가 비선형(ReLU)을 거쳐 다시 압축한다</text>
  <text x="340" y="298" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">같은 W, b가 모든 단어에 똑같이 적용됨 (position-wise)</text>
</svg>
