<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Cross-attention — Q는 decoder, K/V는 encoder</title>

  <text x="340" y="32" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Cross-attention — Q와 K/V가 서로 다른 문장에서 온다</text>

  <text x="160" y="78" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">Encoder (한국어 입력)</text>
  <text x="520" y="78" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">Decoder (영어 출력 중)</text>

  <rect x="60" y="95" width="200" height="220" rx="6" fill="none" stroke="#000" stroke-width="1.4" opacity="0.4"/>
  <rect x="420" y="95" width="200" height="220" rx="6" fill="none" stroke="#000" stroke-width="1.4" opacity="0.4"/>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#000">
    <circle cx="160" cy="135" r="8" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="180" y="140" text-anchor="start">"나는"</text>

    <circle cx="160" cy="200" r="8" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="180" y="205" text-anchor="start">"너를"</text>

    <circle cx="160" cy="265" r="8" fill="#fff" stroke="#000" stroke-width="1.6"/>
    <text x="180" y="270" text-anchor="start">"사랑해"</text>

    <text x="160" y="305" text-anchor="middle" font-size="11" opacity="0.6">K, V 제공</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#000">
    <circle cx="520" cy="200" r="10" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="540" y="205" text-anchor="start" font-weight="500">"love"</text>
    <text x="540" y="222" text-anchor="start" font-size="11" opacity="0.6">(지금 만드는 중)</text>

    <text x="520" y="305" text-anchor="middle" font-size="11" opacity="0.6">Q 제공</text>
  </g>

  <g stroke="#000" stroke-width="1.2" fill="none" opacity="0.45">
    <path d="M 510 198 Q 340 150 168 138" stroke-dasharray="3 3"/>
    <path d="M 510 200 Q 340 200 168 200" stroke-dasharray="3 3"/>
    <path d="M 510 202 Q 340 250 168 263" stroke-dasharray="3 3"/>
  </g>

  <text x="340" y="335" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#000" opacity="0.6">decoder가 영어 단어 만들 때, encoder의 한국어 표현을 다시 본다</text>
</svg>
