<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Path length 비교 — 두 단어를 연결하는 거리</title>

  <defs>
    <marker id="ar-pl" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#000"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">두 단어를 연결하는 거리 (path length)</text>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <text x="40" y="80" font-size="12" font-weight="500">RNN</text>
    <text x="40" y="96" font-size="10" opacity="0.55">O(n)</text>

    <rect x="190" y="80" width="40" height="28" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="210" y="98" text-anchor="middle" font-size="11">w₁</text>

    <rect x="245" y="80" width="40" height="28" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="265" y="98" text-anchor="middle" font-size="11">w₂</text>

    <rect x="300" y="80" width="40" height="28" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="320" y="98" text-anchor="middle" font-size="11">w₃</text>

    <text x="365" y="98" text-anchor="middle" font-size="14" opacity="0.5">···</text>

    <rect x="400" y="80" width="40" height="28" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="420" y="98" text-anchor="middle" font-size="11">w_n</text>

    <line x1="230" y1="94" x2="245" y2="94" stroke="#000" stroke-width="1.1" marker-end="url(#ar-pl)"/>
    <line x1="285" y1="94" x2="300" y2="94" stroke="#000" stroke-width="1.1" marker-end="url(#ar-pl)"/>
    <line x1="340" y1="94" x2="355" y2="94" stroke="#000" stroke-width="1.1" marker-end="url(#ar-pl)"/>
    <line x1="380" y1="94" x2="400" y2="94" stroke="#000" stroke-width="1.1" marker-end="url(#ar-pl)"/>

    <path d="M 210 115 C 210 140 420 140 420 115" stroke="#000" stroke-width="1.1" fill="none" stroke-dasharray="3 3" opacity="0.55"/>
    <text x="540" y="98" font-size="11" opacity="0.65">w₁ → w_n: n step</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <text x="40" y="200" font-size="12" font-weight="500">CNN</text>
    <text x="40" y="216" font-size="10" opacity="0.55">O(log n)</text>

    <rect x="190" y="220" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <rect x="245" y="220" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <rect x="300" y="220" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <rect x="355" y="220" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <rect x="410" y="220" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="210" y="237" text-anchor="middle" font-size="10">w₁</text>
    <text x="265" y="237" text-anchor="middle" font-size="10">w₂</text>
    <text x="320" y="237" text-anchor="middle" font-size="10">w₃</text>
    <text x="375" y="237" text-anchor="middle" font-size="10">w₄</text>
    <text x="430" y="237" text-anchor="middle" font-size="10">w₅</text>

    <line x1="210" y1="218" x2="225" y2="195" stroke="#000" stroke-width="1" opacity="0.5"/>
    <line x1="265" y1="218" x2="250" y2="195" stroke="#000" stroke-width="1" opacity="0.5"/>
    <line x1="320" y1="218" x2="305" y2="195" stroke="#000" stroke-width="1" opacity="0.5"/>

    <rect x="220" y="170" width="80" height="22" rx="3" fill="#fff" stroke="#000" stroke-width="1.2" opacity="0.85"/>
    <text x="260" y="185" text-anchor="middle" font-size="10" opacity="0.75">layer 2 노드</text>

    <text x="540" y="237" font-size="11" opacity="0.65">층을 쌓아 receptive field 확장</text>
  </g>

  <g font-family="-apple-system, system-ui, sans-serif" fill="#000">
    <text x="40" y="305" font-size="12" font-weight="500">Self-Attention</text>
    <text x="40" y="321" font-size="10" opacity="0.55">O(1)</text>

    <rect x="190" y="305" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="210" y="322" text-anchor="middle" font-size="10">w₁</text>

    <text x="320" y="322" text-anchor="middle" font-size="14" opacity="0.5">···</text>

    <rect x="400" y="305" width="40" height="24" rx="3" fill="#fff" stroke="#000" stroke-width="1.4"/>
    <text x="420" y="322" text-anchor="middle" font-size="10">w_n</text>

    <path d="M 230 295 Q 320 270 400 295" stroke="#000" stroke-width="1.6" fill="none" marker-end="url(#ar-pl)"/>

    <text x="540" y="322" font-size="11" opacity="0.65">항상 1 step (직접 연결)</text>
  </g>

  <line x1="150" y1="60" x2="150" y2="345" stroke="#000" stroke-width="1" opacity="0.25"/>
</svg>
