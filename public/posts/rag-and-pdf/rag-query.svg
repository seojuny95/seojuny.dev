<svg width="100%" viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>답변 생성 — 검색해서 답하기</title>
  <desc>답변 생성 단계의 흐름. 사용자 질문을 임베딩 모델로 벡터로 바꾸고, 벡터 DB에서 유사도가 높은 청크를 검색한 뒤, 검색한 정보와 질문으로 프롬프트를 구성해 LLM이 답변을 생성한다.</desc>

  <defs>
    <marker id="qr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">답변 생성 — 검색해서 답하기</text>

  <rect x="20" y="54" width="92" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="66" y="75" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">질문</text>
  <path d="M 112 75 L 130 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <rect x="130" y="54" width="92" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="176" y="75" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">임베딩 모델</text>
  <path d="M 222 75 L 240 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <rect x="240" y="54" width="92" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="286" y="75" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">유사도 검색</text>
  <path d="M 332 75 L 350 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <rect x="350" y="54" width="92" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="396" y="75" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">프롬프트 구성</text>
  <path d="M 442 75 L 460 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <rect x="460" y="54" width="92" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="506" y="75" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">LLM</text>
  <path d="M 552 75 L 570 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qr-arr)"/>

  <rect x="570" y="54" width="92" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="616" y="75" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">답변</text>

  <!-- 벡터 DB -> 유사도 검색 -->
  <path d="M 286 120 L 286 98" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#qr-arr)"/>
  <rect x="232" y="120" width="108" height="38" rx="6" fill="#fff" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="286" y="139" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">벡터 DB</text>
</svg>
