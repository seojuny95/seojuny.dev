<svg width="100%" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>벡터 DB에 저장</title>
  <desc>각 청크의 벡터와 원본 텍스트를 쌍으로 묶어 벡터 DB에 저장한다. 나중에 질문과 가까운 벡터를 찾고 짝지어진 원문을 꺼내 쓰기 위해서다.</desc>
  <defs>
    <marker id="st-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">벡터 DB에 저장 — 벡터와 원문을 쌍으로</text>

  <!-- (벡터, 원문) 쌍 3개 -->
  <g font-family="-apple-system, system-ui, sans-serif">
    <rect x="40" y="48" width="120" height="24" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="100" y="60" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#000">[0.82, 0.19, …]</text>
    <rect x="164" y="48" width="96" height="24" rx="4" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="1.3"/>
    <text x="212" y="60" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#000">원문 청크 1</text>

    <rect x="40" y="78" width="120" height="24" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="100" y="90" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#000">[0.11, 0.74, …]</text>
    <rect x="164" y="78" width="96" height="24" rx="4" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="1.3"/>
    <text x="212" y="90" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#000">원문 청크 2</text>

    <rect x="40" y="108" width="120" height="24" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="100" y="120" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#000">[0.40, -0.6, …]</text>
    <rect x="164" y="108" width="96" height="24" rx="4" fill="#000" fill-opacity="0.05" stroke="#000" stroke-width="1.3"/>
    <text x="212" y="120" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#000">원문 청크 3</text>
  </g>

  <path d="M 270 90 L 360 90" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#st-arr)"/>

  <!-- 벡터 DB -->
  <rect x="380" y="58" width="180" height="64" rx="8" fill="#fff" stroke="#000" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="470" y="82" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#000">벡터 DB</text>
  <text x="470" y="102" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">벡터 + 원문 보관</text>
</svg>
