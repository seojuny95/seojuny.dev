<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RAG-Sequence vs RAG-Token — 문서를 언제 고르나</title>
  <desc>RAG-Sequence는 검색한 문서 하나로 답변 전체를 생성한다. RAG-Token은 답변의 토큰을 만들 때마다 여러 문서 중에서 골라 참고하므로, 한 답변 안에 여러 문서의 내용을 섞을 수 있다.</desc>

  <defs>
    <marker id="rt-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 구분선 -->
  <line x1="340" y1="50" x2="340" y2="262" stroke="#000" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>

  <!-- ===== 왼쪽: RAG-Sequence ===== -->
  <text x="170" y="34" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#000">RAG-Sequence</text>
  <text x="170" y="52" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">문서 하나로 답 전체</text>

  <!-- 문서 z -->
  <rect x="123" y="74" width="94" height="30" rx="5" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="170" y="89" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">문서 z</text>

  <!-- 한 화살표로 답 전체 -->
  <path d="M 170 104 L 170 156" fill="none" stroke="#000" stroke-width="1.6" stroke-linecap="round" marker-end="url(#rt-arr)"/>

  <!-- 답변 토큰들 (모두 같은 문서) -->
  <rect x="58" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="80" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₁</text>
  <rect x="106" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="128" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₂</text>
  <rect x="154" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="176" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₃</text>
  <rect x="202" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="224" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₄</text>

  <text x="170" y="222" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">모든 토큰을 같은 문서 하나로</text>
  <text x="170" y="250" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">문서를 고르고 답 전체를 생성</text>

  <!-- ===== 오른쪽: RAG-Token ===== -->
  <text x="510" y="34" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13.5" font-weight="600" fill="#000">RAG-Token</text>
  <text x="510" y="52" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">토큰마다 다른 문서</text>

  <!-- 문서 z1 z2 z3 -->
  <rect x="392" y="74" width="56" height="28" rx="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="420" y="88" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">z₁</text>
  <rect x="482" y="74" width="56" height="28" rx="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="510" y="88" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">z₂</text>
  <rect x="572" y="74" width="56" height="28" rx="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="600" y="88" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">z₃</text>

  <!-- 토큰마다 다른 문서에서 화살표 -->
  <path d="M 420 102 L 426 156" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <path d="M 600 102 L 484 156" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <path d="M 510 102 L 540 156" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" marker-end="url(#rt-arr)"/>
  <path d="M 420 102 L 598 156" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" marker-end="url(#rt-arr)" opacity="0.85"/>

  <!-- 답변 토큰들 -->
  <rect x="398" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="420" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₁</text>
  <rect x="446" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="468" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₂</text>
  <rect x="494" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="516" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₃</text>
  <rect x="572" y="162" width="44" height="30" rx="5" fill="#000" fill-opacity="0.07" stroke="#000" stroke-width="1.3"/>
  <text x="594" y="177" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">토큰₄</text>

  <text x="510" y="222" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.7">토큰마다 다른 문서를 참고</text>
  <text x="510" y="250" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">한 답에 여러 문서를 섞는다</text>
</svg>
