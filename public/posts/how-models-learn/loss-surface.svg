<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>손실 곡선/곡면 — 가장 낮은 점이 목표</title>
  <desc>왼쪽: 파라미터 1개일 때 손실은 U자 곡선. 오른쪽: 파라미터 2개일 때 손실은 그릇 모양 곡면(3D). 두 경우 모두 가장 낮은 점이 학습의 목표.</desc>

  <defs>
    <marker id="ls-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- 그릇 내부 shading용 그라데이션 -->
    <radialGradient id="bowl-grad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">손실 곡선/곡면 — 가장 낮은 점이 학습의 목표</text>

  <!-- ============ LEFT: 1D 곡선 ============ -->
  <text x="170" y="60" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">파라미터 1개 — 곡선</text>

  <!-- 축 + 화살표 -->
  <line x1="55" y1="280" x2="295" y2="280" stroke="#000" stroke-width="1.4"/>
  <line x1="55" y1="90" x2="55" y2="280" stroke="#000" stroke-width="1.4"/>
  <path d="M 290 276 L 299 280 L 290 284" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 51 96 L 55 87 L 59 96" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 축 라벨 -->
  <text x="55" y="80" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">L</text>
  <text x="306" y="284" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">w</text>

  <!-- U자 곡선 (정확한 포물선) — 최저점 y=260 (x=170) -->
  <path d="M 70 100 Q 170 420 270 100" fill="none" stroke="#000" stroke-width="2"/>

  <!-- 현재 위치 (오른쪽 비탈, 곡선 위 정확히) — x=240, 곡선 y≈182 -->
  <circle cx="240" cy="182" r="6" fill="#000"/>
  <text x="252" y="178" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">현재 위치</text>

  <!-- 최저점 -->
  <circle cx="170" cy="260" r="6.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="170" y="298" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">최저점 (목표)</text>

  <!-- 굴러가는 화살표 (현재 → 최저점, 곡선 따라) -->
  <path d="M 234 188 Q 200 245 178 257" fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#ls-arr)" opacity="0.75"/>

  <!-- ============ 구분선 ============ -->
  <line x1="335" y1="50" x2="335" y2="320" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- ============ RIGHT: 3D 그릇 ============ -->
  <text x="510" y="60" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">파라미터 여러 개 — 곡면 (3D)</text>

  <!-- 그릇 내부 shading (그라데이션으로 깊이감) -->
  <ellipse cx="510" cy="135" rx="125" ry="32" fill="url(#bowl-grad)"/>

  <!-- 그릇 내부 채움 (옅게) - 깊이감용 -->
  <path d="M 385 135 Q 410 250 510 280 Q 610 250 635 135 A 125 32 0 0 1 385 135 Z"
        fill="#000" opacity="0.06"/>

  <!-- 그릇 외곽: 양쪽 벽 (뒤쪽 림 → 바닥 → 앞쪽 림) -->
  <path d="M 385 135 Q 410 235 510 280 Q 610 235 635 135"
        fill="none" stroke="#000" stroke-width="2"/>

  <!-- 그릇 림 (위에서 본 타원) -->
  <ellipse cx="510" cy="135" rx="125" ry="32" fill="none" stroke="#000" stroke-width="2"/>

  <!-- 내부 등고선 (깊이별 cross-section) — 작아지고 아래로 이동 -->
  <ellipse cx="510" cy="172" rx="98" ry="22" fill="none" stroke="#000" stroke-width="1.1" opacity="0.55"/>
  <ellipse cx="510" cy="205" rx="70" ry="15" fill="none" stroke="#000" stroke-width="1.1" opacity="0.5"/>
  <ellipse cx="510" cy="232" rx="45" ry="9" fill="none" stroke="#000" stroke-width="1.1" opacity="0.45"/>
  <ellipse cx="510" cy="252" rx="24" ry="5" fill="none" stroke="#000" stroke-width="1.1" opacity="0.4"/>
  <ellipse cx="510" cy="266" rx="11" ry="2.5" fill="none" stroke="#000" stroke-width="1.1" opacity="0.4"/>

  <!-- 그릇 안쪽 "립" 선 (앞쪽 림 음영) -->
  <path d="M 385 135 Q 510 160 635 135" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3" opacity="0.45"/>

  <!-- 현재 위치 — 림 우상단에 공 -->
  <circle cx="630" cy="128" r="7" fill="#000"/>
  <text x="640" y="120" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">현재</text>

  <!-- 굴러떨어지는 궤적 (림 → 안쪽 → 바닥) -->
  <path d="M 624 134 Q 580 200 525 270" fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="4 3" marker-end="url(#ls-arr)" opacity="0.75"/>

  <!-- 최저점 (바닥) -->
  <circle cx="510" cy="275" r="6.5" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="510" y="298" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">최저점</text>

  <!-- ============ 하단 ============ -->
  <text x="340" y="335" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">현재 위치에서 최저점까지 — 곡선/곡면을 따라 내려가는 길을 찾는다</text>
</svg>
