<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>안개 속 하산 — 발 밑만 보고 한 걸음씩</title>
  <desc>비탈 가운데(보이는 범위)에 등산가가 서 있고, 비탈의 양 끝은 안개로 흐릿하게 표현되어 있다. 등산가는 발 밑 비탈의 기울기를 보고 내리막 방향으로 한 걸음 내딛는다.</desc>

  <defs>
    <marker id="fm-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">안개 속 하산 — 발 밑만 보고 한 걸음씩</text>

  <!-- 상단 안개 표시 (작게) -->
  <text x="340" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">⋯  안개로 멀리는 안 보임  ⋯</text>

  <!-- ============ 비탈 — 양 끝 흐릿, 가운데(보이는 범위) 또렷 ============ -->
  <!-- 왼쪽 끝: 안개에 가려 흐릿 -->
  <path d="M 30 95 Q 90 105 155 130"
        fill="none" stroke="#000" stroke-width="1.6" opacity="0.22" stroke-dasharray="5 4"/>

  <!-- 가운데: 또렷이 보이는 비탈 -->
  <path d="M 155 130 Q 260 175 410 225"
        fill="none" stroke="#000" stroke-width="2.8" stroke-linecap="round"/>

  <!-- 오른쪽 끝: 안개에 가려 흐릿 -->
  <path d="M 410 225 Q 510 250 640 260"
        fill="none" stroke="#000" stroke-width="1.6" opacity="0.22" stroke-dasharray="5 4"/>

  <!-- ============ 등산가 (또렷한 비탈 가운데) ============ -->
  <g stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round">
    <!-- 머리 -->
    <circle cx="265" cy="150" r="11" fill="#fff"/>
    <!-- 몸 -->
    <line x1="265" y1="161" x2="265" y2="192"/>
    <!-- 팔 -->
    <line x1="265" y1="172" x2="250" y2="186"/>
    <line x1="265" y1="172" x2="282" y2="184"/>
    <!-- 다리 -->
    <line x1="265" y1="192" x2="253" y2="212"/>
    <line x1="265" y1="192" x2="280" y2="214"/>
  </g>

  <!-- ============ 한 걸음 화살표 ============ -->
  <path d="M 298 220 Q 340 234 390 244"
        fill="none" stroke="#000" stroke-width="2.8" stroke-linecap="round" marker-end="url(#fm-arr)"/>
  <text x="400" y="248" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">한 걸음</text>
  <text x="400" y="264" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">(내리막 방향으로)</text>
</svg>
