<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>2-layer 신경망 역전파 — L에서 거꾸로 기울기 계산</title>
  <desc>같은 그래프 위에서 L에서 시작해 ∂L/∂z₂ → ∂L/∂a₁ → ∂L/∂z₁ 순으로 거꾸로 기울기를 흘려보낸다. 각 단계는 받은 기울기에 그 단계의 미분(W₂, ReLU′, W₁)을 곱하면 된다.</desc>

  <defs>
    <marker id="tb-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">역전파 — 손실 L에서 시작해 거꾸로</text>

  <!-- ============ 노드 5개 (중간은 옅게, L은 진하게 = 시작점) ============ -->
  <g>
    <circle cx="60" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.4" opacity="0.45"/>
    <text x="60" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="600" fill="#000" opacity="0.55">x</text>

    <circle cx="195" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.4" opacity="0.55"/>
    <text x="195" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#000" opacity="0.65">z₁</text>

    <circle cx="330" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.4" opacity="0.65"/>
    <text x="330" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#000" opacity="0.75">a₁</text>

    <circle cx="465" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.4" opacity="0.75"/>
    <text x="465" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#000" opacity="0.85">z₂</text>

    <!-- L: 시작점 강조 -->
    <circle cx="610" cy="130" r="28" fill="#fff" stroke="#000" stroke-width="2.6"/>
    <text x="610" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="16" font-weight="700" fill="#000">L</text>
  </g>
  <text x="610" y="92" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">출발점</text>

  <!-- ============ Backward 화살표 (오른쪽 → 왼쪽, 점선) ============ -->
  <g fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-dasharray="5 3">
    <path d="M 582 130 L 491 130" marker-end="url(#tb-arr)"/>
    <path d="M 439 130 L 356 130" marker-end="url(#tb-arr)"/>
    <path d="M 304 130 L 221 130" marker-end="url(#tb-arr)"/>
    <path d="M 169 130 L 86 130" marker-end="url(#tb-arr)"/>
  </g>

  <!-- ============ 각 단계 기울기 라벨 ============ -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000" text-anchor="middle">
    <text x="537" y="168">∂L/∂z₂</text>
    <text x="397" y="168">∂L/∂a₁</text>
    <text x="262" y="168">∂L/∂z₁</text>
    <text x="127" y="168">∂L/∂x</text>
  </g>

  <!-- ============ 하단 ============ -->
  <path d="M 620 215 L 50 215" fill="none" stroke="#000" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#tb-arr)"/>
  <text x="340" y="208" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000" opacity="0.75">backward — 기울기가 뒤로</text>
  <text x="340" y="244" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">각 단계: 받은 기울기 × 이 단계의 미분 (W₂, ReLU′, W₁)</text>
</svg>
