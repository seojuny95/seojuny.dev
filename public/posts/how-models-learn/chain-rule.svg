<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>연쇄법칙 — 각 단계의 미분을 곱한다</title>
  <desc>w → g → L 사슬에서 한 변수의 변화가 다음 변수로, 또 그 다음 변수로 전달된다. 각 단계의 미분(×3, ×2g)을 곱하면 처음 입력 w가 최종 L에 미치는 영향(∂L/∂w = 6g)을 얻는다.</desc>

  <defs>
    <marker id="cr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">연쇄법칙 — 사슬을 따라 미분을 곱한다</text>

  <!-- ============ 노드 3개: w → g → L ============ -->
  <!-- 노드 w -->
  <circle cx="110" cy="140" r="32" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="110" y="147" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#000">w</text>

  <!-- 노드 g -->
  <circle cx="340" cy="140" r="32" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="340" y="147" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#000">g</text>

  <!-- 노드 L -->
  <circle cx="570" cy="140" r="32" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="570" y="147" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#000">L</text>

  <!-- ============ 화살표 + 변환 라벨 ============ -->
  <!-- w → g -->
  <path d="M 144 140 L 305 140" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" marker-end="url(#cr-arr)"/>
  <text x="225" y="118" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="600" fill="#000">g = 3w + 1</text>
  <text x="225" y="170" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">∂g/∂w = 3</text>

  <!-- g → L -->
  <path d="M 374 140 L 535 140" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round" marker-end="url(#cr-arr)"/>
  <text x="455" y="118" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="600" fill="#000">L = g²</text>
  <text x="455" y="170" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">∂L/∂g = 2g</text>

  <!-- ============ 하단: 연쇄법칙 공식 + 결과 ============ -->
  <line x1="60" y1="215" x2="620" y2="215" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>

  <text x="340" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">두 단계의 미분을 곱하면 w가 L에 미치는 영향이 나온다</text>

  <text x="340" y="270" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="700" fill="#000">∂L/∂w  =  ∂L/∂g  ×  ∂g/∂w  =  2g × 3  =  6g</text>

  <text x="340" y="296" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">신경망은 사슬이 layer 수만큼 길어졌을 뿐 — 똑같은 규칙</text>
</svg>
