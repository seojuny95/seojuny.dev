<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>MSE — average area of squares with error as the side length</title>
  <desc>Left: vertical errors between data points and the prediction line in a regression plot. Right: three squares whose side equals each error. The large-error square is 9× the area. MSE is the average of these areas.</desc>

  <defs>
    <marker id="mse-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">MSE — average area of squares with error as side length</text>

  <!-- =============== LEFT: Regression plot =============== -->
  <!-- Axes -->
  <line x1="50" y1="240" x2="285" y2="240" stroke="#000" stroke-width="1.2"/>
  <line x1="50" y1="55" x2="50" y2="240" stroke="#000" stroke-width="1.2"/>
  <text x="44" y="60" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">y</text>
  <text x="290" y="252" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.6">x</text>

  <!-- Prediction line -->
  <line x1="60" y1="215" x2="275" y2="75" stroke="#000" stroke-width="1.8"/>
  <text x="228" y="68" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Pred. line  ŷ</text>

  <!-- Data point 1: small error (error = 1) -->
  <circle cx="100" cy="200" r="4.5" fill="#000"/>
  <line x1="100" y1="200" x2="100" y2="189" stroke="#000" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.75"/>
  <text x="108" y="199" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Error 1</text>

  <!-- Data point 2: medium error (error = 2) -->
  <circle cx="170" cy="180" r="4.5" fill="#000"/>
  <line x1="170" y1="180" x2="170" y2="144" stroke="#000" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.75"/>
  <text x="178" y="165" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Error 2</text>

  <!-- Data point 3: large error (error = 3) -->
  <circle cx="240" cy="200" r="4.5" fill="#000"/>
  <line x1="240" y1="200" x2="240" y2="99" stroke="#000" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.75"/>
  <text x="248" y="153" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Error 3</text>

  <!-- =============== Transform arrow =============== -->
  <path d="M 300 150 L 345 150" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mse-arr)"/>
  <text x="322" y="142" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">square each</text>
  <text x="322" y="166" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">error</text>

  <!-- =============== RIGHT: Square visualization =============== -->
  <!-- Common base line -->
  <line x1="355" y1="250" x2="595" y2="250" stroke="#000" stroke-width="1" opacity="0.4"/>

  <!-- Square 1: side 25 (error 1) → area 1 -->
  <rect x="365" y="225" width="25" height="25" fill="#000" opacity="0.85"/>
  <text x="377" y="242" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="377" y="268" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.7">1×1 = 1</text>

  <!-- Square 2: side 50 (error 2) → area 4 -->
  <rect x="420" y="200" width="50" height="50" fill="#000" opacity="0.7"/>
  <text x="445" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="700" fill="#fff">4</text>
  <text x="445" y="268" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.7">2×2 = 4</text>

  <!-- Square 3: side 75 (error 3) → area 9 -->
  <rect x="500" y="175" width="75" height="75" fill="#000" opacity="0.55"/>
  <text x="537" y="220" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="18" font-weight="700" fill="#fff">9</text>
  <text x="537" y="268" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.7">3×3 = 9</text>

  <!-- avg arrow + MSE box -->
  <path d="M 600 215 L 632 215" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-end="url(#mse-arr)"/>
  <text x="616" y="207" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">avg</text>

  <rect x="600" y="225" width="60" height="32" rx="4" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="630" y="240" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9" fill="#000" opacity="0.65">MSE</text>
  <text x="630" y="253" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">4.67</text>

  <!-- =============== Bottom =============== -->
  <line x1="40" y1="295" x2="640" y2="295" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>

  <text x="340" y="318" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#000">MSE = (1 + 4 + 9) / 3 ≈ 4.67</text>
  <text x="340" y="343" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">A 3× error (1→3) gives a 9× larger square — much heavier penalty for bigger errors</text>
</svg>
