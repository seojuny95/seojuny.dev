<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Linear regression training progress — predicted line converging to the true line</title>
  <desc>Across 4 panels, as epochs advance from 0, 40, 80, to 200, the model's predicted line (solid) approaches the true line (dashed) and nearly overlaps it by the end.</desc>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">As epochs advance — the predicted line converges to the true line</text>

  <text x="98" y="68" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">epoch 0</text>
  <line x1="30" y1="258" x2="170" y2="100" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="30" y1="192" x2="170" y2="180" stroke="#000" stroke-width="2.2"/>
  <g fill="#000">
    <circle cx="50" cy="244" r="2.8"/>
    <circle cx="80" cy="216" r="2.8"/>
    <circle cx="115" cy="162" r="2.8"/>
    <circle cx="150" cy="118" r="2.8"/>
  </g>

  <line x1="180" y1="60" x2="180" y2="280" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

  <text x="265" y="68" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">epoch 40</text>
  <line x1="197" y1="258" x2="337" y2="100" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="197" y1="245" x2="337" y2="117" stroke="#000" stroke-width="2.2"/>
  <g fill="#000">
    <circle cx="217" cy="244" r="2.8"/>
    <circle cx="247" cy="216" r="2.8"/>
    <circle cx="282" cy="162" r="2.8"/>
    <circle cx="317" cy="118" r="2.8"/>
  </g>

  <line x1="347" y1="60" x2="347" y2="280" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

  <text x="432" y="68" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">epoch 80</text>
  <line x1="364" y1="258" x2="504" y2="100" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="364" y1="256" x2="504" y2="103" stroke="#000" stroke-width="2.2"/>
  <g fill="#000">
    <circle cx="384" cy="244" r="2.8"/>
    <circle cx="414" cy="216" r="2.8"/>
    <circle cx="449" cy="162" r="2.8"/>
    <circle cx="484" cy="118" r="2.8"/>
  </g>

  <line x1="514" y1="60" x2="514" y2="280" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

  <text x="599" y="68" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="700" fill="#000">epoch 200</text>
  <line x1="531" y1="258" x2="671" y2="100" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.7"/>
  <line x1="531" y1="258" x2="671" y2="100" stroke="#000" stroke-width="2.2"/>
  <g fill="#000">
    <circle cx="551" cy="244" r="2.8"/>
    <circle cx="581" cy="216" r="2.8"/>
    <circle cx="616" cy="162" r="2.8"/>
    <circle cx="651" cy="118" r="2.8"/>
  </g>

  <g transform="translate(220 295)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.7"/>
    <text x="25" y="3" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.8">True (y=2x+1)</text>
  </g>
  <g transform="translate(380 295)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#000" stroke-width="2.2"/>
    <text x="25" y="3" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.8">Model pred.</text>
  </g>
</svg>
