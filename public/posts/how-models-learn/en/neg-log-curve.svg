<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>−log(correct-class prob.) — confident correct → 0; confident wrong → large</title>
  <desc>X-axis: model's probability at the correct position (0–1). Y-axis: loss L. At prob. 0.1, loss = 2.30; at prob. 0.9, loss = 0.11. As probability approaches 0, loss explodes; as it approaches 1, loss approaches 0.</desc>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">−log(correct-class prob.) — confident correct: 0; confident wrong: large</text>

  <!-- ============ Axes ============ -->
  <!-- Y-axis + top arrow -->
  <line x1="100" y1="65" x2="100" y2="280" stroke="#000" stroke-width="1.4"/>
  <path d="M 96 71 L 100 62 L 104 71" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- X-axis + right arrow -->
  <line x1="100" y1="280" x2="625" y2="280" stroke="#000" stroke-width="1.4"/>
  <path d="M 619 276 L 628 280 L 619 284" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Axis labels -->
  <text x="100" y="55" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Loss L</text>
  <text x="360" y="320" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">Correct-class prob.  ŷ</text>

  <!-- ============ Y-axis ticks: 0, 1, 2, 3 (1 unit = 70px) ============ -->
  <g stroke="#000" stroke-width="1.2">
    <line x1="95" y1="280" x2="100" y2="280"/>
    <line x1="95" y1="210" x2="100" y2="210"/>
    <line x1="95" y1="140" x2="100" y2="140"/>
    <line x1="95" y1="70"  x2="100" y2="70"/>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.75" text-anchor="end">
    <text x="92" y="284">0</text>
    <text x="92" y="214">1</text>
    <text x="92" y="144">2</text>
    <text x="92" y="74">3</text>
  </g>

  <!-- ============ X-axis ticks: 0, 0.25, 0.5, 0.75, 1 (1 unit = 520px) ============ -->
  <g stroke="#000" stroke-width="1.2">
    <line x1="100" y1="280" x2="100" y2="285"/>
    <line x1="230" y1="280" x2="230" y2="285"/>
    <line x1="360" y1="280" x2="360" y2="285"/>
    <line x1="490" y1="280" x2="490" y2="285"/>
    <line x1="620" y1="280" x2="620" y2="285"/>
  </g>
  <g font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.75" text-anchor="middle">
    <text x="100" y="298">0</text>
    <text x="230" y="298">0.25</text>
    <text x="360" y="298">0.5</text>
    <text x="490" y="298">0.75</text>
    <text x="620" y="298">1</text>
  </g>

  <!-- ============ −log(x) curve ============ -->
  <!-- Mapping: x_px = 100 + value*520, y_px = 280 - loss*70 -->
  <path d="M 126 70 Q 145 90 152 119 Q 180 150 204 167 Q 256 196 360 232 Q 464 255 568 272 Q 600 278 620 280"
        fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>

  <!-- Curve end ∞ notation -->
  <text x="138" y="78" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">∞</text>

  <!-- ============ Marking point 1: prob 0.1, loss 2.30 → (152, 119) ============ -->
  <line x1="152" y1="119" x2="152" y2="280" stroke="#000" stroke-width="0.9" stroke-dasharray="3 3" opacity="0.55"/>
  <line x1="100" y1="119" x2="152" y2="119" stroke="#000" stroke-width="0.9" stroke-dasharray="3 3" opacity="0.55"/>
  <circle cx="152" cy="119" r="4.5" fill="#000"/>
  <text x="170" y="100" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000">Prob. 0.1 → Loss 2.30</text>
  <text x="170" y="116" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">Confidently wrong — heavy penalty</text>

  <!-- ============ Marking point 2: prob 0.9, loss 0.11 → (568, 272) ============ -->
  <line x1="568" y1="272" x2="568" y2="280" stroke="#000" stroke-width="0.9" stroke-dasharray="3 3" opacity="0.55"/>
  <line x1="100" y1="272" x2="568" y2="272" stroke="#000" stroke-width="0.9" stroke-dasharray="3 3" opacity="0.4"/>
  <circle cx="568" cy="272" r="4.5" fill="#000"/>
  <text x="560" y="225" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000">Prob. 0.9 → Loss 0.11</text>
  <text x="560" y="241" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">Confidently correct — small penalty</text>

  <!-- ============ Bottom note ============ -->
  <text x="340" y="348" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Closer to 1 → loss → 0; closer to 0 → loss explodes — asymmetric penalty</text>
</svg>
