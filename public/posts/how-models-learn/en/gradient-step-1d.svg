<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Gradient → one step in the opposite direction</title>
  <desc>In the left panel, the gradient at the current position points uphill (upper right). In the right panel, stepping in the opposite direction (lower left) moves to a position closer to the minimum.</desc>

  <defs>
    <marker id="gs-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Gradient points uphill — take one step the other way</text>

  <text x="170" y="56" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">① Check the gradient</text>

  <path d="M 60 100 Q 170 350 280 100" fill="none" stroke="#000" stroke-width="2"/>

  <text x="155" y="135" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">Gradient</text>
  <text x="155" y="155" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">= uphill direction ↗</text>

  <circle cx="225" cy="194" r="7" fill="#000"/>
  <text x="240" y="215" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">current w</text>

  <path d="M 230 188 L 273 140" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" marker-end="url(#gs-arr)"/>

  <text x="170" y="295" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Curve slopes up to the right → positive gradient</text>

  <line x1="340" y1="48" x2="340" y2="300" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>

  <text x="510" y="56" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">② Step in the opposite direction</text>

  <path d="M 400 100 Q 510 350 620 100" fill="none" stroke="#000" stroke-width="2"/>

  <text x="495" y="135" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">One step</text>
  <text x="495" y="155" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">= opposite direction ↙</text>

  <circle cx="565" cy="194" r="5.5" fill="#000" opacity="0.5"/>
  <text x="580" y="198" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">now</text>

  <path d="M 558 200 Q 540 222 530 226" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round" marker-end="url(#gs-arr)"/>

  <circle cx="525" cy="223" r="7" fill="#fff" stroke="#000" stroke-width="2.4"/>
  <text x="510" y="247" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#000">next w</text>

  <text x="510" y="295" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">→ next position is closer to the minimum</text>

  <text x="340" y="314" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#000">w ← w − η × gradient</text>
</svg>
