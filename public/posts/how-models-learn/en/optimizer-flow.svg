<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Update step — the optimizer updates all parameters at once</title>
  <desc>All parameter gradients from backprop flow into the optimizer, which applies the defined update rule to all parameters at once. SGD, Adam, RMSprop differ in their rule but share the same input/output structure.</desc>

  <defs>
    <marker id="up-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Update — the optimizer updates all parameters at once</text>

  <text x="90" y="60" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Gradients from backprop</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">
    <rect x="35" y="78" width="110" height="22" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="90" y="93" text-anchor="middle">∂L/∂W₁</text>
    <rect x="35" y="108" width="110" height="22" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="90" y="123" text-anchor="middle">∂L/∂W₂</text>
    <rect x="35" y="138" width="110" height="22" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="90" y="153" text-anchor="middle">∂L/∂b₁</text>
    <text x="90" y="180" text-anchor="middle" opacity="0.55">...</text>
    <rect x="35" y="195" width="110" height="22" rx="4" fill="#fff" stroke="#000" stroke-width="1.3"/>
    <text x="90" y="210" text-anchor="middle">∂L/∂b_n</text>
  </g>

  <path d="M 150 145 L 235 145" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" marker-end="url(#up-arr)"/>

  <rect x="240" y="78" width="200" height="135" rx="8" fill="#fff" stroke="#000" stroke-width="2.2"/>
  <text x="340" y="105" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="700" fill="#000">Optimizer</text>
  <text x="340" y="124" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">applies the update rule</text>
  <line x1="262" y1="142" x2="418" y2="142" stroke="#000" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.4"/>
  <text x="340" y="165" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="600" fill="#000">W ← W − η · ∇L</text>
  <text x="340" y="196" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">Applied to all params at once</text>

  <path d="M 445 145 L 530 145" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" marker-end="url(#up-arr)"/>

  <text x="595" y="60" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Updated parameters</text>

  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">
    <rect x="540" y="78" width="110" height="22" rx="4" fill="#000" opacity="0.06"/>
    <rect x="540" y="78" width="110" height="22" rx="4" fill="none" stroke="#000" stroke-width="1.3"/>
    <text x="595" y="93" text-anchor="middle">W₁'</text>
    <rect x="540" y="108" width="110" height="22" rx="4" fill="#000" opacity="0.06"/>
    <rect x="540" y="108" width="110" height="22" rx="4" fill="none" stroke="#000" stroke-width="1.3"/>
    <text x="595" y="123" text-anchor="middle">W₂'</text>
    <rect x="540" y="138" width="110" height="22" rx="4" fill="#000" opacity="0.06"/>
    <rect x="540" y="138" width="110" height="22" rx="4" fill="none" stroke="#000" stroke-width="1.3"/>
    <text x="595" y="153" text-anchor="middle">b₁'</text>
    <text x="595" y="180" text-anchor="middle" opacity="0.55">...</text>
    <rect x="540" y="195" width="110" height="22" rx="4" fill="#000" opacity="0.06"/>
    <rect x="540" y="195" width="110" height="22" rx="4" fill="none" stroke="#000" stroke-width="1.3"/>
    <text x="595" y="210" text-anchor="middle">b_n'</text>
  </g>

  <line x1="40" y1="248" x2="640" y2="248" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>
  <text x="340" y="270" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Optimizer variants — same I/O, different update rules</text>
  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000" text-anchor="middle">
    <text x="200" y="295"><tspan font-weight="700">SGD</tspan><tspan opacity="0.65"> — basic form</tspan></text>
    <text x="380" y="295"><tspan font-weight="700">Adam</tspan><tspan opacity="0.65"> — adaptive lr (default)</tspan></text>
    <text x="555" y="295"><tspan font-weight="700">RMSprop</tspan><tspan opacity="0.65"> — etc.</tspan></text>
  </g>
</svg>
