<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Four-step cheatsheet — the common engine of every training loop</title>
  <desc>Cheatsheet summarizing the four training steps — forward pass, loss, backpropagation, update — each with a small pictogram and a short label. The common skeleton of every neural network training loop.</desc>

  <defs>
    <marker id="fs-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Every training loop — at its core, these four</text>

  <g>
    <circle cx="100" cy="125" r="42" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <path d="M 78 125 L 122 125" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" marker-end="url(#fs-arr)"/>
    <text x="100" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">① Forward</text>
    <text x="100" y="210" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Make a prediction</text>
  </g>

  <g>
    <circle cx="260" cy="125" r="42" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <line x1="240" y1="115" x2="280" y2="135" stroke="#000" stroke-width="2"/>
    <circle cx="240" cy="115" r="3.5" fill="#000"/>
    <circle cx="280" cy="135" r="3.5" fill="#000"/>
    <text x="260" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">② Loss</text>
    <text x="260" y="210" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Measure the error</text>
  </g>

  <g>
    <circle cx="420" cy="125" r="42" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <path d="M 440 110 Q 420 90 400 110 Q 395 130 415 138 Q 435 142 440 125" fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="3 2" marker-end="url(#fs-arr)"/>
    <text x="420" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">③ Backward</text>
    <text x="420" y="210" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Gradients in reverse</text>
  </g>

  <g>
    <circle cx="580" cy="125" r="42" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <path d="M 550 110 Q 580 150 610 110" fill="none" stroke="#000" stroke-width="1.8"/>
    <circle cx="600" cy="119" r="4" fill="#000"/>
    <path d="M 597 124 Q 590 132 582 138" fill="none" stroke="#000" stroke-width="1.4" stroke-dasharray="2 2"/>
    <text x="580" y="190" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">④ Update</text>
    <text x="580" y="210" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Step downhill</text>
  </g>

  <line x1="142" y1="125" x2="218" y2="125" stroke="#000" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>
  <line x1="302" y1="125" x2="378" y2="125" stroke="#000" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>
  <line x1="462" y1="125" x2="538" y2="125" stroke="#000" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>

  <text x="340" y="252" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Transformer, GPT — the inner skeleton is these four</text>
</svg>
