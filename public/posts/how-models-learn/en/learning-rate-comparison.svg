<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Learning rate comparison — too large / just right / too small</title>
  <desc>Comparing movement on the same U-shaped loss curve with different learning rates. Too large: bounces to the other side and diverges. Just right: steps down into the valley and converges. Too small: barely moves and is very slow.</desc>

  <defs>
    <marker id="lr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Learning rate — too large: diverge; just right: converge; too small: stall</text>

  <text x="115" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">Too large</text>
  <path d="M 30 120 Q 115 360 200 120" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M 180 170 Q 115 55 45 159" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#lr-arr)" opacity="0.85"/>
  <path d="M 45 159 Q 115 35 190 147" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#lr-arr)" opacity="0.85"/>
  <circle cx="180" cy="170" r="5" fill="#000"/>
  <circle cx="45" cy="159" r="5" fill="#000"/>
  <circle cx="190" cy="147" r="5" fill="#000"/>
  <text x="115" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Bounces to other side</text>
  <text x="115" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">→ Diverges</text>

  <text x="340" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">Just right</text>
  <path d="M 255 120 Q 340 360 425 120" fill="none" stroke="#000" stroke-width="2"/>
  <g fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="4 3" opacity="0.75">
    <path d="M 405 170 L 388 202" marker-end="url(#lr-arr)"/>
    <path d="M 388 202 L 370 225" marker-end="url(#lr-arr)"/>
    <path d="M 370 225 L 358 235" marker-end="url(#lr-arr)"/>
    <path d="M 358 235 L 350 238" marker-end="url(#lr-arr)"/>
  </g>
  <g fill="#000">
    <circle cx="405" cy="170" r="5"/>
    <circle cx="388" cy="202" r="4.5"/>
    <circle cx="370" cy="225" r="4.5"/>
    <circle cx="358" cy="235" r="4.5"/>
    <circle cx="350" cy="238" r="4.5"/>
  </g>
  <text x="340" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Steps toward valley</text>
  <text x="340" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">→ Converges</text>

  <text x="565" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">Too small</text>
  <path d="M 480 120 Q 565 360 650 120" fill="none" stroke="#000" stroke-width="2"/>
  <g fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="4 3" opacity="0.75">
    <path d="M 640 147 L 636 156" marker-end="url(#lr-arr)"/>
    <path d="M 636 156 L 632 165" marker-end="url(#lr-arr)"/>
    <path d="M 632 165 L 628 174" marker-end="url(#lr-arr)"/>
    <path d="M 628 174 L 624 182" marker-end="url(#lr-arr)"/>
  </g>
  <g fill="#000">
    <circle cx="640" cy="147" r="4.5"/>
    <circle cx="636" cy="156" r="4"/>
    <circle cx="632" cy="165" r="4"/>
    <circle cx="628" cy="174" r="4"/>
    <circle cx="624" cy="182" r="4"/>
  </g>
  <text x="565" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">Barely moves</text>
  <text x="565" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">→ Very slow</text>

  <text x="340" y="332" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Typical learning rate η: start between 0.001 and 0.1, then tune</text>
</svg>
