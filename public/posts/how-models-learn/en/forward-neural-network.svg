<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Neural network forward pass — data flows forward, layer by layer</title>
  <desc>Input x starts at 2 nodes, passes through 3 hidden nodes (ReLU), and reaches 1 output node ŷ. First weights are W1, second weights are W2.</desc>

  <defs>
    <marker id="nn-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Neural network forward pass — data flows forward, layer by layer</text>

  <!-- ============ Input layer ============ -->
  <circle cx="90" cy="135" r="20" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="90" y="141" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">x₁</text>

  <circle cx="90" cy="215" r="20" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="90" y="221" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">x₂</text>

  <text x="90" y="270" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Input layer</text>
  <text x="90" y="285" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.55">x ∈ ℝ²</text>

  <!-- ============ Hidden layer ============ -->
  <circle cx="320" cy="100" r="20" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="320" y="106" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">h₁</text>

  <circle cx="320" cy="175" r="20" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="320" y="181" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">h₂</text>

  <circle cx="320" cy="250" r="20" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="320" y="256" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">h₃</text>

  <text x="320" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Hidden (ReLU)</text>

  <!-- ============ Output layer ============ -->
  <circle cx="560" cy="175" r="22" fill="#fff" stroke="#000" stroke-width="1.8"/>
  <text x="560" y="181" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">ŷ</text>

  <text x="560" y="225" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">Output layer</text>
  <text x="560" y="240" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#000" opacity="0.55">ŷ ∈ ℝ</text>

  <!-- ============ Connections (Input → Hidden, W1) ============ -->
  <g stroke="#000" stroke-width="0.8" opacity="0.55" fill="none">
    <line x1="110" y1="135" x2="300" y2="100"/>
    <line x1="110" y1="135" x2="300" y2="175"/>
    <line x1="110" y1="135" x2="300" y2="250"/>
    <line x1="110" y1="215" x2="300" y2="100"/>
    <line x1="110" y1="215" x2="300" y2="175"/>
    <line x1="110" y1="215" x2="300" y2="250"/>
  </g>

  <!-- W1 label -->
  <rect x="180" y="55" width="36" height="20" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="198" y="69" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="600" fill="#000">W₁</text>

  <!-- ============ Connections (Hidden → Output, W2) ============ -->
  <g stroke="#000" stroke-width="0.8" opacity="0.55" fill="none">
    <line x1="340" y1="100" x2="538" y2="175"/>
    <line x1="340" y1="175" x2="538" y2="175"/>
    <line x1="340" y1="250" x2="538" y2="175"/>
  </g>

  <!-- W2 label -->
  <rect x="425" y="105" width="36" height="20" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="443" y="119" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="600" fill="#000">W₂</text>

  <!-- ============ Direction arrow (bottom) ============ -->
  <line x1="80" y1="345" x2="570" y2="345" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.3"/>
  <path d="M 80 340 L 570 340" fill="none" stroke="#000" stroke-width="1.4" marker-end="url(#nn-arr)"/>
  <text x="325" y="332" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000" opacity="0.75">forward — data flows right</text>
</svg>
