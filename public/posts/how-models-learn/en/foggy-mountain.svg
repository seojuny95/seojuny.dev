<svg width="100%" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Descending in fog — one step at a time, guided by the slope underfoot</title>
  <desc>A hiker stands on the clearly visible part of the slope; both ends are obscured by fog. The hiker reads the slope immediately underfoot and takes one step downhill.</desc>

  <defs>
    <marker id="fm-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Descending in fog — one step at a time, guided by the slope</text>

  <text x="340" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.55">⋯  fog hides the view ahead  ⋯</text>

  <path d="M 30 95 Q 90 105 155 130"
        fill="none" stroke="#000" stroke-width="1.6" opacity="0.22" stroke-dasharray="5 4"/>

  <path d="M 155 130 Q 260 175 410 225"
        fill="none" stroke="#000" stroke-width="2.8" stroke-linecap="round"/>

  <path d="M 410 225 Q 510 250 640 260"
        fill="none" stroke="#000" stroke-width="1.6" opacity="0.22" stroke-dasharray="5 4"/>

  <g stroke="#000" stroke-width="2.2" fill="none" stroke-linecap="round">
    <circle cx="265" cy="150" r="11" fill="#fff"/>
    <line x1="265" y1="161" x2="265" y2="192"/>
    <line x1="265" y1="172" x2="250" y2="186"/>
    <line x1="265" y1="172" x2="282" y2="184"/>
    <line x1="265" y1="192" x2="253" y2="212"/>
    <line x1="265" y1="192" x2="280" y2="214"/>
  </g>

  <path d="M 298 220 Q 340 234 390 244"
        fill="none" stroke="#000" stroke-width="2.8" stroke-linecap="round" marker-end="url(#fm-arr)"/>
  <text x="400" y="248" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">One step</text>
  <text x="400" y="264" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">(downhill)</text>
</svg>
