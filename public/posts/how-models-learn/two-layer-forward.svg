<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>2-layer 신경망 순전파 — x에서 L까지</title>
  <desc>입력 x가 W₁ 곱, ReLU, W₂ 곱을 거쳐 z₂가 되고, 정답 y와 비교해 손실 L이 계산된다. 데이터는 왼쪽에서 오른쪽으로 한 방향으로 흐른다.</desc>

  <defs>
    <marker id="tg-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">순전파 — 입력 x가 손실 L까지 한 방향으로</text>

  <!-- ============ 노드 5개 ============ -->
  <g>
    <circle cx="60" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <text x="60" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="600" fill="#000">x</text>

    <circle cx="195" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <text x="195" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#000">z₁</text>

    <circle cx="330" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <text x="330" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#000">a₁</text>

    <circle cx="465" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="1.8"/>
    <text x="465" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#000">z₂</text>

    <circle cx="610" cy="130" r="26" fill="#fff" stroke="#000" stroke-width="2"/>
    <text x="610" y="137" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="700" fill="#000">L</text>
  </g>

  <!-- ============ 화살표 + 연산 라벨 ============ -->
  <g fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round">
    <path d="M 86 130 L 169 130" marker-end="url(#tg-arr)"/>
    <path d="M 221 130 L 304 130" marker-end="url(#tg-arr)"/>
    <path d="M 356 130 L 439 130" marker-end="url(#tg-arr)"/>
    <path d="M 491 130 L 584 130" marker-end="url(#tg-arr)"/>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="12" font-weight="600" fill="#000" text-anchor="middle">
    <text x="127" y="115">W₁ ×</text>
    <text x="262" y="115">ReLU</text>
    <text x="397" y="115">W₂ ×</text>
    <text x="537" y="115">(y − z₂)²</text>
  </g>

  <!-- ============ 하단 방향 화살표 ============ -->
  <path d="M 50 215 L 620 215" fill="none" stroke="#000" stroke-width="1.4" marker-end="url(#tg-arr)"/>
  <text x="340" y="208" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000" opacity="0.75">forward — 데이터가 앞으로</text>
  <text x="340" y="244" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">중간값 z₁, a₁, z₂ 를 거쳐 손실 L 도출</text>
</svg>
