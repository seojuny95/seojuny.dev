<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>선형회귀 데모 setup — 정답 y = 2x + 1과 노이즈 데이터</title>
  <desc>좌표평면 위에 정답 직선 y = 2x + 1이 그려져 있고 그 주변에 노이즈가 섞인 데이터 점들이 흩어져 있다. 모델은 이 데이터만 보고 w=2, b=1을 찾아내야 한다.</desc>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">선형회귀 데모 — 정답 w=2, b=1을 찾아라</text>

  <!-- ============ 축 ============ -->
  <line x1="80" y1="60" x2="80" y2="280" stroke="#000" stroke-width="1.4"/>
  <line x1="80" y1="280" x2="640" y2="280" stroke="#000" stroke-width="1.4"/>
  <path d="M 76 66 L 80 57 L 84 66" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 634 276 L 643 280 L 634 284" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="80" y="50" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">y</text>
  <text x="650" y="285" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">x</text>

  <!-- ============ 정답 직선 y = 2x + 1 ============ -->
  <line x1="80" y1="265" x2="620" y2="75" stroke="#000" stroke-width="2.5"/>
  <text x="555" y="65" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="700" fill="#000">y = 2x + 1</text>

  <!-- ============ 데이터 점들 (직선 y_px = 265 - 0.352·(x-80) 주변 ±5~8 노이즈) ============ -->
  <g fill="#000">
    <circle cx="110" cy="259" r="3.5"/>
    <circle cx="140" cy="242" r="3.5"/>
    <circle cx="170" cy="239" r="3.5"/>
    <circle cx="200" cy="221" r="3.5"/>
    <circle cx="230" cy="216" r="3.5"/>
    <circle cx="260" cy="197" r="3.5"/>
    <circle cx="290" cy="194" r="3.5"/>
    <circle cx="320" cy="177" r="3.5"/>
    <circle cx="350" cy="174" r="3.5"/>
    <circle cx="380" cy="157" r="3.5"/>
    <circle cx="410" cy="154" r="3.5"/>
    <circle cx="440" cy="135" r="3.5"/>
    <circle cx="470" cy="132" r="3.5"/>
    <circle cx="500" cy="112" r="3.5"/>
    <circle cx="530" cy="109" r="3.5"/>
    <circle cx="560" cy="94" r="3.5"/>
    <circle cx="590" cy="89" r="3.5"/>

    <!-- 노이즈로 약간 벗어난 점들 (±6 정도) -->
    <circle cx="125" cy="247" r="3.5"/>
    <circle cx="185" cy="233" r="3.5"/>
    <circle cx="245" cy="201" r="3.5"/>
    <circle cx="305" cy="193" r="3.5"/>
    <circle cx="365" cy="159" r="3.5"/>
    <circle cx="425" cy="150" r="3.5"/>
    <circle cx="485" cy="117" r="3.5"/>
    <circle cx="545" cy="106" r="3.5"/>
  </g>

  <!-- ============ 하단 ============ -->
  <text x="340" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">모델은 점들만 보고 정답 직선의 w, b를 찾아내야 한다</text>
</svg>
