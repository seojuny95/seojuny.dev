<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>학습률 비교 — 너무 큼 / 적당함 / 너무 작음</title>
  <desc>같은 U자 손실 곡선 위에서 학습률(보폭)에 따라 움직이는 모습 비교. 너무 크면 반대편으로 튕겨 발산, 적당하면 한 걸음씩 골짜기로 수렴, 너무 작으면 거의 안 움직여 매우 느리다.</desc>

  <defs>
    <marker id="lr-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">학습률(보폭) — 너무 크면 발산, 적당하면 수렴, 너무 작으면 정체</text>

  <!-- ============================================================ -->
  <!-- ① 좌: 너무 큰 보폭 (발산) -->
  <!-- ============================================================ -->
  <text x="115" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">너무 큰 보폭</text>

  <!-- U-curve (∪) — vertex (115, 240) -->
  <path d="M 30 120 Q 115 360 200 120" fill="none" stroke="#000" stroke-width="2"/>

  <!-- 발산: 점점 양옆으로 멀리 튕김 (3 step) -->
  <!-- start (180, 170) → (45, 159) → (190, 147) -->
  <path d="M 180 170 Q 115 55 45 159" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#lr-arr)" opacity="0.85"/>
  <path d="M 45 159 Q 115 35 190 147" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#lr-arr)" opacity="0.85"/>

  <!-- 점들 (곡선 위) -->
  <circle cx="180" cy="170" r="5" fill="#000"/>
  <circle cx="45" cy="159" r="5" fill="#000"/>
  <circle cx="190" cy="147" r="5" fill="#000"/>

  <text x="115" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">반대편으로 튕긴다</text>
  <text x="115" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">→ 발산</text>

  <!-- ============================================================ -->
  <!-- ② 중: 적당한 보폭 (수렴) -->
  <!-- ============================================================ -->
  <text x="340" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">적당한 보폭</text>

  <!-- U-curve — vertex (340, 240) -->
  <path d="M 255 120 Q 340 360 425 120" fill="none" stroke="#000" stroke-width="2"/>

  <!-- 수렴: 오른쪽 비탈에서 한 걸음씩 골짜기로 -->
  <!-- (405, 170) → (388, 202) → (370, 225) → (358, 235) → (350, 238) -->
  <g fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="4 3" opacity="0.75">
    <path d="M 405 170 L 388 202" marker-end="url(#lr-arr)"/>
    <path d="M 388 202 L 370 225" marker-end="url(#lr-arr)"/>
    <path d="M 370 225 L 358 235" marker-end="url(#lr-arr)"/>
    <path d="M 358 235 L 350 238" marker-end="url(#lr-arr)"/>
  </g>

  <!-- 점들 (곡선 위) -->
  <g fill="#000">
    <circle cx="405" cy="170" r="5"/>
    <circle cx="388" cy="202" r="4.5"/>
    <circle cx="370" cy="225" r="4.5"/>
    <circle cx="358" cy="235" r="4.5"/>
    <circle cx="350" cy="238" r="4.5"/>
  </g>

  <text x="340" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">한 걸음씩 골짜기로</text>
  <text x="340" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">→ 수렴</text>

  <!-- ============================================================ -->
  <!-- ③ 우: 너무 작은 보폭 (정체) -->
  <!-- ============================================================ -->
  <text x="565" y="58" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">너무 작은 보폭</text>

  <!-- U-curve — vertex (565, 240) -->
  <path d="M 480 120 Q 565 360 650 120" fill="none" stroke="#000" stroke-width="2"/>

  <!-- 정체: 오른쪽 끝 근처에서 거의 안 움직임 (조밀한 점들) -->
  <!-- (640, 147) → (636, 156) → (632, 165) → (628, 174) → (624, 182) -->
  <g fill="none" stroke="#000" stroke-width="1.8" stroke-dasharray="4 3" opacity="0.75">
    <path d="M 640 147 L 636 156" marker-end="url(#lr-arr)"/>
    <path d="M 636 156 L 632 165" marker-end="url(#lr-arr)"/>
    <path d="M 632 165 L 628 174" marker-end="url(#lr-arr)"/>
    <path d="M 628 174 L 624 182" marker-end="url(#lr-arr)"/>
  </g>

  <g fill="#000">
    <circle cx="640" cy="147" r="4.5"/>
    <circle cx="636" cy="156" r="4"/>
    <circle cx="632" cy="165" r="4"/>
    <circle cx="628" cy="174" r="4"/>
    <circle cx="624" cy="182" r="4"/>
  </g>

  <text x="565" y="290" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">조금씩만 움직인다</text>
  <text x="565" y="310" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="700" fill="#000">→ 매우 느림</text>

  <!-- ============================================================ -->
  <!-- 하단 -->
  <!-- ============================================================ -->
  <text x="340" y="332" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">보통 학습률 η는 0.001 ~ 0.1 사이에서 시작해 조정한다</text>
</svg>
