<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>기울기란 — 손실 곡선 위 한 점의 접선 기울기</title>
  <desc>같은 U자 손실 곡선 위 두 점을 비교한다. 왼쪽 점은 왼쪽 비탈 위 — 접선이 우하향이라 기울기가 음수, w를 늘리면 L이 줄어든다. 오른쪽 점은 오른쪽 비탈 위 — 접선이 우상향이라 기울기가 양수, w를 늘리면 L이 늘어난다. 기울기의 부호가 방향, 크기가 가파른 정도를 알려준다.</desc>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">기울기 — 곡선의 한 점에서 w를 살짝 늘리면 L이 어떻게 변하는가</text>

  <!-- ============ Left panel: 음수 기울기 ============ -->
  <g>
    <line x1="50" y1="60" x2="50" y2="230" stroke="#000" stroke-width="1.3"/>
    <line x1="50" y1="230" x2="320" y2="230" stroke="#000" stroke-width="1.3"/>
    <path d="M 46 66 L 50 58 L 54 66" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 314 226 L 322 230 L 314 234" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000">L</text>
    <text x="332" y="233" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000">w</text>

    <!-- loss curve U -->
    <path d="M 65 80 Q 185 280 305 80" fill="none" stroke="#000" stroke-width="2"/>

    <!-- tangent (dashed) on left slope -->
    <line x1="75" y1="113" x2="170" y2="192" stroke="#000" stroke-width="1.6" stroke-dasharray="5 3" opacity="0.85"/>

    <!-- point on curve -->
    <circle cx="125" cy="155" r="5" fill="#000"/>

    <text x="185" y="258" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">기울기 음수 (−)</text>
    <text x="185" y="276" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">w를 늘리면 L이 줄어든다</text>
  </g>

  <!-- divider -->
  <line x1="345" y1="50" x2="345" y2="285" stroke="#000" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

  <!-- ============ Right panel: 양수 기울기 ============ -->
  <g>
    <line x1="375" y1="60" x2="375" y2="230" stroke="#000" stroke-width="1.3"/>
    <line x1="375" y1="230" x2="640" y2="230" stroke="#000" stroke-width="1.3"/>
    <path d="M 371 66 L 375 58 L 379 66" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 634 226 L 642 230 L 634 234" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="375" y="50" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000">L</text>
    <text x="652" y="233" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="600" fill="#000">w</text>

    <!-- loss curve U -->
    <path d="M 390 80 Q 508 280 626 80" fill="none" stroke="#000" stroke-width="2"/>

    <!-- tangent (dashed) on right slope -->
    <line x1="525" y1="190" x2="617" y2="113" stroke="#000" stroke-width="1.6" stroke-dasharray="5 3" opacity="0.85"/>

    <!-- point on curve -->
    <circle cx="567" cy="155" r="5" fill="#000"/>

    <text x="508" y="258" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">기울기 양수 (+)</text>
    <text x="508" y="276" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">w를 늘리면 L이 늘어난다</text>
  </g>

  <!-- bottom caption -->
  <text x="340" y="306" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.7">점선 = 그 점의 접선 (∂L/∂w) · 양수/음수 = 방향 · 크기 = 가파른 정도</text>
</svg>
