<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>학습 — 예측과 확률이 정답 쪽으로</title>
  <desc>2x2 표. 위 행은 회귀(집값 맞히기) — 학습 전엔 예측이 정답에서 멀리 떨어져 있고 학습 후엔 거의 일치한다. 아래 행은 분류(어떤 동물?) — 학습 전엔 세 카테고리에 확률이 비슷하게 흩어져 있고 학습 후엔 정답에 확률이 쏠린다.</desc>

  <defs>
    <marker id="li-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 타이틀 -->
  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">학습 — 예측과 확률이 정답 쪽으로</text>

  <!-- 상단: 학습 전 / 학습 후 헤더 -->
  <text x="270" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">학습 전</text>
  <text x="540" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">학습 후</text>

  <!-- 가운데 큰 화살표 (학습 진행 방향) -->
  <path d="M 320 56 L 490 56" fill="none" stroke="#000" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#li-arr)" opacity="0.65"/>
  <text x="405" y="48" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.7">학습 진행</text>

  <!-- 가로 점선 (행 구분) -->
  <line x1="30" y1="230" x2="650" y2="230" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>
  <!-- 세로 점선 (열 구분) -->
  <line x1="405" y1="80" x2="405" y2="400" stroke="#000" stroke-width="0.6" stroke-dasharray="3 4" opacity="0.4"/>

  <!-- ============ 행 라벨 ============ -->
  <text x="30" y="135" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">회귀</text>
  <text x="30" y="151" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">집값 맞히기</text>

  <text x="30" y="310" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#000">분류</text>
  <text x="30" y="326" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.65">어떤 동물?</text>

  <!-- ====================================================== -->
  <!-- 회귀 — 학습 전 (좌상) -->
  <!-- ====================================================== -->
  <!-- 숫자선 (좌측 — 학습 전, 끝점 안쪽으로 줄여 중앙 라벨 충돌 방지) -->
  <line x1="135" y1="155" x2="380" y2="155" stroke="#000" stroke-width="1.2"/>
  <line x1="135" y1="150" x2="135" y2="160" stroke="#000" stroke-width="1.2"/>
  <line x1="380" y1="150" x2="380" y2="160" stroke="#000" stroke-width="1.2"/>
  <text x="135" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">0억</text>
  <text x="380" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">10억</text>

  <!-- 예측 ▲ at 3억 → x = 135 + 24.5*3 = 208.5 -->
  <g transform="translate(209 155)">
    <path d="M0 -2 L-7 -14 L7 -14 Z" fill="#000" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/>
    <text x="0" y="-22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">예측 3억</text>
  </g>
  <!-- 정답 ★ at 7억 → x = 135 + 24.5*7 = 306.5 -->
  <g transform="translate(307 155)" stroke="#000" stroke-width="1.4" fill="#fff" stroke-linejoin="round">
    <path d="M 0 -11 L 3 -3.5 L 11 -3.5 L 4.5 1.5 L 7 9.5 L 0 5 L -7 9.5 L -4.5 1.5 L -11 -3.5 L -3 -3.5 Z"/>
  </g>
  <text x="307" y="134" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">정답 7억</text>

  <!-- gap -->
  <path d="M 216 155 L 299 155" stroke="#000" stroke-width="1.1" stroke-dasharray="3 3" opacity="0.6"/>
  <text x="258" y="205" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">차이가 크다</text>

  <!-- ====================================================== -->
  <!-- 회귀 — 학습 후 (우상) -->
  <!-- ====================================================== -->
  <line x1="415" y1="155" x2="660" y2="155" stroke="#000" stroke-width="1.2"/>
  <line x1="415" y1="150" x2="415" y2="160" stroke="#000" stroke-width="1.2"/>
  <line x1="660" y1="150" x2="660" y2="160" stroke="#000" stroke-width="1.2"/>
  <text x="415" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">0억</text>
  <text x="660" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">10억</text>

  <!-- 예측 ▲ at 6.8억 → x = 415 + 24.5*6.8 = 581.6 -->
  <g transform="translate(582 155)">
    <path d="M0 -2 L-7 -14 L7 -14 Z" fill="#000" stroke="#000" stroke-width="1.2" stroke-linejoin="round"/>
    <text x="-4" y="-22" text-anchor="end" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">예측 6.8억</text>
  </g>
  <!-- 정답 ★ at 7억 → x = 415 + 24.5*7 = 586.5 -->
  <g transform="translate(587 155)" stroke="#000" stroke-width="1.4" fill="#fff" stroke-linejoin="round">
    <path d="M 0 -11 L 3 -3.5 L 11 -3.5 L 4.5 1.5 L 7 9.5 L 0 5 L -7 9.5 L -4.5 1.5 L -11 -3.5 L -3 -3.5 Z"/>
  </g>
  <text x="607" y="138" text-anchor="start" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">정답 7억</text>

  <text x="540" y="205" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">거의 일치</text>

  <!-- ====================================================== -->
  <!-- 분류 — 학습 전 (좌하) -->
  <!-- 막대 3개: 35%, 33%, 32% — 거의 평평 -->
  <!-- ====================================================== -->
  <line x1="155" y1="370" x2="380" y2="370" stroke="#000" stroke-width="1"/>

  <!-- 막대들 (max height = 80 = 100%) -->
  <rect x="170" y="342" width="50" height="28" fill="#000" opacity="0.85"/>
  <text x="195" y="335" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">35%</text>

  <rect x="240" y="344" width="50" height="26" fill="#000" opacity="0.5"/>
  <text x="265" y="335" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">33%</text>

  <rect x="310" y="345" width="50" height="25" fill="#000" opacity="0.5"/>
  <text x="335" y="335" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">32%</text>

  <!-- 정답 ★ 고양이 위 (퍼센트 텍스트 위에 충분히 띄움) -->
  <g transform="translate(195 312)" stroke="#000" stroke-width="1.3" fill="#fff" stroke-linejoin="round">
    <path d="M 0 -8 L 2.4 -2.6 L 8 -2.6 L 3.3 1.3 L 5.3 7.3 L 0 4 L -5.3 7.3 L -3.3 1.3 L -8 -2.6 L -2.4 -2.6 Z"/>
  </g>

  <text x="195" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">고양이</text>
  <text x="265" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.6">강아지</text>
  <text x="335" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.6">새</text>

  <text x="270" y="405" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">셋이 비슷 — 헷갈림</text>

  <!-- ====================================================== -->
  <!-- 분류 — 학습 후 (우하) -->
  <!-- 막대 3개: 90%, 7%, 3% — 한쪽에 쏠림 -->
  <!-- ====================================================== -->
  <line x1="425" y1="370" x2="650" y2="370" stroke="#000" stroke-width="1"/>

  <rect x="440" y="298" width="50" height="72" fill="#000" opacity="0.85"/>
  <text x="465" y="291" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">90%</text>

  <rect x="510" y="364" width="50" height="6" fill="#000" opacity="0.5"/>
  <text x="535" y="358" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">7%</text>

  <rect x="580" y="366" width="50" height="4" fill="#000" opacity="0.5"/>
  <text x="605" y="358" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#000">3%</text>

  <!-- 정답 ★ 고양이 위 (퍼센트 텍스트 위에 충분히 띄움) -->
  <g transform="translate(465 268)" stroke="#000" stroke-width="1.3" fill="#fff" stroke-linejoin="round">
    <path d="M 0 -8 L 2.4 -2.6 L 8 -2.6 L 3.3 1.3 L 5.3 7.3 L 0 4 L -5.3 7.3 L -3.3 1.3 L -8 -2.6 L -2.4 -2.6 Z"/>
  </g>

  <text x="465" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">고양이</text>
  <text x="535" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.6">강아지</text>
  <text x="605" y="385" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.6">새</text>

  <text x="540" y="405" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000" opacity="0.75">정답(★)에 확률이 쏠림</text>
</svg>
