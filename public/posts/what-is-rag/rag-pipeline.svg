<svg width="100%" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RAG 파이프라인 — 검색해서 찾은 문서를 붙여 답한다</title>
  <desc>사용자 질문이 들어오면 검색기(Retriever)가 외부 문서 저장소에서 질문과 관련된 문서를 찾아온다. 찾아온 관련 문서를 질문과 함께 생성기(Generator, LLM)에 넣으면 모델이 그 문서를 근거로 답변을 만든다.</desc>

  <defs>
    <marker id="rp-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RAG 파이프라인 — 검색해서 찾은 문서를 붙여 답한다</text>

  <!-- 질문 -->
  <rect x="28" y="92" width="96" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="76" y="121" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">질문</text>

  <path d="M 126 117 L 162 117" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#rp-arr)"/>

  <!-- 검색기 -->
  <rect x="164" y="86" width="126" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="227" y="111" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">검색기</text>
  <text x="227" y="129" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Retriever</text>

  <!-- 외부 문서 저장소 (아래) + 양방향 -->
  <path d="M 227 196 L 227 150" fill="none" stroke="#000" stroke-width="1.4" stroke-linecap="round" marker-start="url(#rp-arr)" marker-end="url(#rp-arr)"/>
  <rect x="158" y="198" width="138" height="52" rx="6" fill="#fff" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="227" y="220" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">외부 문서</text>
  <text x="227" y="237" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">저장소</text>

  <!-- 검색기 -> 생성기 -->
  <path d="M 292 117 L 356 117" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#rp-arr)"/>
  <text x="324" y="105" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#000">질문 + 문서</text>

  <!-- 생성기 -->
  <rect x="358" y="86" width="126" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="421" y="111" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">생성기</text>
  <text x="421" y="129" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.65">Generator · LLM</text>

  <path d="M 486 117 L 524 117" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#rp-arr)"/>

  <!-- 답변 -->
  <rect x="526" y="92" width="126" height="50" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="589" y="121" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">답변</text>

  <!-- 캡션 -->
  <text x="340" y="284" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">질문으로 관련 문서를 찾아오고(검색), 질문과 함께 모델에 넣어 답을 만든다(생성)</text>
</svg>
