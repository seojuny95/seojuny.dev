<svg width="100%" viewBox="0 0 712 258" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RAG 파이프라인 — 인덱싱과 답변 생성 한눈에</title>
  <desc>RAG 전체 파이프라인. 위쪽 인덱싱 단계는 문서에서 텍스트를 추출하고 청킹·임베딩해 벡터 DB에 저장한다. 벡터 DB를 가운데 두고, 아래쪽 답변 생성 단계는 질문을 임베딩해 벡터 DB에서 검색을 하고, 프롬프트를 구성해 LLM이 답변을 생성한다. 인덱싱은 벡터 DB로 내려가 저장되고, 답변 생성은 벡터 DB에서 검색해 올린다.</desc>

  <defs>
    <marker id="ov-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="356" y="22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RAG 파이프라인 — 인덱싱과 답변 생성 한눈에</text>

  <!-- 인덱싱 레인 라벨 -->
  <text x="8" y="48" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">① 인덱싱 — 질문 전에 미리 준비</text>

  <!-- 인덱싱 박스 -->
  <rect x="8" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="50" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">문서</text>
  <path d="M 92 78 L 108 78" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="108" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">텍스트 추출</text>
  <path d="M 192 78 L 208 78" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="208" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">청킹</text>
  <path d="M 292 78 L 308 78" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="308" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">청크 임베딩</text>

  <!-- 인덱싱 → 벡터 DB (저장) -->
  <path d="M 350 98 L 350 126" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="360" y="115" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">저장</text>

  <!-- 벡터 DB (공유) -->
  <rect x="296" y="126" width="108" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="350" y="148" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">벡터 DB</text>

  <!-- 벡터 DB → 유사도 검색 (검색) -->
  <path d="M 350 170 L 350 200" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="360" y="188" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">검색</text>

  <!-- 답변 생성 레인 라벨 -->
  <text x="8" y="192" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">② 답변 생성 — 질문이 올 때마다 반복</text>

  <!-- 답변 생성 박스 -->
  <rect x="108" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">질문</text>
  <path d="M 192 220 L 208 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="208" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="250" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">질문 임베딩</text>
  <path d="M 292 220 L 308 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="308" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">검색</text>
  <path d="M 392 220 L 408 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="408" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="450" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">프롬프트 구성</text>
  <path d="M 492 220 L 508 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="508" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="550" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">LLM</text>
  <path d="M 592 220 L 608 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="608" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="650" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">답변</text>
</svg>
