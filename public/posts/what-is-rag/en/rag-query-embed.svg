<svg width="100%" viewBox="0 0 680 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Embed Question — Using the Same Model as Documents</title>
  <desc>The question is also converted to a vector using the same embedding model used for the documents during indexing. This ensures the question and documents share the same vector space so distances can be compared.</desc>
  <defs>
    <marker id="qe-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Embed Question — Same Model as Documents</text>

  <rect x="40" y="52" width="160" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="120" y="74" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">"How many days off do I get?"</text>

  <path d="M 200 74 L 244 74" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qe-arr)"/>

  <rect x="246" y="48" width="170" height="52" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="331" y="70" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Embedding model</text>
  <text x="331" y="87" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.7">Same model used for documents</text>

  <path d="M 416 74 L 460 74" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#qe-arr)"/>

  <rect x="462" y="52" width="178" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="551" y="74" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#000">[ 0.79, 0.22, … ]</text>
  <text x="551" y="44" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.6">Question vector</text>
</svg>
