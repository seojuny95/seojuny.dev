<svg width="100%" viewBox="0 0 680 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>LLM Generation</title>
  <desc>The LLM receives the prompt and generates a final answer grounded in the retrieved evidence.</desc>
  <defs>
    <marker id="ge-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">LLM Generation — Answering from Evidence</text>

  <rect x="70" y="50" width="150" height="52" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="145" y="76" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Prompt</text>

  <path d="M 220 76 L 268 76" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ge-arr)"/>

  <rect x="270" y="50" width="140" height="52" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">LLM</text>

  <path d="M 410 76 L 458 76" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ge-arr)"/>

  <rect x="460" y="50" width="150" height="52" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="535" y="70" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Answer</text>
  <text x="535" y="87" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.7">"Annual leave: 15 days"</text>
</svg>
