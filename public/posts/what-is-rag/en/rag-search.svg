<svg width="100%" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Similarity Search — Finding Chunks Closest to the Query</title>
  <desc>In the vector space, find the chunk vectors whose distance to the query vector is smallest. Closeness means semantic similarity, so these chunks are the most relevant information for the question.</desc>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Similarity Search — Pick Chunks Closest to the Query</text>

  <!-- vector space -->
  <rect x="130" y="42" width="420" height="150" rx="6" fill="#000" fill-opacity="0.02" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- distant chunks -->
  <circle cx="185" cy="78" r="3.5" fill="#000" opacity="0.45"/>
  <circle cx="240" cy="160" r="3.5" fill="#000" opacity="0.45"/>
  <circle cx="500" cy="90" r="3.5" fill="#000" opacity="0.45"/>
  <circle cx="505" cy="168" r="3.5" fill="#000" opacity="0.45"/>
  <circle cx="430" cy="62" r="3.5" fill="#000" opacity="0.45"/>

  <!-- distance lines from query to nearest chunks -->
  <line x1="340" y1="118" x2="300" y2="96" stroke="#000" stroke-width="1" opacity="0.55"/>
  <line x1="340" y1="118" x2="386" y2="104" stroke="#000" stroke-width="1" opacity="0.55"/>
  <line x1="340" y1="118" x2="322" y2="156" stroke="#000" stroke-width="1" opacity="0.55"/>

  <!-- nearest chunks (retrieved) -->
  <circle cx="300" cy="96" r="4" fill="#000"/>
  <circle cx="386" cy="104" r="4" fill="#000"/>
  <circle cx="322" cy="156" r="4" fill="#000"/>
  <ellipse cx="345" cy="122" rx="78" ry="52" fill="none" stroke="#000" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="345" y="186" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="600" fill="#000">Retrieved chunks (top-k)</text>

  <!-- query vector (star) -->
  <path d="M 340 108 L 343 116 L 351 116 L 345 121 L 347 129 L 340 124 L 333 129 L 335 121 L 329 116 L 337 116 Z" fill="#000"/>
  <text x="340" y="100" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="600" fill="#000">Query</text>

  <!-- legend -->
  <path d="M 214 214 L 217 220 L 223 220 L 218 224 L 220 230 L 214 226 L 208 230 L 210 224 L 205 220 L 211 220 Z" fill="#000"/>
  <text x="230" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Query vector</text>
  <circle cx="330" cy="222" r="3.5" fill="#000"/>
  <text x="342" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">Chunk vector</text>
  <text x="430" y="223" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.75">· Closer = more similar meaning</text>
</svg>
