<svg width="100%" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>How Retrieved Documents Are Fed to the Model — Evolution</title>
  <desc>Early approaches processed each document separately and combined the results (RAG-Sequence/Token, 2020). This evolved to reading multiple documents together at once (FiD), and as models grew larger with wider context windows, stuffing all retrieved documents directly into the prompt became the standard. The approach has gotten simpler as models and context windows have grown.</desc>

  <defs>
    <marker id="ev-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">How Retrieved Documents Are Fed to the Model</text>

  <!-- Stage 1 -->
  <rect x="24" y="58" width="190" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="119" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Each doc separately, then merge</text>
  <text x="119" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">RAG-Sequence · Token (2020)</text>

  <path d="M 216 89 L 243 89" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ev-arr)"/>

  <!-- Stage 2 -->
  <rect x="245" y="58" width="190" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="340" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Read all docs together</text>
  <text x="340" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">FiD (2020)</text>

  <path d="M 437 89 L 464 89" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ev-arr)"/>

  <!-- Stage 3 -->
  <rect x="466" y="58" width="190" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="561" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Stuff all docs into the prompt</text>
  <text x="561" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">Current standard</text>

  <!-- trend arrow -->
  <path d="M 80 158 L 600 158" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" opacity="0.55" marker-end="url(#ev-arr)"/>
  <text x="340" y="184" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">As models and context windows grew, the approach became simpler</text>
</svg>
