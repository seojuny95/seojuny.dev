<svg width="100%" viewBox="0 0 712 258" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>RAG Pipeline — Indexing and Answer Generation at a Glance</title>
  <desc>The full RAG pipeline. The top indexing phase extracts text from documents, chunks it, embeds the chunks, and stores them in a Vector DB. With the Vector DB in the center, the bottom answer generation phase embeds the question, searches the Vector DB, assembles a prompt, and has the LLM generate an answer. Indexing flows down into the Vector DB; answer generation retrieves back up from it.</desc>

  <defs>
    <marker id="ov-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="356" y="22" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">RAG Pipeline — Indexing &amp; Answer Generation at a Glance</text>

  <!-- Indexing lane label -->
  <text x="8" y="48" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">① Indexing — Prepare in advance</text>

  <!-- Indexing boxes -->
  <rect x="8" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="50" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Document</text>
  <path d="M 92 78 L 108 78" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="108" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Extract text</text>
  <path d="M 192 78 L 208 78" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="208" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Chunking</text>
  <path d="M 292 78 L 308 78" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="308" y="58" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="78" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Embed chunks</text>

  <!-- Indexing → Vector DB (store) -->
  <path d="M 350 98 L 350 126" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="360" y="115" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">Store</text>

  <!-- Vector DB (shared) -->
  <rect x="296" y="126" width="108" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="350" y="148" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Vector DB</text>

  <!-- Vector DB → similarity search (retrieve) -->
  <path d="M 350 170 L 350 200" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>
  <text x="360" y="188" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" font-weight="500" fill="#444">Retrieve</text>

  <!-- Answer generation lane label -->
  <text x="8" y="192" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#444">② Answer generation — runs on every query</text>

  <!-- Answer generation boxes -->
  <rect x="108" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="150" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Question</text>
  <path d="M 192 220 L 208 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="208" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="250" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Embed query</text>
  <path d="M 292 220 L 308 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="308" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="350" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">Retrieve</text>
  <path d="M 392 220 L 408 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="408" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="450" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="500" fill="#000">Assemble prompt</text>
  <path d="M 492 220 L 508 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="508" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="550" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="500" fill="#000">LLM</text>
  <path d="M 592 220 L 608 220" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ov-arr)"/>

  <rect x="608" y="200" width="84" height="40" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="650" y="220" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Answer</text>
</svg>
