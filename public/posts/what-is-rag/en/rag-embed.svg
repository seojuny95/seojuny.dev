<svg width="100%" viewBox="0 0 680 250" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Embedding — Text into a Meaning-Carrying Vector</title>
  <desc>An embedding model converts chunk text into a numeric vector. In the resulting vector space, words with similar meaning are placed close together, while unrelated words are placed far apart.</desc>
  <defs>
    <marker id="em-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Embedding — Text into a Meaning-Carrying Vector</text>

  <!-- top: text -> embedding model -> vector -->
  <rect x="28" y="52" width="150" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="103" y="74" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">"Puppies are cute"</text>

  <path d="M 178 74 L 218 74" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#em-arr)"/>

  <rect x="220" y="48" width="124" height="52" rx="6" fill="#fff" stroke="#000" stroke-width="1.7"/>
  <text x="282" y="74" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Embedding model</text>

  <path d="M 344 74 L 384 74" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#em-arr)"/>

  <rect x="386" y="52" width="266" height="44" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="519" y="74" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000">[ 0.82, 0.19, -0.51, 0.07, … ]</text>
  <text x="519" y="44" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="9.5" fill="#000" opacity="0.6">Numeric vector encoding meaning</text>

  <!-- bottom: vector space -->
  <text x="340" y="130" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#000">Vector space — similar meaning: near; different: far</text>
  <rect x="150" y="142" width="380" height="86" rx="6" fill="#000" fill-opacity="0.02" stroke="#000" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- nearby cluster -->
  <ellipse cx="262" cy="172" rx="62" ry="24" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="242" cy="168" r="3.5" fill="#000"/>
  <text x="242" y="160" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">puppy</text>
  <circle cx="288" cy="180" r="3.5" fill="#000"/>
  <text x="300" y="184" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">dog</text>

  <!-- distant point -->
  <circle cx="452" cy="206" r="3.5" fill="#000"/>
  <text x="452" y="198" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">car</text>
</svg>
