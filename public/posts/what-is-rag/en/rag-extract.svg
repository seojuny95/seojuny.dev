<svg width="100%" viewBox="0 0 680 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Extract Text from Documents</title>
  <desc>Extract only the text from documents such as PDFs, producing plain text.</desc>
  <defs>
    <marker id="ex-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">Extract Text from Documents</text>

  <!-- document -->
  <rect x="150" y="44" width="150" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="225" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Document (PDF)</text>
  <line x1="172" y1="78" x2="278" y2="78" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="172" y1="88" x2="278" y2="88" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="172" y1="98" x2="245" y2="98" stroke="#000" stroke-width="1" opacity="0.3"/>

  <path d="M 308 75 L 372 75" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ex-arr)"/>

  <!-- text -->
  <rect x="380" y="44" width="150" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="455" y="62" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">Plain text</text>
  <line x1="402" y1="78" x2="508" y2="78" stroke="#000" stroke-width="1" opacity="0.45"/>
  <line x1="402" y1="88" x2="508" y2="88" stroke="#000" stroke-width="1" opacity="0.45"/>
  <line x1="402" y1="98" x2="475" y2="98" stroke="#000" stroke-width="1" opacity="0.45"/>
</svg>
