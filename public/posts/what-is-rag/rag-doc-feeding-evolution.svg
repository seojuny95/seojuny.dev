<svg width="100%" viewBox="0 0 680 210" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>검색한 문서를 모델에 넣는 방식의 변화</title>
  <desc>처음에는 문서를 하나씩 따로 넣어 결과를 합쳤다(RAG-Sequence·Token, 2020). 이후 여러 문서를 한 번에 함께 읽는 방식(FiD)으로 옮겨갔고, 모델이 커지고 컨텍스트 창이 넓어지면서 지금은 검색한 문서를 프롬프트에 통째로 넣는 방식이 표준이 됐다. 모델과 컨텍스트가 커질수록 방식은 단순해졌다.</desc>

  <defs>
    <marker id="ev-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="26" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">검색한 문서를 모델에 넣는 방식의 변화</text>

  <!-- 단계 1 -->
  <rect x="24" y="58" width="190" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="119" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">문서를 하나씩 돌려 합산</text>
  <text x="119" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">RAG-Sequence · Token (2020)</text>

  <path d="M 216 89 L 243 89" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ev-arr)"/>

  <!-- 단계 2 -->
  <rect x="245" y="58" width="190" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="340" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">여러 문서를 함께 읽기</text>
  <text x="340" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">FiD (2020)</text>

  <path d="M 437 89 L 464 89" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ev-arr)"/>

  <!-- 단계 3 -->
  <rect x="466" y="58" width="190" height="62" rx="6" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="561" y="83" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12.5" font-weight="600" fill="#000">프롬프트에 통째로 넣기</text>
  <text x="561" y="103" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10" fill="#000" opacity="0.6">요즘 표준</text>

  <!-- 추세 화살표 -->
  <path d="M 80 158 L 600 158" fill="none" stroke="#000" stroke-width="1.3" stroke-linecap="round" opacity="0.55" marker-end="url(#ev-arr)"/>
  <text x="340" y="184" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" fill="#000" opacity="0.85">모델과 컨텍스트가 커질수록 방식은 단순해졌다</text>
</svg>
