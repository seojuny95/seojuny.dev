<svg width="100%" viewBox="0 0 680 184" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>텍스트 청킹</title>
  <desc>긴 텍스트를 작은 청크 여러 개로 나눈다. 이웃한 청크는 끝부분을 조금 겹쳐(overlap) 문맥이 끊기지 않게 하므로, 가운데 청크는 양옆이 모두 겹친다.</desc>
  <defs>
    <marker id="ch-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">텍스트 청킹 — 끝부분을 겹쳐 나누기</text>

  <!-- 긴 텍스트 -->
  <rect x="24" y="62" width="130" height="72" rx="6" fill="#fff" stroke="#000" stroke-width="1.6"/>
  <text x="89" y="80" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">긴 텍스트</text>
  <line x1="42" y1="94" x2="136" y2="94" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="104" x2="136" y2="104" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="114" x2="136" y2="114" stroke="#000" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="124" x2="112" y2="124" stroke="#000" stroke-width="1" opacity="0.3"/>

  <path d="M 156 98 L 196 98" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ch-arr)"/>

  <!-- 겹침 구간 세로 점선 가이드 -->
  <line x1="362" y1="56" x2="362" y2="124" stroke="#000" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.45"/>
  <line x1="392" y1="56" x2="392" y2="124" stroke="#000" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.45"/>
  <line x1="512" y1="92" x2="512" y2="160" stroke="#000" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.45"/>
  <line x1="542" y1="92" x2="542" y2="160" stroke="#000" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.45"/>

  <!-- 청크 1 -->
  <rect x="212" y="58" width="180" height="28" rx="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="362" y="58" width="30" height="28" rx="0" fill="#000" fill-opacity="0.13"/>
  <text x="287" y="72" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">청크 1</text>

  <!-- 청크 2 (양옆 겹침) -->
  <rect x="362" y="94" width="180" height="28" rx="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="362" y="94" width="30" height="28" fill="#000" fill-opacity="0.13"/>
  <rect x="512" y="94" width="30" height="28" fill="#000" fill-opacity="0.13"/>
  <text x="452" y="108" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">청크 2</text>

  <!-- 청크 3 -->
  <rect x="512" y="130" width="150" height="28" rx="5" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <rect x="512" y="130" width="30" height="28" fill="#000" fill-opacity="0.13"/>
  <text x="601" y="144" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000">청크 3</text>

  <!-- 캡션 -->
  <text x="340" y="178" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="10.5" fill="#000" opacity="0.8">음영이 겹친 부분(overlap) — 가운데 청크는 양옆이 겹친다</text>
</svg>
