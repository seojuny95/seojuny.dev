<svg width="100%" viewBox="0 0 680 130" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>인덱싱 — 문서를 벡터로 바꿔 저장</title>
  <desc>인덱싱 단계의 흐름. 문서에서 텍스트를 추출하고, 텍스트를 청크로 나눈 뒤, 임베딩 모델로 각 청크를 벡터로 바꿔 벡터 DB에 저장한다.</desc>

  <defs>
    <marker id="ix-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="24" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="500" fill="#000">인덱싱 — 문서를 벡터로 바꿔 저장</text>

  <rect x="20" y="56" width="108" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="74" y="77" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#000">문서</text>
  <path d="M 128 77 L 153 77" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ix-arr)"/>

  <rect x="153" y="56" width="108" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="207" y="77" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#000">텍스트 추출</text>
  <path d="M 261 77 L 286 77" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ix-arr)"/>

  <rect x="286" y="56" width="108" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="340" y="77" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#000">텍스트 청킹</text>
  <path d="M 394 77 L 419 77" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ix-arr)"/>

  <rect x="419" y="56" width="108" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="473" y="77" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#000">임베딩 모델</text>
  <path d="M 527 77 L 552 77" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" marker-end="url(#ix-arr)"/>

  <rect x="552" y="56" width="108" height="42" rx="6" fill="#fff" stroke="#000" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="606" y="77" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="11.5" font-weight="600" fill="#000">벡터 DB</text>
</svg>
